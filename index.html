<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>OWLS — True Global News Map</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TG3Q7KX51N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TG3Q7KX51N');

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg-main: #f0f7f7; --bg-card: #ffffff; --text-main: #1a2e2e; --text-sub: #64748b;
      --border: #ccece9; --hover-bg: #f0fdfa; --active-bg: #e6f7f5; --accent: #0d9488;
      --map-filter: none;
    }
    [data-theme="dark"] {
      --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --text-sub: #94a3b8;
      --border: #334155; --hover-bg: #0f172a; --active-bg: #334155; --accent: #2dd4bf;
      --map-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-main); color: var(--text-main); overflow: hidden; transition: 0.3s; }

    /* HEADER */
    .header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 8px 20px; min-height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none;}
    .owl-icon { width: 36px; height: 36px; animation: owlBlink 4s infinite; }
    @keyframes owlBlink { 0%, 90%, 100% { transform: scaleY(1); } 92%, 97% { transform: scaleY(0.1); } }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
    
    .user-actions { display: flex; gap: 10px; align-items: center; }
    .action-btn { background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }
    .action-btn:hover { background: var(--hover-bg); transform: translateY(-2px); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); display: none; cursor: pointer; }

    /* CATEGORY BAR */
    .category-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; background: var(--bg-card); padding: 10px; border-bottom: 1px solid var(--border); z-index: 999; position: relative;}
    .cat-btn { font-size: 12px; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-main); cursor: pointer; transition: 0.3s; font-weight: 600; }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* LAYOUT & MAP */
    .layout { display: flex; height: calc(100vh - 110px); }
    #map { flex: 1; filter: var(--map-filter); }

    /* SIDEBAR */
    .sidebar { width: 360px; background: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10;}
    .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 800; color: var(--accent); display: flex; justify-content: space-between; text-transform: uppercase;}
    .live-dot { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #10b981; font-weight: 700; }
    .live-dot::before { content:''; width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: livePulse 1.5s infinite; box-shadow: 0 0 8px #10b981; }
    @keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.5); } }

    .news-list { overflow-y: auto; flex: 1; }
    .news-card { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative;}
    .news-card:hover { background: var(--hover-bg); }
    .news-card.active { background: var(--active-bg); border-left: 4px solid var(--accent); }
    .news-title { font-size: 14px; font-weight: 700; line-height: 1.4; margin: 8px 0; }
    .news-meta { font-size: 11px; color: var(--text-sub); font-weight: 500; }
    .news-thumb { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-top: 8px; }
    .badge { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; }

    /* AD PLACEHOLDERS */
    .ad-placeholder { background: var(--active-bg); border: 2px dashed var(--border); color: var(--text-sub); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; border-radius: 8px; margin: 10px 15px; text-align: center; }
    .feed-ad { height: 120px; cursor: pointer; } 
    .modal-ad { height: 150px; width: 100%; margin: 15px 0; cursor: pointer; } 

    /* IN-APP READING MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content { background: var(--bg-card); padding: 0; border-radius: 20px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.3); transform: translateY(20px); transition: 0.3s; position: relative; }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: bold;}
    .modal-hero { width: 100%; height: 250px; object-fit: cover; }
    .modal-body { padding: 25px; }
    .modal-title { font-size: 22px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; color: var(--text-main); }
    .modal-meta { font-size: 12px; color: var(--text-sub); margin-bottom: 15px; display: flex; gap: 10px; align-items: center;}
    .modal-text { font-size: 15px; line-height: 1.6; color: var(--text-main); opacity: 0.9; margin-bottom: 20px;}
    .modal-action-btn { display: inline-block; padding: 12px 24px; background: var(--accent); color: white; text-decoration: none; border-radius: 25px; font-weight: 700; font-size: 13px; transition: 0.2s;}
    .modal-action-btn:hover { opacity: 0.9; transform: scale(1.02); }

    /* DOPAMINE POPUP */
    .dopamine-popup { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px); background: linear-gradient(135deg, #ff0f4f, #ff8c00); color: white; padding: 15px 25px; border-radius: 30px; font-weight: 800; box-shadow: 0 10px 30px rgba(255,15,79,0.3); z-index: 3000; transition: 0.6s; display: flex; align-items: center; gap: 15px; cursor: pointer; width: 90%; max-width: 420px; }
    .dopamine-popup.show { transform: translateX(-50%) translateY(0); }
    .dopamine-popup:hover { transform: translateX(-50%) translateY(-5px) scale(1.02); }
    .dopamine-icon { font-size: 24px; animation: owlFloat 1s infinite alternate; }

    /* LOADER */
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 14px; padding: 40px 20px; text-align: center; }
    .owl-loading { font-size: 44px; animation: owlFloat 2s ease-in-out infinite; }
    @keyframes owlFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
    .loading-text { font-size: 13px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
    @keyframes markerPulseAnim { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

    /* SPLASH SCREEN */
    .splash { position: fixed; inset: 0; background: #0d9488; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; transition: opacity 0.5s ease; }
    .splash.hide { opacity: 0; pointer-events: none; }
    .splash-owl { font-size: 80px; animation: owlFloat 1.5s ease-in-out infinite; }
    .splash-title { font-size: 42px; font-weight: 800; color: #fff; letter-spacing: 6px; margin-top: 16px; }
    .splash-sub { font-size: 14px; color: #99f6e4; letter-spacing: 2px; margin-top: 8px; font-weight: 600; }
    .splash-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 30px; overflow: hidden; }
    .splash-bar-fill { height: 100%; background: #fff; border-radius: 2px; animation: loadBar 1.5s ease forwards; }
    @keyframes loadBar { from { width: 0; } to { width: 100%; } }

    @media (max-width: 768px) {
      .layout { flex-direction: column; height: calc(100vh - 120px); }
      .sidebar { width: 100%; height: 50vh; border-left: none; border-top: 1px solid var(--border); }
      #map { height: 40vh; }
      .header { padding: 8px 10px; }
      .logo-text { font-size: 16px; }
      .dopamine-popup { top: 70px; bottom: auto; transform: translateX(-50%) translateY(-150px); }
      .dopamine-popup.show { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body data-theme="light">

<div class="splash" id="splash">
  <div class="splash-owl">🦉</div>
  <div class="splash-title">OWLS</div>
  <div class="splash-sub">TRUE GLOBAL NEWS</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<div class="header">
  <div class="logo">
    <div class="owl-icon">🦉</div>
    <div class="logo-text">OWLS <span id="userNameDisplay" style="font-weight:400; font-size:12px; color:var(--text-sub)">| Global Feed</span></div>
  </div>
  <div class="user-actions">
    <button class="action-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="action-btn" onclick="loginWithGoogle()" id="loginBtn">👤 Login</button>
    <img src="" id="userAvatar" class="user-avatar" onclick="logout()" title="Click to Logout">
  </div>
</div>

<div class="category-bar">
  <button class="cat-btn active" data-q="world">🌍 World</button>
  <button class="cat-btn" data-q="technology">💻 Tech</button>
  <button class="cat-btn" data-q="business">📈 Business</button>
  <button class="cat-btn" data-q="science">🔬 Science</button>
  <button class="cat-btn" data-q="health">❤️ Health</button>
  <button class="cat-btn" data-q="sport">⚽ Sport</button>
</div>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Radar Feed</span>
      <div class="live-dot">LIVE</div>
    </div>
    <div class="news-list" id="newsList"></div>
  </div>
</div>

<div id="dopaminePopup" class="dopamine-popup">
  <div class="dopamine-icon">🔥</div>
  <div>
    <div style="font-size:10px; color:#ffd700; text-transform:uppercase; font-weight: 800;">Breaking News</div>
    <div id="dopamineTitle" style="font-size:13px; margin-top: 3px;">...</div>
  </div>
</div>

<div class="modal-overlay" id="newsModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <img src="" id="modalImg" class="modal-hero">
    <div class="modal-body">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-meta">
        <span id="modalSource" class="badge" style="background:var(--active-bg); color:var(--accent);"></span>
        <span id="modalDate"></span>
      </div>
      <div class="ad-placeholder modal-ad">
        <span style="font-size: 20px; margin-bottom: 5px;">💰</span>
        AdSense Display Banner Area
        <span style="font-size: 9px; font-weight: 400; margin-top: 5px;">(Insert Google Ad Code Here)</span>
      </div>
      <div class="modal-text" id="modalText"></div>
      <a href="" id="modalLink" target="_blank" class="modal-action-btn">Read Full Article 🦉</a>
    </div>
  </div>
</div>

<script>
  // ==========================================
  // --- FİREBASE BAĞLANTISI ---
  // ==========================================
  const firebaseConfig = {
    apiKey: "AIzaSyBf3EDUobPIaZL6Jzu5i1ITT8YRSZaCOa8",
    authDomain: "newsmap-5d380.firebaseapp.com",
    projectId: "newsmap-5d380",
    storageBucket: "newsmap-5d380.firebasestorage.app",
    messagingSenderId: "270586913079",
    appId: "1:270586913079:web:271cb786e7195299f73ab2",
    measurementId: "G-HHK7MV2HBG"
  };
  
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  window.addEventListener('load', () => {
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if(splash) { splash.classList.add('hide'); setTimeout(() => splash.remove(), 600); }
    }, 1500);
  });

  function initApp() {
    if(localStorage.getItem('owlsTheme') === 'dark') { document.body.setAttribute('data-theme', 'dark'); document.getElementById('themeBtn').innerText = '☀️'; }
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginBtn').style.display = 'none';
        const avatar = document.getElementById('userAvatar');
        avatar.src = user.photoURL; avatar.style.display = 'block';
        document.getElementById('userNameDisplay').innerText = `| ${user.displayName.split(' ')[0]}'s Feed`;
      } else {
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('userAvatar').style.display = 'none';
        document.getElementById('userNameDisplay').innerText = `| Global Feed`;
      }
    });
  }

  function toggleTheme() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').innerText = isDark ? '🌙' : '☀️';
    localStorage.setItem('owlsTheme', isDark ? 'light' : 'dark');
  }

  function loginWithGoogle() { auth.signInWithPopup(provider).catch(e => console.log(e)); }
  function logout() { if (confirm("Log out from OWLS?")) auth.signOut(); }

  // --- HARİTA AYARLARI ---
  const map = L.map('map', { zoomControl: false }).setView([20, 10], 2);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

  // --- KESİN LOKASYON VERİTABANI ---
  const EXACT_CITIES = {
    'new york':[40.71,-74.00],'washington':[38.90,-77.03],'los angeles':[34.05,-118.24],'chicago':[41.87,-87.62],'san francisco':[37.77,-122.41],'miami':[25.77,-80.19],
    'london':[51.50,-0.12],'manchester':[53.48,-2.24],'liverpool':[53.40,-2.98],'paris':[48.85,2.35],'istanbul':[41.01,28.97],'ankara':[39.92,32.85],
    'berlin':[52.52,13.40],'madrid':[40.41,-3.70],'rome':[41.90,12.49],'kyiv':[50.45,30.52],'moscow':[55.75,37.61],
    'tokyo':[35.68,139.69],'beijing':[39.90,116.40],'shanghai':[31.22,121.47],'hong kong':[22.31,114.17],'seoul':[37.56,126.97],'singapore':[1.35,103.81],
    'new delhi':[28.61,77.20],'mumbai':[19.07,72.87],'dubai':[25.20,55.27],'cairo':[30.04,31.23],'nairobi':[-1.28,36.81],'johannesburg':[-26.20,28.04],
    'sao paulo':[-23.54,-46.63],'buenos aires':[-34.60,-58.38],'sydney':[-33.86,151.20],'melbourne':[-37.81,144.96], 'mexico city':[19.43,-99.13],
    'doha':[25.28,51.53], 'islamabad':[33.68,73.04], 'karachi':[24.86,67.00]
  };

  const CAPITALS = {
    'us':[38.90,-77.03], 'gb':[51.50,-0.12], 'de':[52.52,13.40], 'tr':[39.92,32.85], 'fr':[48.85,2.35], 'jp':[35.68,139.69], 'cn':[39.90,116.40], 
    'ru':[55.75,37.61], 'in':[28.61,77.20], 'au':[-35.28,149.12], 'ca':[45.42,-75.69], 'za':[-25.74,28.18], 'ng':[9.07,7.39], 'eg':[30.04,31.23], 
    'mx':[19.43,-99.13], 'ar':[-34.60,-58.38], 'sa':[24.71,46.67], 'id':[-6.20,106.81], 'it':[41.90,12.49], 'es':[40.41,-3.70], 'kr':[37.56,126.97], 
    'ua':[50.45,30.52], 'il':[31.76,35.21], 'ae':[24.45,54.37], 'qa':[25.28,51.53], 'br':[-15.82,-47.92], 'pk':[33.68,73.04]
  };
  
  const CNAMES = { us:'USA', gb:'UK', de:'Germany', tr:'Turkey', fr:'France', jp:'Japan', cn:'China', ru:'Russia', in:'India', au:'Australia', ca:'Canada', za:'South Africa', ng:'Nigeria', eg:'Egypt', mx:'Mexico', ar:'Argentina', sa:'Saudi Arabia', id:'Indonesia', it:'Italy', es:'Spain', kr:'S. Korea', ua:'Ukraine', il:'Israel', ae:'UAE', qa:'Qatar', br:'Brazil', pk:'Pakistan' };
  
  const HQ_LOCATIONS = {
    'CNN': [33.75, -84.39], 'Fox News': [40.75, -73.98], 'BBC': [51.51, -0.14], 'Sky': [51.48, -0.32],
    'EuroNews': [45.74, 4.82], 'Al Jazeera': [25.31, 51.52], 'Al Arabiya': [25.20, 55.27],
    'NDTV': [28.55, 77.25], 'Times of India': [28.62, 77.24], 'Geo News': [24.86, 67.00], 'ABC News': [-33.88, 151.20],
    'NTV': [41.05, 28.98], 'CBC News': [43.64, -79.38], 'WSJ': [40.71, -74.01], 'ESPN': [41.61, -72.92]
  };

  const hasWord = (word, text) => new RegExp("\\b" + word + "\\b", "i").test(text);
  const KEYWORDS = { 'usa':'us', 'america':'us', 'england':'gb', 'premier league':'gb', 'nba':'us', 'nfl':'us', 'macron':'fr', 'putin':'ru' };
  const COLORS = { 'world':'#0d9488', 'technology':'#7c3aed', 'business':'#059669', 'science':'#0891b2', 'health':'#dc2626', 'sport':'#d97706' };
  
  let markers = [];
  let currentQ = 'world';
  let dopamineTimer;

  // LOKASYON TAKİPÇİSİ (Aynı noktaya düşenleri spirale dizer, sıkışmayı önler)
  const locationCounts = {}; 

  function getCoords(text, source) {
    const t = (text || "").toLowerCase();
    let baseLat = null, baseLng = null, locName = null;

    for (const [city, coords] of Object.entries(EXACT_CITIES)) {
      if (hasWord(city, t)) { baseLat = coords[0]; baseLng = coords[1]; locName = city.charAt(0).toUpperCase() + city.slice(1); break; }
    }

    if(!baseLat) {
      let code = null;
      for (const [k, v] of Object.entries(KEYWORDS)) { if(hasWord(k, t)) { code = v; break; } }
      if(!code) {
        for (const [k, v] of Object.entries(CNAMES)) { if(hasWord(v.toLowerCase(), t)) { code = k; break; } }
      }
      if(code && CAPITALS[code]) { baseLat = CAPITALS[code][0]; baseLng = CAPITALS[code][1]; locName = CNAMES[code]; }
    }

    if(!baseLat) {
      for (const [hq, coords] of Object.entries(HQ_LOCATIONS)) {
        if (source.includes(hq)) { baseLat = coords[0]; baseLng = coords[1]; locName = hq + " HQ"; break; }
      }
      if(!baseLat) { baseLat = 40.71; baseLng = -74.00; locName = "USA"; } // Mutlak Son Çare (New York)
    }

    // SPIRAL GRID ALGORİTMASI: Aynı yere düşen haberleri yan yana dizer (Denize fırlatmaz, haritayı boğmaz)
    const locKey = `${baseLat},${baseLng}`;
    const count = locationCounts[locKey] || 0;
    locationCounts[locKey] = count + 1;

    // Her yeni haberi merkezden hafifçe sağa/sola kaydırır
    const row = Math.floor(count / 3);
    const col = count % 3;
    const finalLat = baseLat + (row * 0.3); // Yaklaşık 30km aralık
    const finalLng = baseLng + (col * 0.3);

    return { coords: [finalLat, finalLng], locationName: locName };
  }

  function pulseIcon(color) {
    return L.divIcon({ html: `<div style="position:relative; width:16px; height:16px;"><div style="position:absolute; inset:0; border-radius:50%; border:3px solid ${color}; animation:markerPulseAnim 2s infinite; opacity:0.7;"></div><div style="position:absolute; inset:2px; border-radius:50%; background:${color}; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div></div>`, iconSize:[16,16], iconAnchor:[8,8] });
  }

  function timeAgo(d) {
    if(!d) return "";
    const diff = Date.now() - new Date(d).getTime();
    const h = Math.floor(diff/3600000), m = Math.floor(diff/60000);
    if(h>24) return Math.floor(h/24)+' days ago';
    if(h>0) return h+' hours ago';
    return m > 0 ? m+' mins ago' : 'Just now';
  }

  function openModal(article) {
    document.getElementById('modalImg').src = article.thumb || 'https://images.unsplash.com/photo-1504711432869-00103211f46a?q=80&w=600';
    document.getElementById('modalTitle').innerText = article.title;
    document.getElementById('modalSource').innerText = article.source;
    document.getElementById('modalDate').innerText = timeAgo(article.date);
    document.getElementById('modalText').innerText = article.trailText || "Click the button below to read the full coverage of this story on the original publisher's website.";
    document.getElementById('modalLink').href = article.url;
    document.getElementById('newsModal').classList.add('active');
  }

  function closeModal() { document.getElementById('newsModal').classList.remove('active'); }

  function triggerDopamine(articles) {
    clearTimeout(dopamineTimer);
    const popup = document.getElementById('dopaminePopup');
    if(!popup) return;
    popup.classList.remove('show');
    if(!articles || articles.length < 3) return; 
    
    dopamineTimer = setTimeout(() => {
        const rnd = articles[Math.floor(Math.random() * Math.min(articles.length, 10))];
        const titleEl = document.getElementById('dopamineTitle');
        if(titleEl) titleEl.innerText = rnd.title.length > 50 ? rnd.title.substring(0,50) + "..." : rnd.title;
        popup.onclick = () => { popup.classList.remove('show'); openModal(rnd); };
        popup.classList.add('show');
        setTimeout(() => popup.classList.remove('show'), 7000); 
    }, 5000);
  }

  function renderArticles(articles) {
    const list = document.getElementById('newsList');
    const color = COLORS[currentQ] || '#0d9488';
    
    // Haritayı temizle ve Sayaçları sıfırla
    markers.forEach(m => map.removeLayer(m)); markers = []; 
    for (let key in locationCounts) delete locationCounts[key];
    list.innerHTML = '';

    if(!articles || articles.length === 0) {
      list.innerHTML = '<div class="loading"><div class="owl-loading">🦉</div><div class="loading-text">No News Found.</div></div>';
      return;
    }

    articles.slice(0,40).forEach((a, i) => {
      const fullText = a.title + ' ' + (a.trailText || '');
      const {coords, locationName} = getCoords(fullText, a.source); 

      const marker = L.marker(coords, {icon: pulseIcon(color)}).addTo(map);
      marker.bindPopup(`<b>${a.title}</b><br><small>${a.source}</small>`);
      markers.push(marker);

      if (i > 0 && i % 6 === 0) {
        const adCard = document.createElement('div');
        adCard.className = 'ad-placeholder feed-ad';
        adCard.innerHTML = `<span style="font-size:18px; margin-bottom:5px;">🚀</span> In-Feed AdSense Space`;
        list.appendChild(adCard);
      }

      const card = document.createElement('div');
      card.className = 'news-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        ${a.thumb ? `<img src="${a.thumb}" class="news-thumb">` : ''}
        <div style="padding-top:10px;">
          <div class="badge" style="background:${color}22;color:${color}">${a.source} · ${locationName}</div>
          <div class="news-title">${a.title}</div>
          <div class="news-meta">${timeAgo(a.date)}</div>
        </div>
      `;
      
      card.onclick = () => {
        document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        map.flyTo(coords, 6, { duration: 1.5, easeLinearity: 0.25 });
        openModal(a); 
      };
      list.appendChild(card);
    });

    triggerDopamine(articles);
  }

  // --- HATA KORUMALI RSS FETCH ---
  async function fetchRSS(url, sourceName) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
      const data = await res.json();
      if(data.status !== 'ok') return [];
      return (data.items || []).map(item => ({
        title: item.title, url: item.link, source: sourceName, date: item.pubDate,
        thumb: item.thumbnail || (item.enclosure && item.enclosure.link) || null,
        trailText: item.description ? item.description.replace(/<[^>]*>?/gm, '').substring(0, 150) + "..." : ""
      }));
    } catch(e) { return []; }
  }

  // GUARDIAN API YEDEK (RSS'ler çökerse sayfa boş kalmasın diye)
  async function fetchGuardianFallback(category) {
    try {
      const GUARDIAN_KEY = '0a321643-aaab-4c6a-9185-1762685abe3d';
      const qCat = (category === 'health' || category === 'sport') ? 'world' : category; // Health/Sport bazen boş döner
      const res = await fetch(`https://content.guardianapis.com/${qCat}?api-key=${GUARDIAN_KEY}&page-size=10&show-fields=thumbnail,trailText`);
      const data = await res.json();
      return (data.response?.results || []).map(a => ({
          title: a.webTitle, url: a.webUrl, source: 'The Guardian', date: a.webPublicationDate,
          thumb: a.fields?.thumbnail || null, trailText: a.fields?.trailText ? a.fields.trailText.replace(/<[^>]*>?/gm, '') : ""
      }));
    } catch(e) { return []; }
  }

  // --- DEVASA BİLGİ AĞI ---
  async function fetchNews(category) {
    const list = document.getElementById('newsList');
    list.innerHTML = `<div class="loading"><div class="owl-loading">🦉</div><div class="loading-text">Scanning Globe...</div></div>`;

    let feedConfigs = [];

    if (category === 'world') {
      feedConfigs = [
        {url: "http://rss.cnn.com/rss/edition_world.rss", name: "CNN"},
        {url: "http://feeds.bbci.co.uk/news/world/rss.xml", name: "BBC News"},
        {url: "https://www.aljazeera.com/xml/rss/all.xml", name: "Al Jazeera"},
        {url: "https://www.ntv.com.tr/dunya.rss", name: "NTV"},
        {url: "https://www.geo.tv/rss/1/2", name: "Geo News"},
        {url: "https://english.alarabiya.net/feed/world", name: "Al Arabiya"}
      ];
    } else if (category === 'technology') {
      feedConfigs = [
        {url: "https://techcrunch.com/feed/", name: "TechCrunch"},
        {url: "https://www.ntv.com.tr/teknoloji.rss", name: "NTV"},
        {url: "https://www.wired.com/feed/rss", name: "Wired"}
      ];
    } else if (category === 'business') {
      feedConfigs = [
        {url: "https://feeds.a.dj.com/rss/WSJcomUSBusiness.xml", name: "WSJ"},
        {url: "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml", "name": "NY Times"},
        {url: "http://feeds.bbci.co.uk/news/business/rss.xml", name: "BBC Business"}
      ];
    } else if (category === 'health') {
      feedConfigs = [
        {url: "http://feeds.bbci.co.uk/news/health/rss.xml", name: "BBC News"},
        {url: "https://www.ntv.com.tr/saglik.rss", name: "NTV"},
        {url: "https://rss.nytimes.com/services/xml/rss/nyt/Health.xml", name: "NY Times"}
      ];
    } else if (category === 'science') {
      feedConfigs = [
        {url: "https://rss.nytimes.com/services/xml/rss/nyt/Science.xml", name: "NY Times"},
        {url: "http://feeds.bbci.co.uk/news/science_and_environment/rss.xml", name: "BBC News"}
      ];
    } else if (category === 'sport') {
      feedConfigs = [
        {url: "https://www.espn.com/espn/rss/news", name: "ESPN"},
        {url: "https://www.skysports.com/rss/12040", name: "Sky Sports"},
        {url: "https://www.ntv.com.tr/sporskor.rss", name: "NTV Spor"},
        {url: "https://e00-marca.uecdn.es/rss/en/football.xml", name: "Marca"}
      ];
    }

    try {
      // Promise.allSettled KULLANILDI: Bir site çökerse diğerleri çalışmaya devam eder
      const promises = feedConfigs.map(feed => fetchRSS(feed.url, feed.name));
      const results = await Promise.allSettled(promises);
      
      let articles = [];
      results.forEach(res => { if(res.status === 'fulfilled') articles.push(...res.value); });

      // RSS'lerden hiçbiri çalışmazsa Guardian'ı devreye sok (Yedek)
      if (articles.length < 5) {
        const fallback = await fetchGuardianFallback(category);
        articles.push(...fallback);
      }

      const seen = new Set();
      articles = articles.filter(a => { if(!a.title || seen.has(a.title)) return false; seen.add(a.title); return true; });
      articles = articles.sort(() => Math.random() - 0.5);

      renderArticles(articles);
    } catch (e) {
      list.innerHTML = `<div class="loading"><div class="owl-loading">🦉</div><div class="loading-text" style="color:#ef4444">Connection Error.</div></div>`;
    }
  }

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = function() {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentQ = this.dataset.q;
      fetchNews(currentQ);
    };
  });

  initApp();
  fetchNews('world');

</script>
