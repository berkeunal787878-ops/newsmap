  .splash {

  .splash-owl { font-size: 70px; animation: float 1.5s ease-in-out infinite; }
  .splash-title { font-size: 44px; font-weight: 700; color: #fff; letter-spacing: 8px; margin-top: 12px; }

  /* HEADER */
  .header {
    background: #fff; border-bottom: 1px solid #ccece9;
    padding: 0 16px; height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 1000;
  }
  .logo { display: flex; align-items: center; gap: 9px; }
  .owl-svg { width: 34px; height: 34px; animation: blink 5s infinite; }
  @keyframes blink {
    0%,88%,100%{ transform:scaleY(1); }
    91%{ transform:scaleY(0.08); }
    94%{ transform:scaleY(1); }
    97%{ transform:scaleY(0.08); }
  }
  .logo-text { font-size: 19px; font-weight: 700; letter-spacing: 2.5px; color: #0d9488; }
  .logo-sub { font-size: 9px; color: #5eead4; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-top: -2px; }

  .cat-bar { display: flex; gap: 5px; flex-wrap: wrap; }
  .cat-btn {
    font-size: 11px; padding: 4px 12px; border-radius: 20px;
    border: 1px solid #99d6d0; background: #fff;
    color: #0d9488; cursor: pointer; transition: all 0.2s; font-weight: 500; white-space: nowrap;
  }
  .cat-btn:hover { background: #f0fdfa; }
  .cat-btn.active { background: #0d9488; color: #fff; border-color: #0d9488; }

  /* LAYOUT */
  .layout { display: flex; height: calc(100vh - 56px); }
  #map { flex: 1; min-width: 0; }

  /* PULSE MARKER */
  @keyframes markerPulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
  }
  .pulse-marker {
    border-radius: 50%;
    border: 2.5px solid #fff;
    animation: markerPulse 2.5s ease-in-out infinite;
    cursor: pointer;
  }

  /* SIDEBAR */

    width: 320px; flex-shrink: 0; background: #fff;
    border-left: 1px solid #ccece9;
    display: flex; flex-direction: column; overflow: hidden;

  .sidebar-header {
    padding: 12px 14px; border-bottom: 1px solid #e6f7f5;
    font-size: 11px; font-weight: 700; color: #0d9488;
    letter-spacing: 1px; text-transform: uppercase;
    display: flex; align-items: center; justify-content: space-between;
  }
  .live-dot { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #10b981; }
  .live-dot::before {
    content:''; width:6px; height:6px; border-radius:50%;
    background:#10b981; animation:livePulse 2s infinite;
  }

  .news-list { overflow-y: auto; flex: 1; }
  .news-card {
    border-bottom: 1px solid #f0faf9;
    cursor: pointer; transition: background 0.15s;
    animation: slideIn 0.35s ease both;
    overflow: hidden;
  }
  .news-thumb {
    width: 100%; height: 130px; object-fit: cover; display: block;

  .news-card-body { padding: 10px 14px 12px; }
  @keyframes slideIn { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }
  .news-card:hover { background: #f0fdfa; }
  .news-card.active { background: #e6f7f5; border-left: 3px solid #0d9488; }

function detectLocation(text) {
  const t = (text||'').toLowerCase();
  // 1) Önce şehir/kulüp kontrolü (daha spesifik)
  for(const [k,v] of Object.entries(CLUBS)) {
    if(t.includes(k)) {
      // Şehir koordinatı varsa kullan
      for(const [city, coords] of Object.entries(CITY_COORDS)) {
        if(k.includes(city)) return { coords, country: k, isCity: true };
      }
      return { countryCode: v };
    }
  }
  // 2) Şehir adı ara
  for(const [city, coords] of Object.entries(CITY_COORDS)) {
    if(t.includes(city)) {
      return { coords, country: city.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' '), isCity: true };
    }
  }
  // 3) Ülke/keyword ara
  for(const [k,v] of Object.entries(KEYWORDS)) {
    if(t.includes(k)) return { countryCode: v };
  }
  return null;
}

function getCoords(text, i) {
  const loc = detectLocation(text);
  if(loc) {
    if(loc.isCity && loc.coords) {
      const jitter = 0.3;
      return {
        coords: [loc.coords[0]+(Math.random()-.5)*jitter, loc.coords[1]+(Math.random()-.5)*jitter],
        label: loc.country
      };
    }
    if(loc.countryCode) {
      const b = COUNTRY_COORDS[loc.countryCode] || COUNTRY_COORDS.us;
      return {
        coords: [b[0]+(Math.random()-.5)*2, b[1]+(Math.random()-.5)*2],
        label: COUNTRY_NAMES[loc.countryCode] || 'Dünya'
      };
    }
  }
  // Bulunamazsa Guardian'ın tag'lerinden gelen ülkeye göre dağıt
  const keys = Object.keys(COUNTRY_COORDS);
  const k = keys[i % keys.length];
  const b = COUNTRY_COORDS[k];
  return {
    coords: [b[0]+(Math.random()-.5)*2, b[1]+(Math.random()-.5)*2],
    label: COUNTRY_NAMES[k]||'Dünya'
  };
}

function pulseIcon(color) {
  return L.divIcon({
    className:'',
    html:`<div class="pulse-marker" style="width:14px;height:14px;background:${color};box-shadow:0 0 0 3px ${color}55"></div>`,
    iconSize:[14,14], iconAnchor:[7,7]
  });
}

function timeAgo(d) {
  if(!d) return '';
  const diff = Date.now() - new Date(d).getTime();
  const h = Math.floor(diff/3600000), mn = Math.floor(diff/60000);
  if(h>24) return Math.floor(h/24)+' gün önce';
  if(h>0) return h+' saat önce';
  return mn>0 ? mn+' dk önce' : 'Az önce';
}

let markers = [];
let currentCat = 'world';
let currentLabel = 'DÜNYA';

function clearMarkers() { markers.forEach(m=>map.removeLayer(m)); markers=[]; }

function renderArticles(articles, sourceName) {
  const list = document.getElementById('newsList');
  const color = COLORS[currentCat]||'#0d9488';
  clearMarkers(); list.innerHTML='';

  if(!articles||articles.length===0) {
    list.innerHTML='<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Haber bulunamadı.</div></div>';
    return;
  }

  articles.slice(0,20).forEach((a,i)=>{
    if(!a.title) return;
    const searchText = a.title+' '+(a.desc||'');
    const {coords, label} = getCoords(searchText, i);

    const marker = L.marker(coords,{icon:pulseIcon(color)}).addTo(map);
    marker.bindPopup(`
      <div>
        ${a.thumb?`<img src="${a.thumb}" class="popup-img" onerror="this.style.display='none'"/>`:''}
        <div class="popup-body">
          <div class="popup-cat" style="color:${color}">${currentLabel} · ${label}</div>
          <div class="popup-title">${a.title}</div>
          <div class="popup-src">${sourceName} · ${timeAgo(a.date)}</div>
          ${a.url?`<a class="popup-link" href="${a.url}" target="_blank">Haberi oku →</a>`:''}
        </div>
      </div>
    `,{maxWidth:240});
    markers.push(marker);

    const card = document.createElement('div');
    card.className='news-card';
    card.style.animationDelay=(i*0.05)+'s';
    card.innerHTML=`
      ${a.thumb?`<div style="overflow:hidden;height:130px"><img class="news-thumb" src="${a.thumb}" onerror="this.parentElement.style.display='none'" alt=""/></div>`:''}
      <div class="news-card-body">
        <div class="badge-row">
          <span class="cat-badge" style="background:${color}20;color:${color}">${currentLabel}</span>
          <span class="src-badge">${sourceName}</span>
        </div>
        <div class="news-title">${a.title}</div>
        <div class="news-meta">${label} · ${timeAgo(a.date)}</div>
      </div>
    `;
    card.addEventListener('click',()=>{
      document.querySelectorAll('.news-card').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      map.setView(coords,5,{animate:true});
      setTimeout(()=>marker.openPopup(),450);
    });
    list.appendChild(card);
  });
}

async function fetchGuardian(section) {
  const url=`https://content.guardianapis.com/${section}?api-key=${GUARDIAN_KEY}&page-size=20&order-by=newest&show-fields=thumbnail,trailText&show-tags=keyword`;
  const res=await fetch(url);
  const data=await res.json();
  return (data.response?.results||[]).map(a=>({
    title:a.webTitle,
    desc:(a.fields?.trailText||'')+' '+(a.tags||[]).map(t=>t.webTitle).join(' '),
    date:a.webPublicationDate,
    url:a.webUrl,
    thumb:a.fields?.thumbnail||null,
  }));
}

async function fetchHN() {
  const res=await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
  const ids=await res.json();
  const stories=await Promise.all(ids.slice(0,15).map(id=>
    fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r=>r.json())
  ));
  return stories.filter(s=>s&&s.title).map(s=>({
    title:s.title, desc:'', thumb:null,
    date:new Date(s.time*1000).toISOString(),
    url:s.url||`https://news.ycombinator.com/item?id=${s.id}`
  }));
}

const SECTIONS = {
  world:'world', business:'business', science:'science',
  health:'healthcare', sport:'football', turkce:'world/turkey'
};

async function fetchNews(cat) {
  const list=document.getElementById('newsList');
  list.innerHTML=`<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Yükleniyor...</div></div>`;
  try {
    let articles=[], sourceName='';
    if(cat==='technology') {
      articles=await fetchHN(); sourceName='Hacker News';
    } else {
      articles=await fetchGuardian(SECTIONS[cat]||'world');
      sourceName = cat==='sport' ? 'Guardian Football' : 'The Guardian';
    }
    renderArticles(articles, sourceName);
  } catch(e) {
    list.innerHTML=`<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Bağlantı hatası.<br>Sayfayı yenile.</div></div>`;
  }
}

document.querySelectorAll('.cat-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    currentCat=this.dataset.cat;
    currentLabel=this.dataset.label;
    fetchNews(currentCat);
  });
});

fetchNews('world');
