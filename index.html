<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>OWLS — True Global News Map</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <!-- Leaflet Harita -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0a1628; --bg2:#0f1e3a; --bg3:#162444; --card:#111d35;
      --border:#1e3054; --accent:#00e5c8; --accent2:#ff6b35; --text:#e8f4f8;
      --text2:#7a9bb5; --text3:#4a6980;
    }
    [data-theme="light"] {
      --bg:#f0f5fa; --bg2:#e4edf6; --bg3:#d8e7f2; --card:#ffffff;
      --border:#c5d8e8; --accent:#0098a0; --accent2:#e55a20; --text:#0a1628;
      --text2:#4a6880; --text3:#8aacbf;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); }

    /* SPLASH */
    .splash { position:fixed; inset:0; background:#040d1a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99999; transition:opacity 0.4s; }
    .splash.hide { opacity:0; pointer-events:none; }
    .splash-owl { font-size:72px; animation:float 2s ease-in-out infinite; }
    .splash-title { font-size:52px; font-weight:800; color:#00e5c8; letter-spacing:10px; margin-top:12px; }
    .splash-bar { width:180px; height:2px; background:rgba(0,229,200,0.15); margin-top:28px; overflow:hidden; }
    .splash-fill { height:100%; background:#00e5c8; animation:loadBar 1.5s ease forwards; }
    @keyframes loadBar { from{width:0} to{width:100%} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    /* HEADER */
    .header { height:52px; background:var(--card); border-bottom:1px solid var(--border); padding:0 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:500; position:relative; }
    .logo { display:flex; align-items:center; gap:8px; }
    .logo-name { font-size:17px; font-weight:800; letter-spacing:3px; color:var(--accent); }
    .hdr-right { display:flex; align-items:center; gap:6px; }
    .hbtn { background:var(--bg3); border:1px solid var(--border); color:var(--text2); padding:5px 11px; border-radius:8px; cursor:pointer; font-size:11px; font-weight:600; }
    .uavatar { width:28px; height:28px; border-radius:50%; border:2px solid var(--accent); display:none; cursor:pointer; }

    /* TOP BARS */
    .top-bars { height: 42px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; padding:0 14px; overflow-x:auto; gap:6px; scrollbar-width:none; }
    .top-bars::-webkit-scrollbar { display:none; }
    .cbtn { font-size:11px; font-weight:700; padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--text2); cursor:pointer; white-space:nowrap; }
    .cbtn.active { background:var(--accent); color:#000; border-color:var(--accent); }

    /* LAYOUT - ESNEK KUTU HATASI KESİN GİDERİLDİ */
    .app-wrap { display:block; width:100%; height:100%; }
    .layout { width: 100%; height: calc(100vh - 94px); display: block; position: relative; }
    
    #map { position: absolute; top: 0; left: 0; width: calc(100% - 350px); height: 100%; background: #040d1a; z-index: 1; }
    .sidebar { position: absolute; top: 0; right: 0; width: 350px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 10; display: flex; flex-direction: column; }

    /* HARITA PREMIUM CSS */
    .leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 14px; padding: 4px; }
    .leaflet-popup-tip { background: var(--card); border: 1px solid var(--border); border-top: none; border-left: none; }
    .leaflet-popup-content { font-family: 'Syne', sans-serif; margin: 12px; }
    .leaflet-container a.leaflet-popup-close-button { color: var(--text2); padding: 8px; }
    .leaflet-control-zoom { border: none !important; margin-right: 16px !important; margin-bottom: 24px !important;}
    .leaflet-bar a { background-color: var(--card) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; width: 36px !important; height: 36px !important; line-height: 34px !important; }
    .ccluster { background: var(--card)!important; border: 2px solid var(--border)!important; border-radius: 50%!important; color: var(--text)!important; font-weight: 800!important; font-family: 'Space Mono', monospace!important; display: flex!important; align-items: center!important; justify-content: center!important; }

    /* SIDEBAR ICERIK */
    .spanel { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
    .live-row { padding:7px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); flex-shrink:0; background: var(--bg2); }
    .live-dot { font-size:10px; color:#00e676; font-family:'Space Mono',monospace; font-weight:700; display: flex; align-items: center; gap: 5px;}
    .live-dot::before { content:''; width:6px; height:6px; background:#00e676; border-radius:50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0%{opacity:1;} 50%{opacity:0.3;} 100%{opacity:1;} }
    .news-scroll { overflow-y:auto; flex:1; padding-bottom: 20px;}

    .ncard { padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
    .ncard:hover { background:var(--bg3); }
    .ncard-row { display:flex; gap:10px; }
    .nthumb { width:68px; height:50px; object-fit:cover; border-radius:6px; background:var(--bg3); }
    .ninfo { flex:1; }
    .nsrc { font-size:9px; font-weight:700; color:var(--accent2); font-family:'Space Mono',monospace; }
    .ntitle { font-size:12px; font-weight:700; margin:3px 0; color:var(--text); line-height: 1.4;}
    .nloc { background:var(--bg3); border:1px solid var(--border); border-radius:4px; padding:2px 6px; font-size:9px; font-family:'Space Mono',monospace; color: var(--accent); display: inline-block;}

    /* MOBILE DÜZENİ */
    @media (max-width:768px) {
      .top-bars { display:none; }
      .layout { display: flex; flex-direction: column; height: calc(100vh - 52px); }
      #map { position: relative; width: 100%; height: 40vh; flex: none; }
      .sidebar { position: relative; width: 100%; height: 60vh; flex: none; border-left: none; border-top: 1px solid var(--border); }
    }
  </style>
</head>
<body data-theme="dark">

<div class="splash" id="splash">
  <div class="splash-owl">🦉</div>
  <div class="splash-title">OWLS</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<div class="app-wrap">
  <div class="header">
    <div class="logo">
      <span class="owl-anim">🦉</span>
      <div class="logo-name">OWLS</div>
    </div>
    <div class="hdr-right">
      <button class="hbtn" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <button class="hbtn" id="loginBtn" onclick="loginGoogle()">Login</button>
      <img src="" id="uavatar" class="uavatar" onclick="doLogout()">
    </div>
  </div>

  <div class="top-bars">
    <button class="cbtn active" onclick="cat(this,'world')">🌍 World</button>
    <button class="cbtn" onclick="cat(this,'technology')">💻 Tech</button>
    <button class="cbtn" onclick="cat(this,'business')">📈 Business</button>
    <button class="cbtn" onclick="cat(this,'science')">🔬 Science</button>
    <button class="cbtn" onclick="cat(this,'health')">❤️ Health</button>
    <button class="cbtn" onclick="cat(this,'sport')">⚽ Sport</button>
  </div>

  <div class="layout">
    <div id="map"></div>
    <div class="sidebar">
      <div class="spanel">
        <div class="live-row">
          <div class="live-dot" id="lStatus">SCANNING SATELLITES</div>
          <span style="font-size:9px; color:var(--text3); font-family: 'Space Mono', monospace;" id="scount">0 signals</span>
        </div>
        <div class="news-scroll" id="newsList"></div>
      </div>
    </div>
  </div>
</div>

<script>
// FIREBASE
const fbCfg = {
  apiKey: "AIzaSyBf3EDUobPIaZL6Jzu5i1ITT8YRSZaCOa8",
  authDomain: "newsmap-5d380.firebaseapp.com",
  projectId: "newsmap-5d380",
  storageBucket: "newsmap-5d380.firebasestorage.app",
  messagingSenderId: "270586913079",
  appId: "1:270586913079:web:271cb786e7195299f73ab2",
  measurementId: "G-HHK7MV2HBG"
};
firebase.initializeApp(fbCfg);
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider(); // LOGIN HATASI İÇİN DÜZELTİLDİ

// HARİTA
const map = L.map('map',{zoomControl:false}).setView([20,10],2);
L.control.zoom({position:'bottomright'}).addTo(map);
let tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
let clusterLayer = L.markerClusterGroup({ maxClusterRadius:40, iconCreateFunction:c=>L.divIcon({html:`<div class="ccluster" style="width:30px;height:30px">${c.getChildCount()}</div>`,className:''}) });
map.addLayer(clusterLayer);

function mkIcon(color){
  return L.divIcon({ html:`<div style="width:14px;height:14px;background:${color};border-radius:50%;border:2px solid var(--card);box-shadow:0 0 12px ${color}aa;"></div>`, iconSize:[14,14], iconAnchor:[7,7], className:'' });
}

// LOKASYON BULUCU
const CITIES = {'new york':[40.71,-74.00], 'london':[51.50,-0.12], 'paris':[48.85,2.35], 'tokyo':[35.68,139.69], 'istanbul':[41.01,28.97], 'moscow':[55.75,37.61], 'beijing':[39.90,116.40], 'dubai':[25.20,55.27], 'sydney':[-33.86,151.20]};
const CAPS = {us:[38.90,-77.03], gb:[51.50,-0.12], tr:[39.92,32.85], de:[52.52,13.40], ru:[55.75,37.61], in:[28.61,77.20], cn:[39.90,116.40], br:[-15.82,-47.92]};
const CNAMES = {us:'USA', gb:'UK', tr:'Turkey', de:'Germany', ru:'Russia', in:'India', cn:'China', br:'Brazil'};

function getCoords(text) {
  const t = text.toLowerCase();
  for(const [c, coords] of Object.entries(CITIES)) if(t.includes(c)) return {c:[coords[0]+(Math.random()-0.5)*0.2, coords[1]+(Math.random()-0.5)*0.2], l:c.toUpperCase()};
  for(const [code, name] of Object.entries(CNAMES)) if(t.includes(name.toLowerCase())) return {c:[CAPS[code][0]+(Math.random()-0.5)*1, CAPS[code][1]+(Math.random()-0.5)*1], l:name};
  return {c:[40.71+(Math.random()-0.5)*2, -74.00+(Math.random()-0.5)*2], l:'USA (HQ)'};
}

// ASENKRON CANLI YÜKLEME MOTORU (INCREMENTAL RENDERING)
let globalSeenTitles = new Set();
let articleCount = 0;

async function fetchWithTimeout(url, timeout=2500) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), timeout);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    return await res.json();
  } catch (e) {
    clearTimeout(id);
    return null;
  }
}

function processIncomingNews(articles, category) {
    const list = document.getElementById('newsList');
    let addedCount = 0;

    articles.forEach(a => {
        if(!a.title || globalSeenTitles.has(a.title)) return;
        globalSeenTitles.add(a.title);
        
        const locInfo = getCoords(a.title);
        const m = L.marker(locInfo.c, {icon: mkIcon('#00e5c8')});
        m.bindPopup(`<b>${a.title}</b><br><span style="font-size:10px">${a.source}</span>`);
        clusterLayer.addLayer(m);

        const card = document.createElement('div');
        card.className = 'ncard';
        card.onclick = () => window.open(a.url, '_blank');
        card.innerHTML = `
          <div class="ncard-row">
            ${a.thumb ? `<img src="${a.thumb}" class="nthumb">` : '<div class="nthumb" style="display:flex;align-items:center;justify-content:center">📰</div>'}
            <div class="ninfo">
              <div class="nsrc">${a.source}</div>
              <div class="ntitle">${a.title.slice(0,70)}...</div>
              <div class="nloc">${locInfo.l}</div>
            </div>
          </div>
        `;
        list.appendChild(card);
        addedCount++;
    });

    articleCount += addedCount;
    document.getElementById('scount').innerText = `${articleCount} signals acquired`;
}

// BİREYSEL KAYNAK GETİRİCİLER
async function fetchGuardianLive(cat) {
  const c = (cat==='sport'||cat==='health') ? 'world' : cat;
  const d = await fetchWithTimeout(`https://content.guardianapis.com/${c}?api-key=0a321643-aaab-4c6a-9185-1762685abe3d&page-size=15&show-fields=thumbnail`);
  if(d && d.response?.results) {
      processIncomingNews(d.response.results.map(a=>({ title:a.webTitle, url:a.webUrl, source:'Guardian', thumb:a.fields?.thumbnail })), cat);
  }
}

async function fetchRssLive(url, name, cat) {
  const d = await fetchWithTimeout(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=10`, 3000);
  if(d && d.status === 'ok') {
      processIncomingNews(d.items.map(i=>({ title:i.title, url:i.link, source:name, thumb:i.thumbnail })), cat);
  }
}

// ANA TETİKLEYİCİ
function fetchNews(category) {
  document.getElementById('newsList').innerHTML = '';
  clusterLayer.clearLayers();
  globalSeenTitles.clear();
  articleCount = 0;
  document.getElementById('scount').innerText = `0 signals acquired`;
  document.getElementById('lStatus').innerText = 'RADAR ACTIVE';

  fetchGuardianLive(category);

  if(category === 'world') {
      fetchRssLive('http://rss.cnn.com/rss/edition_world.rss', 'CNN', category);
      fetchRssLive('https://www.aljazeera.com/xml/rss/all.xml', 'Al Jazeera', category);
      fetchRssLive('https://www.ntv.com.tr/dunya.rss', 'NTV', category);
      fetchRssLive('http://feeds.bbci.co.uk/news/world/rss.xml', 'BBC', category);
  }
  else if(category === 'business') {
      fetchRssLive('https://search.cnbc.com/rs/search/combinedcms/view.xml?profile=12000000&id=10000664', 'CNBC', category);
      fetchRssLive('https://www.ntv.com.tr/ekonomi.rss', 'NTV', category);
      fetchRssLive('http://feeds.bbci.co.uk/news/business/rss.xml', 'BBC', category);
  }
  else if(category === 'technology') {
      fetchRssLive('https://techcrunch.com/feed/', 'TechCrunch', category);
      fetchRssLive('https://www.theverge.com/rss/index.xml', 'The Verge', category);
  }
  else if(category === 'sport') {
      fetchRssLive('https://www.espn.com/espn/rss/news', 'ESPN', category);
      fetchRssLive('https://www.skysports.com/rss/12040', 'Sky Sports', category);
      fetchRssLive('https://www.ntv.com.tr/sporskor.rss', 'NTV Spor', category);
  }
  else {
      fetchRssLive('http://feeds.bbci.co.uk/news/health/rss.xml', 'BBC Health', category);
  }
}

function cat(btn, q) {
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  fetchNews(q);
}

// KARANLIK MOD - SİYAH EKRAN KESİN ÇÖZÜMÜ (sadece setUrl kullanıldı)
function toggleTheme() {
  const isDark = document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  
  const newUrl = isDark ? 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png';
  tileLayer.setUrl(newUrl);
}

// GİRİŞ FONKSİYONLARI DÜZELTİLDİ
function loginGoogle() { 
    auth.signInWithPopup(provider).catch(e => {
        console.error(e);
        alert("Giriş yapılırken bir hata oluştu: " + e.message);
    }); 
}

function doLogout() { 
    if(confirm("Çıkış yapmak istiyor musun?")) auth.signOut(); 
}

auth.onAuthStateChanged(u=>{ 
  document.getElementById('loginBtn').style.display=u?'none':'block'; 
  if(u){ 
      document.getElementById('uavatar').src=u.photoURL; 
      document.getElementById('uavatar').style.display='block'; 
  } else {
      document.getElementById('uavatar').style.display='none';
  }
});

window.addEventListener('resize', () => map.invalidateSize());

window.addEventListener('load', () => {
  sessionStorage.clear();
  setTimeout(() => { 
    document.getElementById('splash').classList.add('hide'); 
    map.invalidateSize();
  }, 800);
  fetchNews('world');
});
</script>
</body>
</html>
