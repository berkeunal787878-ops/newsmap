<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>OWLS — World News Map</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TG3Q7KX51N"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TG3Q7KX51N');
  </script>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f7f7; color: #1a2e2e; overflow: hidden; }

    /* HEADER */
    .header {
      background: #fff;
      border-bottom: 1px solid #d0eaea;
      padding: 0 20px;
      height: 58px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1000;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .owl-icon { width: 36px; height: 36px; animation: owlBlink 4s infinite; }
    @keyframes owlBlink {
      0%, 90%, 100% { transform: scaleY(1); }
      92% { transform: scaleY(0.1); }
      95% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); }
    }
    .logo-text { font-size: 20px; font-weight: 700; letter-spacing: 2px; color: #0d9488; }
    .logo-sub { font-size: 10px; color: #5eead4; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-top: -3px; }

    .category-bar { display: flex; gap: 6px; flex-wrap: wrap; }
    .cat-btn {
      font-size: 12px; padding: 5px 14px; border-radius: 20px;
      border: 1px solid #99d6d0; background: #fff;
      color: #0d9488; cursor: pointer; transition: all 0.2s; font-weight: 600;
    }
    .cat-btn:hover { background: #f0fdfa; border-color: #0d9488; }
    .cat-btn.active { background: #0d9488; color: #fff; border-color: #0d9488; }

    /* LAYOUT */
    .layout { display: flex; height: calc(100vh - 58px); }
    #map { flex: 1; }

    /* SIDEBAR */
    .sidebar {
      width: 350px; background: #fff;
      border-left: 1px solid #d0eaea;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px; border-bottom: 1px solid #e6f7f5;
      font-size: 11px; font-weight: 800; color: #0d9488;
      letter-spacing: 1px; text-transform: uppercase;
      display: flex; align-items: center; justify-content: space-between;
    }
    .live-dot { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #10b981; font-weight: 700; }
    .live-dot::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: #10b981; animation: pulse 2s infinite; box-shadow: 0 0 6px #10b981;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .news-list { overflow-y: auto; flex: 1; }
    .news-card {
      border-bottom: 1px solid #f0faf9;
      cursor: pointer; transition: all 0.15s;
      animation: slideIn 0.3s ease forwards; opacity: 0;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .news-card:hover { background: #f0fdfa; }
    .news-card.active { background: #e6f7f5; border-left: 4px solid #0d9488; }
    
    .news-thumb { width: 100%; height: 150px; object-fit: cover; display: block; }
    .news-card-body { padding: 14px 16px; }

    .news-cat-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 10px; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.3px;
    }
    .news-title { font-size: 14px; font-weight: 700; line-height: 1.45; color: #1a2e2e; margin-bottom: 5px; }
    .news-source { font-size: 11px; color: #94a3b8; font-weight: 500; }

    /* LOADING */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100%; flex-direction: column; gap: 14px; color: #5eead4;
      padding: 40px 20px; text-align: center;
    }
    .owl-loading { font-size: 44px; animation: owlFloat 2s ease-in-out infinite; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    @keyframes owlFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .loading-text { font-size: 13px; color: #0d9488; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}

    /* MAP POPUP */
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important; border: 1px solid #d0eaea !important;
      box-shadow: 0 8px 25px rgba(13,148,136,0.15) !important; padding: 0 !important; overflow: hidden !important;
    }
    .leaflet-popup-content { margin: 0 !important; width: 260px !important; }
    .popup-img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .popup-body { padding: 15px; font-family: 'Inter', sans-serif; }
    .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; color: #1a2e2e; }
    .popup-source { font-size: 11px; color: #94a3b8; margin-bottom: 10px; font-weight: 500; }
    .popup-link { display: inline-block; font-size: 11px; color: #fff; background: #0d9488; padding: 6px 12px; border-radius: 15px; text-decoration: none; font-weight: 700; transition: 0.2s; }
    .popup-link:hover { background: #0f766e; }

    /* --- DOPAMINE POPUP --- */
    .dopamine-popup {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px);
      background: linear-gradient(135deg, #ff0f4f, #ff8c00); color: white;
      padding: 15px 25px; border-radius: 30px; font-weight: 800; box-shadow: 0 10px 30px rgba(255,15,79,0.3);
      z-index: 3000; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; align-items: center; gap: 15px; cursor: pointer; max-width: 90%; width: 420px;
    }
    .dopamine-popup.show { transform: translateX(-50%) translateY(0); }
    .dopamine-popup:hover { transform: translateX(-50%) translateY(-5px) scale(1.02); }
    .dopamine-icon { font-size: 24px; animation: owlFloat 1s infinite alternate; }
    .dopamine-text { display: flex; flex-direction: column; font-size: 13px; line-height: 1.4; }
    .dopamine-action { font-size: 10px; color: #ffeeee; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }

    @keyframes markerPulseAnim {
      0% { transform: scale(0.8); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* INTRO SPLASH */
    .splash {
      position: fixed; inset: 0; background: #0d9488;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.6s ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }
    .splash-owl { font-size: 80px; animation: owlFloat 1.5s ease-in-out infinite; }
    .splash-title { font-size: 42px; font-weight: 800; color: #fff; letter-spacing: 6px; margin-top: 16px; }
    .splash-sub { font-size: 14px; color: #99f6e4; letter-spacing: 2px; margin-top: 8px; font-weight: 600; }
    .splash-bar {
      width: 200px; height: 3px; background: rgba(255,255,255,0.2);
      border-radius: 2px; margin-top: 30px; overflow: hidden;
    }
    .splash-bar-fill {
      height: 100%; background: #fff; border-radius: 2px;
      animation: loadBar 1.8s ease forwards;
    }
    @keyframes loadBar { from { width: 0; } to { width: 100%; } }

    @media (max-width: 600px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: 300px; border-left: none; border-top: 1px solid #d0eaea; }
      .category-bar { display: none; }
      .dopamine-popup { top: 70px; bottom: auto; transform: translateX(-50%) translateY(-150px); width: 90%; }
      .dopamine-popup.show { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div class="splash" id="splash">
  <div class="splash-owl">🦉</div>
  <div class="splash-title">OWLS</div>
  <div class="splash-sub">WORLD NEWS MAP</div>
  <div class="splash-bar"><div class="splash-bar-fill"></div></div>
</div>

<div class="header">
  <div class="logo">
    <svg class="owl-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="20" cy="24" rx="13" ry="14" fill="#0d9488"/>
      <ellipse cx="20" cy="22" rx="11" ry="12" fill="#0f766e"/>
      <polygon points="10,12 13,4 16,12" fill="#0d9488"/>
      <polygon points="24,12 27,4 30,12" fill="#0d9488"/>
      <circle cx="15" cy="20" r="5" fill="#fff"/>
      <circle cx="25" cy="20" r="5" fill="#fff"/>
      <circle cx="15" cy="20" r="3" fill="#1a2e2e" class="eye-left"/>
      <circle cx="25" cy="20" r="3" fill="#1a2e2e" class="eye-right"/>
      <circle cx="16" cy="19" r="1" fill="#fff"/>
      <circle cx="26" cy="19" r="1" fill="#fff"/>
      <polygon points="20,23 18,26 22,26" fill="#f59e0b"/>
      <ellipse cx="8" cy="28" rx="5" ry="8" fill="#0d9488" transform="rotate(-15 8 28)"/>
      <ellipse cx="32" cy="28" rx="5" ry="8" fill="#0d9488" transform="rotate(15 32 28)"/>
      <ellipse cx="20" cy="30" rx="6" ry="4" fill="#5eead4" opacity="0.5"/>
    </svg>
    <div>
      <div class="logo-text">OWLS</div>
      <div class="logo-sub">Global News Map</div>
    </div>
  </div>

  <div class="category-bar">
    <button class="cat-btn active" data-q="world" data-label="WORLD">🌍 World</button>
    <button class="cat-btn" data-q="technology" data-label="TECH">💻 Tech</button>
    <button class="cat-btn" data-q="business" data-label="BUSINESS">📈 Business</button>
    <button class="cat-btn" data-q="science" data-label="SCIENCE">🔬 Science</button>
    <button class="cat-btn" data-q="health" data-label="HEALTH">❤️ Health</button>
    <button class="cat-btn" data-q="sport" data-label="SPORT">⚽ Sport</button>
  </div>
</div>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Live Global Feed</span>
      <div class="live-dot">LIVE</div>
    </div>
    <div class="news-list" id="newsList">
      <div class="loading">
        <div class="owl-loading">🦉</div>
        <div class="loading-text">Loading news...</div>
      </div>
    </div>
  </div>
</div>

<!-- DOPAMINE POPUP -->
<div id="dopaminePopup" class="dopamine-popup">
  <div class="dopamine-icon">🔥</div>
  <div class="dopamine-text">
    <span id="dopamineTitle">Breaking News!</span>
    <span class="dopamine-action">Click here to read now 🦉</span>
  </div>
</div>

<script>
// Splash ekranını kapat
setTimeout(() => {
  document.getElementById('splash').classList.add('hide');
  setTimeout(() => document.getElementById('splash').remove(), 700);
}, 2000);

const GUARDIAN_KEY = '0a321643-aaab-4c6a-9185-1762685abe3d';

const map = L.map('map', { zoomControl: true }).setView([20, 10], 2);

// RENKLİ HARİTA (VOYAGER TEMA)
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; CartoDB &copy; OSM',
  subdomains: 'abcd', maxZoom: 18
}).addTo(map);

const COORDS = {
  us:[37,-95], gb:[54,-2], de:[51,10], fr:[46,2], jp:[36,138],
  cn:[35,104], ru:[61,105], in:[20,78], br:[-14,-51], au:[-25,133],
  ca:[56,-106], za:[-30,22], ng:[9,8], eg:[26,30], mx:[23,-102],
  ar:[-38,-63], tr:[38,35], sa:[23,45], id:[-0,113], it:[41,12],
  es:[40,-3], kr:[35,127], ua:[49,31], pl:[51,19], il:[31,34],
  ae:[23,53], sg:[1,103], pk:[30,69], th:[15,100], nl:[52,5],
};

const CNAMES = {
  us:'USA', gb:'UK', de:'Germany', fr:'France', jp:'Japan',
  cn:'China', ru:'Russia', in:'India', br:'Brazil', au:'Australia',
  ca:'Canada', za:'South Africa', ng:'Nigeria', eg:'Egypt', mx:'Mexico',
  ar:'Argentina', tr:'Turkey', sa:'Saudi Arabia', id:'Indonesia', it:'Italy',
  es:'Spain', kr:'S. Korea', ua:'Ukraine', pl:'Poland', il:'Israel',
  ae:'UAE', sg:'Singapore', pk:'Pakistan', th:'Thailand', nl:'Netherlands',
};

const COLORS = {
  'world':'#0d9488', 'technology':'#7c3aed', 'business':'#059669',
  'science':'#0891b2', 'health':'#dc2626', 'sport':'#d97706'
};

function detectCountry(text) {
  const t = text.toLowerCase();
  const mapKeywords = {
    'united states':'us','usa':'us','america':'us','washington':'us','new york':'us',
    'united kingdom':'gb','uk':'gb','u.k.':'gb','britain':'gb','london':'gb','england':'gb','bbc':'gb','premier league':'gb','scottish':'gb','scotland':'gb',
    'germany':'de','berlin':'de','france':'fr','paris':'fr',
    'japan':'jp','tokyo':'jp','china':'cn','beijing':'cn','shanghai':'cn',
    'russia':'ru','moscow':'ru','india':'in','delhi':'in','mumbai':'in',
    'brazil':'br','australia':'au','sydney':'au','canada':'ca','toronto':'ca',
    'south africa':'za','nigeria':'ng','egypt':'eg','mexico':'mx',
    'argentina':'ar','turkey':'tr','istanbul':'tr','ankara':'tr',
    'saudi':'sa','indonesia':'id','italy':'it','rome':'it',
    'spain':'es','madrid':'es','korea':'kr','ukraine':'ua','kyiv':'ua',
    'poland':'pl','israel':'il','tel aviv':'il','dubai':'ae','singapore':'sg',
    'pakistan':'pk','thailand':'th','netherlands':'nl','amsterdam':'nl',
  };
  for(const [k,v] of Object.entries(mapKeywords)) {
    if(t.includes(k)) return v;
  }
  return null;
}

let markers = [];
let currentQ = 'world';
let currentLabel = 'WORLD';
let dopamineTimer;

function clearMarkers() { markers.forEach(m => map.removeLayer(m)); markers = []; }

function getCoords(text, i, category) {
  let code = detectCountry(text);
  
  // Eğer spor haberi ise ve ülke bulunamadıysa İngiltere'ye (UK) ata. Alakasız yerlere gitmesini engeller.
  if(!code && category === "sport") code = 'gb';

  const keys = Object.keys(COORDS);
  const k = code || keys[i % keys.length];
  const b = COORDS[k] || COORDS['us'];
  
  // Sapma oranını azalttım (1.5) ki noktalar ülkelerin içinde kalsın.
  return {
    coords: [b[0]+(Math.random()-.5)*1.5, b[1]+(Math.random()-.5)*1.5],
    country: CNAMES[k] || 'World'
  };
}

// Renkli ve nabız atan işaretçi
function pulseIcon(color) {
  return L.divIcon({
    className: '',
    html: `
      <div style="position:relative; width:16px; height:16px;">
        <div style="position:absolute; inset:0; border-radius:50%; border:3px solid ${color}; animation:markerPulseAnim 2s infinite; opacity:0.7;"></div>
        <div style="position:absolute; inset:2px; border-radius:50%; background:${color}; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>
      </div>
    `,
    iconSize:[16,16], iconAnchor:[8,8]
  });
}

function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const h = Math.floor(diff/3600000), m = Math.floor(diff/60000);
  if(h>24) return Math.floor(h/24)+' days ago';
  if(h>0) return h+' hours ago';
  return m > 0 ? m+' mins ago' : 'Just now';
}

function triggerDopamine(articles) {
    clearTimeout(dopamineTimer);
    const popup = document.getElementById('dopaminePopup');
    if(!popup) return;
    popup.classList.remove('show');

    if(!articles || articles.length < 3) return; 
    
    const randomTime = Math.floor(Math.random() * 4000) + 4000;
    
    dopamineTimer = setTimeout(() => {
        const randomArticle = articles[Math.floor(Math.random() * Math.min(articles.length, 10))];
        const titleEl = document.getElementById('dopamineTitle');
        const titleText = randomArticle.webTitle || randomArticle.title || "Breaking News Update!";
        
        if(titleEl) {
          titleEl.innerText = titleText.length > 55 ? titleText.substring(0,55) + "..." : titleText;
        }
        
        const url = randomArticle.webUrl || randomArticle.url || randomArticle.link || "#";
        popup.onclick = () => window.open(url, '_blank');
        popup.classList.add('show');
        
        setTimeout(() => { popup.classList.remove('show'); }, 8000);
    }, randomTime);
}

function renderNews(results) {
  const list = document.getElementById('newsList');
  const color = COLORS[currentQ] || '#0d9488';
  clearMarkers(); list.innerHTML = '';

  if(!results || results.length === 0) {
    list.innerHTML = '<div class="loading"><span>News not found.</span></div>'; return;
  }

  results.slice(0,20).forEach((a, i) => {
    const title = a.webTitle || a.title || '';
    if(!title) return;
    const trailText = a.fields?.trailText || a.description || '';
    const fullText = title + ' ' + trailText;
    
    // Spor kategorisini gönderiyoruz ki UK kontrolü yapılsın
    const {coords, country} = getCoords(fullText, i, currentQ);
    const url = a.webUrl || a.link;
    const date = a.webPublicationDate || a.pubDate;

    // Resim kontrolü (Guardian veya BBC RSS)
    const thumbUrl = a.fields?.thumbnail || a.thumbnail || (a.enclosure && a.enclosure.link) || null;
    const thumbHtml = thumbUrl ? `<img src="${thumbUrl}" class="news-thumb" onerror="this.style.display='none'"/>` : '';
    const popupThumbHtml = thumbUrl ? `<img src="${thumbUrl}" class="popup-img" onerror="this.style.display='none'"/>` : '';

    const marker = L.marker(coords, {icon: pulseIcon(color)}).addTo(map);
    marker.bindPopup(`
      <div style="font-family:'Inter',sans-serif">
        ${popupThumbHtml}
        <div class="popup-body">
          <div class="popup-title">${title}</div>
          <div class="popup-source">${currentQ === "sport" ? "BBC Sport" : "The Guardian"} · ${country}</div>
          <a class="popup-link" href="${url}" target="_blank">Read more →</a>
        </div>
      </div>
    `);
    markers.push(marker);

    const card = document.createElement('div');
    card.className = 'news-card';
    card.style.animationDelay = (i * 0.05) + 's';
    
    // Resim varsa karda ekle
    card.innerHTML = `
      ${thumbHtml}
      <div class="news-card-body">
        <div class="news-cat-badge" style="background:${color}22;color:${color}">${currentLabel} · ${country}</div>
        <div class="news-title">${title}</div>
        <div class="news-source">${currentQ === "sport" ? "BBC Sport" : "The Guardian"} · ${timeAgo(date)}</div>
      </div>
    `;
    
    card.addEventListener('click', () => {
      document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      map.setView(coords, 5, {animate:true});
      setTimeout(()=>marker.openPopup(), 400);
    });
    list.appendChild(card);
  });

  triggerDopamine(results);
}

async function fetchNews(section) {
  const list = document.getElementById('newsList');
  list.innerHTML = `<div class="loading"><div class="owl-loading">🦉</div><div class="loading-text">Loading news...</div></div>`;

  if (section === "sport") {
    try {
      const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=http://feeds.bbci.co.uk/sport/football/rss.xml");
      const data = await res.json();

      const articles = (data.items || []).map(item => ({
        webTitle: item.title,
        webUrl: item.link,
        webPublicationDate: item.pubDate,
        fields: { 
          trailText: item.description || "",
          thumbnail: item.thumbnail || (item.enclosure && item.enclosure.link) || null
        }
      }));

      if (articles.length > 0) {
        renderNews(articles);
      } else {
        list.innerHTML = '<div class="loading"><div class="loading-text">No sports news found.</div></div>';
      }
    } catch (e) {
      list.innerHTML = '<div class="loading"><div class="loading-text">Could not fetch sports news.</div></div>';
    }
    return;
  }

  try {
    // Fotoğrafların (thumbnail) gelmesi için show-fields=thumbnail,trailText yapıldı.
    const url = `https://content.guardianapis.com/${section}?api-key=${GUARDIAN_KEY}&page-size=20&show-fields=thumbnail,trailText&order-by=newest`;
    const res = await fetch(url);
    const data = await res.json();

    if (data.response?.results?.length > 0) {
      renderNews(data.response.results);
    } else {
      list.innerHTML = '<div class="loading"><div class="loading-text">News not found.</div></div>';
    }
  } catch (e) {
    list.innerHTML = '<div class="loading"><div class="loading-text">Connection error. Refresh the page.</div></div>';
  }
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentQ = this.dataset.q;
    currentLabel = this.dataset.label;
    fetchNews(currentQ);
  });
});

fetchNews(currentQ);
</script>
</body>
</html>
