    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    /* --- TEMA DEĞİŞKENLERİ --- */
    :root {
      --bg-body: #f0f7f7;
      --bg-header: #ffffff;
      --bg-sidebar: #ffffff;
      --text-main: #1a2e2e;
      --text-sub: #64748b;
      --border: #ccece9;
      --accent: #0d9488;
      --card-hover: #f0fdfa;
      --map-filter: none;
    }

    [data-theme="dark"] {
      --bg-body: #0f172a;
      --bg-header: #1e293b;
      --bg-sidebar: #1e293b;
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --border: #334155;
      --accent: #2dd4bf;
      --card-hover: #0f172a;
      --map-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* Orijinal Splash */
    .splash {
      position: fixed;
      inset: 0;
      background: #0d9488;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }
    .splash-owl { font-size: 70px; animation: float 1.5s ease-in-out infinite; }
    .splash-title { font-size: 44px; font-weight: 700; color: #fff; letter-spacing: 8px; margin-top: 12px; }
    .splash-sub { font-size: 12px; color: #99f6e4; letter-spacing: 3px; margin-top: 6px; text-transform: uppercase; }
    .splash-bar { width: 180px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 26px; overflow: hidden; }
    .splash-progress { height: 100%; background: #fff; border-radius: 2px; width: 0; transition: width 1.4s ease; }

    .header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      gap: 12px;
    }

    .logo { display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
    .owl-svg { width: 34px; height: 34px; animation: blink 5s infinite; }
    .logo-text { font-size: 19px; font-weight: 700; letter-spacing: 2.5px; color: #0d9488; }
    .logo-sub { font-size: 9px; color: #5eead4; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-top: -2px; }

    .cat-bar { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }
    .cat-btn {
      font-size: 11px; padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg-header);
      color: var(--accent); cursor: pointer; transition: all 0.2s; font-weight: 500; white-space: nowrap;
    }
    .cat-btn:hover { background: var(--card-hover); }
    .cat-btn.active { background: #0d9488; color: #fff; border-color: #0d9488; }

    /* Tema Butonu */
    .theme-toggle {
      background: var(--accent); color: white; border: none; padding: 5px 12px;
      border-radius: 15px; cursor: pointer; font-size: 11px; font-weight: 700;
      margin-right: 10px;
    }

    .layout { display: flex; height: calc(100vh - 56px); }
    #map { flex: 1; min-width: 0; filter: var(--map-filter); }

    .sidebar {
      width: 340px; flex-shrink: 0; background: var(--bg-sidebar);
      border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: #0d9488; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
    .live-dot { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #10b981; }
    .live-dot::before { content:''; width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: livePulse 2s infinite; }

    .news-list { overflow-y: auto; flex: 1; }
    .news-card { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; animation: slideIn 0.35s ease both; overflow: hidden; }
    .news-card:hover { background: var(--card-hover); }
    .news-card.active { background: var(--card-hover); border-left: 3px solid #0d9488; }
    .news-card-body { padding: 10px 14px 12px; }

    /* Sentiment Badge */
    .sentiment-badge { font-size: 8px; font-weight: 800; padding: 2px 5px; border-radius: 4px; margin-right: 5px; color: white; }

    .news-title { font-size: 12.5px; font-weight: 600; line-height: 1.45; color: var(--text-main); margin-bottom: 4px; }
    .news-meta { font-size: 10px; color: var(--text-sub); }

    /* Keyframes */
    @keyframes blink { 0%,88%,100% { transform: scaleY(1); } 91%,97% { transform: scaleY(0.08); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .pulse-marker { border-radius: 50%; border: 2.5px solid #fff; animation: markerPulse 2.5s ease-in-out infinite; cursor: pointer; }
    @keyframes markerPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }

    .loading { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 12px; padding: 40px 20px; text-align: center; }
    .loading-text { font-size: 12px; color: #0d9488; font-weight: 600; }

    .leaflet-popup-content-wrapper { border-radius: 12px !important; background: var(--bg-sidebar) !important; color: var(--text-main) !important; overflow: hidden !important; }
    .popup-body { padding: 10px 12px; }
    .popup-title { font-size: 12.5px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }

    @media (max-width: 900px) {
      .header { flex-direction: column; align-items: flex-start; height: auto; padding-bottom: 10px; }
      .layout { flex-direction: column; height: auto; }
      #map { height: 300px; }
      .sidebar { width: 100%; height: 400px; border-left: none; border-top: 1px solid var(--border); }
      body { overflow: auto; }
    }
  </style>
</head>

      return { label: 'NÖTR', color: '#3b82f6' };

    function detectLocation(text) {
      const t = (text || '').toLowerCase();
      for (const [k, v] of Object.entries(CLUBS)) { if (t.includes(k)) { for (const [city, coords] of Object.entries(CITY_COORDS)) { if (k.includes(city)) return { coords, country: k, isCity: true }; } return { countryCode: v }; } }

      for (const [k, v] of Object.entries(KEYWORDS)) { if (t.includes(k)) return { countryCode: v }; }
      return null;
    }

    function getCoords(text, i) {
      const loc = detectLocation(text);
      if (loc) {

      const k = keys[i % keys.length];
      const b = COUNTRY_COORDS[k];
      return { coords: [ b[0] + (Math.random() - 0.5) * 2, b[1] + (Math.random() - 0.5) * 2 ], label: COUNTRY_NAMES[k] || 'Dünya' };
    }

    function pulseIcon(color) {
      return L.divIcon({ className: '', html: `<div class="pulse-marker" style="width:14px;height:14px;background:${color};box-shadow:0 0 0 3px ${color}55"></div>`, iconSize: [14, 14], iconAnchor: [7, 7] });
    }

    function timeAgo(d) {
      if (!d) return '';
      const diff = Date.now() - new Date(d).getTime();
      const h = Math.floor(diff / 3600000);
      const mn = Math.floor(diff / 60000);
      if (h > 24) return Math.floor(h / 24) + ' gün önce';
      if (h > 0) return h + ' saat önce';
      return mn > 0 ? mn + ' dk önce' : 'Az önce';
    }

    function renderArticles(articles, sourceName) {
      const list = document.getElementById('newsList');
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      list.innerHTML = '';

      if (!articles || articles.length === 0) {
        list.innerHTML = '<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Haber bulunamadı.</div></div>';
        return;
      }

      articles.slice(0, 20).forEach((a, i) => {
        const sentiment = analyzeSentiment(a.title);
        const { coords, label } = getCoords(`${a.title} ${a.desc || ''}`, i);
        
        // Marker rengini sentiment'e göre yap (Opsiyonel: COLORS[currentCat] yerine sentiment.color kullanabilirsin)
        const markerColor = sentiment.color; 
        const marker = L.marker(coords, { icon: pulseIcon(markerColor) }).addTo(map);

        marker.bindPopup(`
          <div>
            ${a.thumb ? `<img src="${a.thumb}" style="width:100%;height:120px;object-fit:cover;display:block;border-radius:8px 8px 0 0"/>` : ''}
            <div class="popup-body">
              <div style="font-size:9px;font-weight:800;color:${sentiment.color}">${sentiment.label} · ${label}</div>
              <div class="popup-title">${a.title}</div>
              <div style="font-size:10px;color:#94a3b8">${a.source || sourceName} · ${timeAgo(a.date)}</div>
              <a href="${a.url}" target="_blank" style="font-size:11px;color:#0d9488;font-weight:700;text-decoration:none;display:block;margin-top:8px">Haberi oku →</a>
            </div>
          </div>
        `, { maxWidth: 240 });

        markers.push(marker);

        const card = document.createElement('div');
        card.className = 'news-card';
        card.style.animationDelay = (i * 0.05) + 's';
        card.innerHTML = `
          ${a.thumb ? `<img class="news-thumb" src="${a.thumb}" onerror="this.style.display='none'"/>` : ''}
          <div class="news-card-body">
            <div style="display:flex;align-items:center;margin-bottom:5px">
              <span class="sentiment-badge" style="background:${sentiment.color}">${sentiment.label}</span>
              <span style="font-size:9px;font-weight:700;color:#0d9488;text-transform:uppercase">${currentLabel}</span>
            </div>
            <div class="news-title">${a.title}</div>
            <div class="news-meta">${label} · ${timeAgo(a.date)}</div>
          </div>
        `;

        card.addEventListener('click', () => {
          document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          map.setView(coords, 5, { animate: true });
          setTimeout(() => marker.openPopup(), 450);
        });
        list.appendChild(card);
      });
    }

    async function fetchGuardian(section) {
      const res = await fetch(`https://content.guardianapis.com/${section}?api-key=${GUARDIAN_KEY}&page-size=20&order-by=newest&show-fields=thumbnail,trailText&show-tags=keyword`);
      const data = await res.json();
      return (data.response?.results || []).map(a => ({ title: a.webTitle, desc: (a.fields?.trailText || '') + ' ' + (a.tags || []).map(t => t.webTitle).join(' '), date: a.webPublicationDate, url: a.webUrl, thumb: a.fields?.thumbnail || null, source: 'The Guardian' }));
    }

    async function fetchGuardianSearch(query, sourceLabel) {
      const res = await fetch(`https://content.guardianapis.com/search?api-key=${GUARDIAN_KEY}&page-size=20&order-by=newest&show-fields=thumbnail,trailText&show-tags=keyword&q=${encodeURIComponent(query)}`);
      const data = await res.json();
      return (data.response?.results || []).map(a => ({ title: a.webTitle, desc: (a.fields?.trailText || '') + ' ' + (a.tags || []).map(t => t.webTitle).join(' '), date: a.webPublicationDate, url: a.webUrl, thumb: a.fields?.thumbnail || null, source: sourceLabel }));
    }

    async function fetchHN() {
      const res = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
      const ids = await res.json();
      const stories = await Promise.all(ids.slice(0, 15).map(id => fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json())));
      return stories.filter(s => s && s.title).map(s => ({ title: s.title, desc: '', thumb: null, date: new Date((s.time || Date.now()/1000) * 1000).toISOString(), url: s.url || `https://news.ycombinator.com/item?id=${s.id}`, source: 'Hacker News' }));
    }

    async function fetchNews(cat) {
      const list = document.getElementById('newsList');
      list.innerHTML = `<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Yükleniyor...</div></div>`;
      try {
        let articles = [];
        let src = 'The Guardian';
        if (cat === 'ai') articles = await fetchGuardianSearch(SEARCH_QUERIES.ai, 'Guardian AI');
        else if (cat === 'technology') { articles = [...(await fetchGuardianSearch(SEARCH_QUERIES.technology, 'Guardian Tech')), ...(await fetchHN())]; }
        else if (cat === 'startups') articles = await fetchGuardianSearch(SEARCH_QUERIES.startups, 'Guardian Startups');
        else if (cat === 'sport') articles = await fetchGuardian(SECTIONS.sport);
        else articles = await fetchGuardian(SECTIONS[cat] || 'world');

        // Tekrar edenleri temizle
        const seen = new Set();
        articles = articles.filter(a => { if (seen.has(a.url)) return false; seen.add(a.url); return true; });

        renderArticles(articles, src);
      } catch (e) { list.innerHTML = '<div class="loading">Hata oluştu.</div>'; }
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCat = this.dataset.cat;
        currentLabel = this.dataset.label;
        fetchNews(currentCat);
      });
    });

    fetchNews('world');
  </script>
</body>
</html>
