<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a1628"/>
  <title>OWLS — True Global News Map</title>
  <link rel="manifest" href="#"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <!-- Leaflet + Cluster -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a1628;
      --bg2: #0f1e3a;
      --bg3: #162444;
      --card: #111d35;
      --border: #1e3054;
      --accent: #00e5c8;
      --accent2: #ff6b35;
      --accent3: #7c6bff;
      --text: #e8f4f8;
      --text2: #7a9bb5;
      --text3: #4a6980;
      --saved: #ffd700;
      --danger: #ff4757;
      --map-filter: brightness(1.1) contrast(1.05);
    }
    [data-theme="light"] {
      --bg: #f0f5fa;
      --bg2: #e4edf6;
      --bg3: #d8e7f2;
      --card: #ffffff;
      --border: #c5d8e8;
      --accent: #0098a0;
      --accent2: #e55a20;
      --accent3: #5a4be0;
      --text: #0a1628;
      --text2: #4a6880;
      --text3: #8aacbf;
      --saved: #d4a800;
      --danger: #e0002a;
      --map-filter: none;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ─── SPLASH ─── */
    .splash {
      position: fixed; inset: 0; background: #040d1a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.6s ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }
    .splash-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(0,229,200,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,200,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .splash-owl { font-size: 72px; animation: float 2s ease-in-out infinite; position: relative; z-index:1; }
    .splash-title { font-size: 56px; font-weight: 800; color: var(--accent); letter-spacing: 10px; margin-top: 12px; position: relative; z-index:1; }
    .splash-sub { font-size: 11px; color: rgba(0,229,200,0.5); letter-spacing: 4px; margin-top: 6px; font-family:'Space Mono',monospace; position: relative; z-index:1; }
    .splash-bar { width: 180px; height: 2px; background: rgba(0,229,200,0.15); border-radius: 2px; margin-top: 32px; overflow: hidden; position: relative; z-index:1; }
    .splash-fill { height: 100%; background: var(--accent); border-radius: 2px; animation: loadBar 1.8s ease forwards; }
    @keyframes loadBar { from{width:0} to{width:100%} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    /* ─── HEADER ─── */
    .header {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 500;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .owl-anim { font-size: 28px; animation: owlBlink 5s infinite; display:inline-block; }
    @keyframes owlBlink { 0%,88%,100%{transform:scaleY(1)} 90%,95%{transform:scaleY(0.08)} }
    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: 3px; color: var(--accent); }
    .logo-sub { font-size: 10px; color: var(--text3); font-family:'Space Mono',monospace; margin-top: 1px; }

    .hdr-actions { display: flex; align-items: center; gap: 8px; }
    .hbtn { 
      background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
      padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;
      font-family: 'Syne', sans-serif; font-weight: 600; transition: all 0.2s;
      display: flex; align-items: center; gap: 5px;
    }
    .hbtn:hover { background: var(--bg2); color: var(--text); border-color: var(--accent); }
    .hbtn.notify-active { color: var(--accent); border-color: var(--accent); }
    .badge-count { background: var(--danger); color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 10px; margin-left: 2px; }
    .user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--accent); display:none; cursor:pointer; }

    /* ─── REGION + CATEGORY BAR ─── */
    .top-bars { background: var(--bg2); border-bottom: 1px solid var(--border); }
    .region-bar { 
      display: flex; gap: 4px; overflow-x: auto; padding: 8px 16px 6px;
      scrollbar-width: none; border-bottom: 1px solid var(--border);
    }
    .region-bar::-webkit-scrollbar { display:none; }
    .cat-bar { display: flex; gap: 4px; overflow-x: auto; padding: 6px 16px 8px; scrollbar-width: none; }
    .cat-bar::-webkit-scrollbar { display:none; }
    .rbtn {
      flex-shrink: 0; font-size: 10px; font-weight: 700; letter-spacing: 1px;
      padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text3); cursor: pointer; transition: all 0.2s;
      font-family: 'Space Mono', monospace; white-space: nowrap;
    }
    .rbtn.active, .rbtn:hover { background: var(--bg3); color: var(--accent); border-color: var(--accent); }
    .cbtn {
      flex-shrink: 0; font-size: 11px; font-weight: 700;
      padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--card); color: var(--text2); cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .cbtn.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .cbtn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ─── LAYOUT ─── */
    .layout { display: flex; height: calc(100vh - 112px); position: relative; }
    #map { flex: 1; filter: var(--map-filter); }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 360px; min-width: 360px; background: var(--card);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .stab {
      flex: 1; padding: 10px; text-align: center; font-size: 11px; font-weight: 700;
      color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.2s; letter-spacing: 1px;
    }
    .stab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .stab-panel { flex: 1; overflow-y: auto; display: none; }
    .stab-panel.active { display: flex; flex-direction: column; }

    /* Live indicator */
    .live-row { padding: 8px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .live-dot { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #00e676; font-family:'Space Mono',monospace; }
    .live-dot::before { content:''; width:7px; height:7px; border-radius:50%; background:#00e676; animation:pulse 1.5s infinite; box-shadow:0 0 6px #00e676; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.5)} }
    .source-count { font-size: 10px; color: var(--text3); font-family:'Space Mono',monospace; }

    .news-list { flex: 1; overflow-y: auto; }
    .news-card {
      padding: 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s; position: relative;
    }
    .news-card:hover { background: var(--bg3); }
    .news-card.active { background: var(--bg2); border-left: 3px solid var(--accent); }
    .news-card.read { opacity: 0.6; }
    .card-top { display: flex; gap: 10px; }
    .card-thumb { width: 72px; height: 52px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--bg3); }
    .card-thumb-placeholder { width: 72px; height: 52px; border-radius: 6px; flex-shrink: 0; background: var(--bg3); display:flex; align-items:center; justify-content:center; font-size:20px; }
    .card-info { flex: 1; min-width: 0; }
    .card-source { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--accent2); font-family:'Space Mono',monospace; }
    .card-title { font-size: 12px; font-weight: 700; line-height: 1.4; margin: 3px 0; color: var(--text); display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .card-meta { font-size: 10px; color: var(--text3); display: flex; gap: 8px; align-items: center; margin-top: 4px; }
    .region-tag { background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 9px; color: var(--text2); font-family:'Space Mono',monospace; }
    .card-actions { position: absolute; right: 10px; top: 10px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
    .news-card:hover .card-actions { opacity: 1; }
    .card-action-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text3); cursor: pointer; font-size: 12px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
    .card-action-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent); }
    .card-action-btn.saved { color: var(--saved); border-color: var(--saved); }
    .read-indicator { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); position: absolute; left: 6px; top: 50%; transform: translateY(-50%); }

    /* Saved panel */
    .saved-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--text3); font-size:13px; }

    /* ─── MAP CLUSTER CUSTOM ─── */
    .custom-cluster {
      background: rgba(0,229,200,0.15) !important;
      border: 2px solid var(--accent) !important;
      border-radius: 50% !important;
      color: var(--accent) !important;
      font-weight: 800 !important;
      font-family: 'Space Mono', monospace !important;
      display: flex !important; align-items: center !important; justify-content: center !important;
    }

    /* ─── MODAL ─── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(4,13,26,0.85);
      z-index: 9000; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px);
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-box {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      width: 92%; max-width: 580px; max-height: 88vh; overflow-y: auto;
      transform: translateY(16px); transition: transform 0.3s; position: relative;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }
    .modal-overlay.active .modal-box { transform: translateY(0); }
    .modal-hero { width: 100%; height: 220px; object-fit: cover; border-radius: 16px 16px 0 0; }
    .modal-close { position: absolute; top: 12px; right: 14px; width: 32px; height: 32px; border-radius: 50%; background: rgba(4,13,26,0.7); border: none; color: #fff; font-size: 20px; cursor: pointer; display:flex; align-items:center; justify-content:center; z-index:10; transition:background 0.2s; }
    .modal-close:hover { background: rgba(255,71,87,0.8); }
    .modal-body { padding: 20px; }
    .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .modal-tag { font-size: 10px; font-weight: 700; letter-spacing: 1px; padding: 3px 10px; border-radius: 20px; font-family:'Space Mono',monospace; }
    .modal-title { font-size: 20px; font-weight: 800; line-height: 1.35; margin-bottom: 12px; }
    .modal-desc { font-size: 14px; line-height: 1.65; color: var(--text2); margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 10px; flex-wrap: wrap; }
    .modal-btn { padding: 10px 20px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); font-family:'Syne',sans-serif; }
    .modal-btn.primary { background: var(--accent); color: #000; border-color: var(--accent); text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .modal-btn.primary:hover { opacity: 0.85; }
    .modal-btn.secondary { background: transparent; color: var(--text2); }
    .modal-btn.secondary:hover { background: var(--bg3); color: var(--text); }
    .modal-btn.save-btn.saved { color: var(--saved); border-color: var(--saved); }

    /* ─── NOTIFICATION TOAST ─── */
    .toast-stack { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 8000; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; width: 90%; max-width: 380px; }
    .toast {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 16px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      display: flex; align-items: center; gap: 12px; pointer-events: auto; cursor: pointer;
      transform: translateY(80px); opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-icon { font-size: 24px; flex-shrink: 0; }
    .toast-label { font-size: 9px; color: var(--accent2); font-family:'Space Mono',monospace; font-weight:700; letter-spacing:1px; }
    .toast-title { font-size: 12px; font-weight: 700; margin-top: 2px; line-height: 1.4; }
    .toast-close { margin-left: auto; flex-shrink:0; color:var(--text3); font-size:16px; cursor:pointer; padding:4px; }

    /* ─── LOADING ─── */
    .loading-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; padding:40px; }
    .loading-owl { font-size:40px; animation:float 2s infinite; }
    .loading-text { font-size:10px; color:var(--accent); font-family:'Space Mono',monospace; letter-spacing:2px; }
    .loading-dots::after { content:' '; animation: dots 1.5s infinite steps(4, end); }
    @keyframes dots { 0%{content:''} 25%{content:'.'} 50%{content:'..'} 75%{content:'...'} }

    /* ─── MOBILE ─── */
    @media (max-width: 768px) {
      .layout { flex-direction: column; height: calc(100vh - 56px - 56px); }
      #map { height: 45vh; min-height: 200px; }
      .sidebar { width: 100%; min-width: unset; height: 55vh; border-left: none; border-top: 1px solid var(--border); }
      .top-bars { display: none; }
      .mobile-bar {
        position: fixed; bottom: 0; left: 0; right: 0; height: 56px;
        background: var(--card); border-top: 1px solid var(--border);
        display: flex; align-items: stretch; z-index: 600;
      }
      .mbar-btn { flex: 1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; border:none; background:transparent; color:var(--text3); transition:color 0.2s; font-size:9px; font-family:'Space Mono',monospace; font-weight:700; letter-spacing:0.5px; }
      .mbar-btn .micon { font-size:20px; }
      .mbar-btn.active { color: var(--accent); }
      .layout { height: calc(100vh - 56px - 56px); }
      .mobile-filter-sheet {
        position: fixed; bottom: 56px; left: 0; right: 0;
        background: var(--card); border-top: 2px solid var(--border);
        padding: 12px 16px; z-index: 590; display: none; flex-wrap: wrap; gap: 6px;
      }
      .mobile-filter-sheet.open { display: flex; }
      .sidebar { display: none; }
      .sidebar.mobile-active { display: flex; }
      #map { height: 100%; }
      .map-mode #map { height: 100%; }
      .list-mode #map { display: none; }
      .list-mode .sidebar { display: flex; height: calc(100vh - 56px - 56px); }
      .toast-stack { bottom: 72px; }
      .header { padding: 0 14px; }
    }
    @media (min-width: 769px) { .mobile-bar { display:none; } }

    /* ─── MARKER PULSE ─── */
    @keyframes markerPulse { 0%{transform:scale(0.8);opacity:1} 100%{transform:scale(2.5);opacity:0} }
    .marker-inner { position:absolute; inset:2px; border-radius:50%; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.4); }
    .marker-ring { position:absolute; inset:0; border-radius:50%; animation:markerPulse 2.5s infinite; opacity:0.6; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body data-theme="dark">

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-grid"></div>
  <div class="splash-owl">🦉</div>
  <div class="splash-title">OWLS</div>
  <div class="splash-sub">TRUE GLOBAL INTELLIGENCE</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <span class="owl-anim">🦉</span>
    <div>
      <div class="logo-text">OWLS</div>
      <div class="logo-sub" id="feedLabel">GLOBAL FEED</div>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="hbtn" id="notifyBtn" onclick="toggleNotify()">🔔 <span id="notifyBadge" class="badge-count" style="display:none">0</span></button>
    <button class="hbtn" onclick="openSavedPanel()">🔖 <span id="savedBadge" class="badge-count">0</span></button>
    <button class="hbtn" onclick="toggleTheme()" id="themeBtn">🌙</button>
    <button class="hbtn" onclick="loginWithGoogle()" id="loginBtn">Login</button>
    <img src="" id="userAvatar" class="user-avatar" onclick="logout()" title="Logout">
  </div>
</div>

<!-- TOP BARS (desktop) -->
<div class="top-bars">
  <div class="region-bar" id="regionBar">
    <button class="rbtn active" data-region="all">🌐 ALL</button>
    <button class="rbtn" data-region="europe">🇪🇺 EUROPE</button>
    <button class="rbtn" data-region="americas">🌎 AMERICAS</button>
    <button class="rbtn" data-region="asia">🌏 ASIA</button>
    <button class="rbtn" data-region="mideast">🕌 MID EAST</button>
    <button class="rbtn" data-region="africa">🌍 AFRICA</button>
    <button class="rbtn" data-region="oceania">🦘 OCEANIA</button>
  </div>
  <div class="cat-bar" id="catBar">
    <button class="cbtn active" data-q="world">🌍 World</button>
    <button class="cbtn" data-q="technology">💻 Tech</button>
    <button class="cbtn" data-q="business">📈 Business</button>
    <button class="cbtn" data-q="science">🔬 Science</button>
    <button class="cbtn" data-q="health">❤️ Health</button>
    <button class="cbtn" data-q="sport">⚽ Sport</button>
    <button class="cbtn" data-q="climate">🌿 Climate</button>
    <button class="cbtn" data-q="politics">🏛️ Politics</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout" id="layout">
  <div id="map"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <div class="stab active" onclick="switchTab('feed')">📡 FEED</div>
      <div class="stab" onclick="switchTab('saved')">🔖 SAVED</div>
      <div class="stab" onclick="switchTab('alerts')">🔔 ALERTS</div>
    </div>
    <div class="stab-panel active" id="panel-feed">
      <div class="live-row">
        <div class="live-dot">LIVE</div>
        <span class="source-count" id="sourceCount">0 sources</span>
      </div>
      <div class="news-list" id="newsList"></div>
    </div>
    <div class="stab-panel" id="panel-saved">
      <div class="news-list" id="savedList"></div>
    </div>
    <div class="stab-panel" id="panel-alerts">
      <div style="padding:16px;">
        <div style="font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;margin-bottom:12px;letter-spacing:1px;">KEYWORD ALERTS</div>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <input id="alertInput" placeholder="e.g. earthquake, NATO..." style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;outline:none;" onkeydown="if(event.key==='Enter')addAlert()">
          <button onclick="addAlert()" style="background:var(--accent);color:#000;border:none;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer;font-size:12px;">+</button>
        </div>
        <div id="alertList" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
        <div style="margin-top:20px;font-size:11px;color:var(--text3);line-height:1.6;">
          🔔 Add keywords to get notified when matching news arrives. Alerts fire as toast notifications.
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MOBILE BOTTOM BAR -->
<div class="mobile-bar">
  <button class="mbar-btn active" id="mb-map" onclick="mobileSwitch('map')"><span class="micon">🗺️</span>MAP</button>
  <button class="mbar-btn" id="mb-list" onclick="mobileSwitch('list')"><span class="micon">📰</span>NEWS</button>
  <button class="mbar-btn" id="mb-filter" onclick="toggleMobileFilter()"><span class="micon">🔍</span>FILTER</button>
  <button class="mbar-btn" id="mb-saved" onclick="mobileSwitch('saved')"><span class="micon">🔖</span>SAVED</button>
</div>

<!-- MOBILE FILTER SHEET -->

// Location cache to avoid spiral collisions
const locCache = {};
function getCoords(text, source) {
  const t = (text || '').toLowerCase();
  let lat = null, lng = null, locName = null;

  // 1. Exact city match
  for (const [city, c] of Object.entries(CITIES)) {
    if (new RegExp('\\b' + city.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(t)) {
      lat = c[0]; lng = c[1];
      locName = city.split(' ').map(w => w[0].toUpperCase() + w.slice(1)).join(' ');
      break;
    }
  }

  // 2. Keyword → country
  if (!lat) {
    for (const [k, cc] of Object.entries(KEYWORDS)) {
      if (new RegExp('\\b' + k + '\\b', 'i').test(t)) {
        if (CAPITALS[cc]) { lat = CAPITALS[cc][0]; lng = CAPITALS[cc][1]; locName = CNAMES[cc]; break; }
      }
    }
  }

  // 3. Country name match
  if (!lat) {
    for (const [cc, name] of Object.entries(CNAMES)) {
      if (new RegExp('\\b' + name + '\\b', 'i').test(t)) {
        if (CAPITALS[cc]) { lat = CAPITALS[cc][0]; lng = CAPITALS[cc][1]; locName = name; break; }
      }
    }
  }

  // 4. Fallback: random spread across globe
  if (!lat) {
    const fallbacks = [[40.71,-74.00,'New York'],[51.50,-0.12,'London'],[35.68,139.69,'Tokyo'],[48.85,2.35,'Paris'],[28.61,77.20,'New Delhi']];
    const f = fallbacks[Math.floor(Math.random() * fallbacks.length)];
    lat = f[0]; lng = f[1]; locName = f[2];
  }

  // Jitter to prevent perfect overlap (±0.08° ≈ 9km)
  const jitter = () => (Math.random() - 0.5) * 0.16;
  return { coords: [lat + jitter(), lng + jitter()], locationName: locName };
}

}).addTo(map);

// Light tile layer stored for theme toggle
let tileLayerDark = map._layers[Object.keys(map._layers)[0]];
let currentTileLayer = tileLayerDark;

function updateMapTiles() {
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  if (currentTileLayer) map.removeLayer(currentTileLayer);
  const url = isDark
    ? 'https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
  currentTileLayer = L.tileLayer(url, { maxZoom:18 }).addTo(map);
}

    {url:'http://feeds.bbci.co.uk/news/politics/rss.xml', name:'BBC Politics', region:'europe'},
    {url:'https://www.aljazeera.com/xml/rss/all.xml', name:'Al Jazeera', region:'mideast'},
  ]
};

// ═══════════════════════════════════════════════
// RSS FETCH
// ═══════════════════════════════════════════════
async function fetchRSS(url, sourceName, sourceRegion) {
  try {
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}&count=20`);
    if (!res.ok) return [];
    const data = await res.json();
    if (data.status !== 'ok') return [];
    return (data.items || []).map(item => ({
      title: item.title || '',
      url: item.link || '#',
      source: sourceName,
      sourceRegion,
      date: item.pubDate,
      thumb: item.thumbnail || (item.enclosure?.link) || null,
      trailText: (item.description || '').replace(/<[^>]*>/gm, '').slice(0, 200)
    }));
  } catch { return []; }
}

async function fetchGuardianFallback(category) {
  try {
    const GKEY = '0a321643-aaab-4c6a-9185-1762685abe3d';
    const sec = { world:'world', technology:'technology', business:'business', science:'science', health:'health', sport:'sport', climate:'environment', politics:'politics' }[category] || 'world';
    const res = await fetch(`https://content.guardianapis.com/${sec}?api-key=${GKEY}&page-size=15&show-fields=thumbnail,trailText`);
    const data = await res.json();
    return (data.response?.results || []).map(a => ({
      title: a.webTitle, url: a.webUrl, source: 'The Guardian', sourceRegion: 'europe',
      date: a.webPublicationDate,
      thumb: a.fields?.thumbnail || null,
      trailText: (a.fields?.trailText || '').replace(/<[^>]*>/gm, '')
    }));
  } catch { return []; }
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function timeAgo(d) {
  if (!d) return '';
  const diff = Date.now() - new Date(d).getTime();
  const h = Math.floor(diff / 3600000), m = Math.floor(diff / 60000);
  if (h > 48) return Math.floor(h/24) + 'd ago';
  if (h > 0) return h + 'h ago';
  return m > 0 ? m + 'm ago' : 'Now';
}

function isSaved(article) { return savedArticles.some(s => s.url === article.url); }
function isRead(article) { return readArticles.has(article.url); }

function saveArticle(article) {
  if (!isSaved(article)) {
    savedArticles.unshift(article);
    localStorage.setItem('owls_saved', JSON.stringify(savedArticles));
    updateSavedBadge();
    showToast('🔖', 'Saved', article.title.slice(0,60) + '...', null);
  }
}

function unsaveArticle(url) {
  savedArticles = savedArticles.filter(s => s.url !== url);
  localStorage.setItem('owls_saved', JSON.stringify(savedArticles));
  updateSavedBadge();
}

function markRead(url) {
  readArticles.add(url);
  localStorage.setItem('owls_read', JSON.stringify([...readArticles]));
}

function updateSavedBadge() {
  document.getElementById('savedBadge').textContent = savedArticles.length;
}

// ═══════════════════════════════════════════════
// ALERT SYSTEM
// ═══════════════════════════════════════════════
function addAlert() {
  const input = document.getElementById('alertInput');
  const kw = input.value.trim().toLowerCase();
  if (!kw || alerts.includes(kw)) { input.value = ''; return; }
  alerts.push(kw);
  localStorage.setItem('owls_alerts', JSON.stringify(alerts));
  input.value = '';
  renderAlerts();
}

function removeAlert(kw) {
  alerts = alerts.filter(a => a !== kw);
  localStorage.setItem('owls_alerts', JSON.stringify(alerts));
  renderAlerts();
}

function renderAlerts() {
  const list = document.getElementById('alertList');
  list.innerHTML = '';
  alerts.forEach(kw => {
    const el = document.createElement('div');
    el.style.cssText = 'display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;';
    el.innerHTML = `<span style="color:var(--accent)">🔔</span> ${kw} <span style="cursor:pointer;color:var(--text3);margin-left:4px;" onclick="removeAlert('${kw}')">×</span>`;
    list.appendChild(el);
  });
}

function checkAlerts(articles) {
  if (!alerts.length) return;
  articles.forEach(a => {
    const text = (a.title + ' ' + a.trailText).toLowerCase();
    alerts.forEach(kw => {
      if (text.includes(kw)) {
        showToast('🔔', 'Alert: ' + kw.toUpperCase(), a.title.slice(0,60) + '...', a);
      }
    });
  });
}

// ═══════════════════════════════════════════════
// TOAST NOTIFICATIONS
// ═══════════════════════════════════════════════
let toastQueue = [];
let toastBusy = false;

function showToast(icon, label, title, article) {
  toastQueue.push({icon, label, title, article});
  if (!toastBusy) processToast();
}

function processToast() {
  if (!toastQueue.length) { toastBusy = false; return; }
  toastBusy = true;
  const {icon, label, title, article} = toastQueue.shift();
  const stack = document.getElementById('toastStack');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<div class="toast-icon">${icon}</div><div style="flex:1;min-width:0;"><div class="toast-label">${label}</div><div class="toast-title">${title}</div></div><div class="toast-close">×</div>`;
  toast.querySelector('.toast-close').onclick = (e) => { e.stopPropagation(); dismissToast(toast); };
  if (article) toast.onclick = () => { dismissToast(toast); openModal(article); };
  stack.appendChild(toast);
  requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
  setTimeout(() => dismissToast(toast), 6000);
}

function dismissToast(toast) {
  toast.classList.remove('show');
  setTimeout(() => { toast.remove(); setTimeout(processToast, 200); }, 400);
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openModal(article) {
  currentModalArticle = article;
  markRead(article.url);
  const img = document.getElementById('modalImg');
  if (article.thumb) { img.src = article.thumb; img.style.display = 'block'; }
  else img.style.display = 'none';
  document.getElementById('modalTitle').textContent = article.title;
  document.getElementById('modalSource').textContent = article.source;
  document.getElementById('modalRegion').textContent = (article.locationName || 'Global').toUpperCase();
  document.getElementById('modalTime').textContent = timeAgo(article.date);
  document.getElementById('modalDesc').textContent = article.trailText || 'Click below to read the full story.';
  document.getElementById('modalLink').href = article.url;
  const saveBtn = document.getElementById('modalSaveBtn');
  saveBtn.classList.toggle('saved', isSaved(article));
  saveBtn.textContent = isSaved(article) ? '✓ Saved' : '🔖 Save';
  document.getElementById('newsModal').classList.add('active');
  // Mark card as read in list
  document.querySelectorAll('.news-card').forEach(c => { if (c.dataset.url === article.url) c.classList.add('read'); });
}

function closeModal() { document.getElementById('newsModal').classList.remove('active'); }

function toggleSaveFromModal() {
  if (!currentModalArticle) return;
  if (isSaved(currentModalArticle)) {
    unsaveArticle(currentModalArticle.url);
    document.getElementById('modalSaveBtn').textContent = '🔖 Save';
    document.getElementById('modalSaveBtn').classList.remove('saved');
  } else {
    saveArticle(currentModalArticle);
    document.getElementById('modalSaveBtn').textContent = '✓ Saved';
    document.getElementById('modalSaveBtn').classList.add('saved');
  }
  renderSavedPanel();
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderArticles(articles) {
  const color = COLORS[currentQ] || '#00e5c8';
  const list = document.getElementById('newsList');

  // Clear map
  if (clusterGroup) map.removeLayer(clusterGroup);
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction: (cluster) => L.divIcon({
      html: `<div class="custom-cluster" style="width:34px;height:34px;font-size:12px;">${cluster.getChildCount()}</div>`,
      iconSize: [34,34], iconAnchor: [17,17], className:''
    })
  });

  list.innerHTML = '';

  // Filter by region
  const filtered = currentRegion === 'all' ? articles : articles.filter(a => a._region === currentRegion);

  document.getElementById('sourceCount').textContent = `${filtered.length} stories`;

  if (!filtered.length) {
    list.innerHTML = '<div class="loading-state"><div class="loading-owl">🦉</div><div class="loading-text">No stories in this region</div></div>';
    map.addLayer(clusterGroup);
    return;
  }

  filtered.slice(0, 60).forEach(a => {
    const {coords, locationName} = getCoords(a.title + ' ' + (a.trailText || ''), a.source);
    a.locationName = locationName;
    const marker = L.marker(coords, { icon: pulseIcon(color) });
    marker.bindPopup(`<div style="font-weight:700;font-size:13px;max-width:200px;">${a.title}</div><div style="font-size:11px;color:#888;margin-top:4px;">${a.source}</div>`);
    marker.on('click', () => openModal(a));
    clusterGroup.addLayer(marker);

    const card = document.createElement('div');
    card.className = 'news-card' + (isRead(a) ? ' read' : '');
    card.dataset.url = a.url;
    if (!isRead(a)) {
      const dot = document.createElement('div');
      dot.className = 'read-indicator';
      card.appendChild(dot);
    }
    const thumbHtml = a.thumb
      ? `<img src="${a.thumb}" class="card-thumb" onerror="this.parentNode.innerHTML='<div class=\\'card-thumb-placeholder\\'>📰</div>'">`
      : `<div class="card-thumb-placeholder">📰</div>`;
    card.innerHTML += `
      <div class="card-top">
        ${thumbHtml}
        <div class="card-info">
          <div class="card-source">${a.source}</div>
          <div class="card-title">${a.title}</div>
          <div class="card-meta">
            <span class="region-tag">${locationName}</span>
            <span>${timeAgo(a.date)}</span>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="card-action-btn ${isSaved(a) ? 'saved' : ''}" title="Save" onclick="event.stopPropagation(); toggleSaveCard(this, '${a.url.replace(/'/g,"\\'")}')">🔖</button>
      </div>`;
    card.onclick = () => {
      document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
      card.classList.add('active');
      map.flyTo(coords, 7, { duration: 1.5, easeLinearity: 0.25 });
      openModal(a);
    };
    list.appendChild(card);
  });

  map.addLayer(clusterGroup);
  checkAlerts(filtered);
}

function toggleSaveCard(btn, url) {
  const article = allArticles.find(a => a.url === url);
  if (!article) return;
  if (isSaved(article)) { unsaveArticle(url); btn.classList.remove('saved'); }
  else { saveArticle(article); btn.classList.add('saved'); }
  renderSavedPanel();
}

function renderSavedPanel() {
  const list = document.getElementById('savedList');
  updateSavedBadge();
  if (!savedArticles.length) {
    list.innerHTML = '<div class="saved-empty"><div style="font-size:40px">🔖</div><div>No saved articles yet</div><div style="font-size:11px;margin-top:4px;">Tap the bookmark icon on any story</div></div>';
    return;
  }
  list.innerHTML = '';
  savedArticles.forEach(a => {
    const card = document.createElement('div');
    card.className = 'news-card';
    card.innerHTML = `
      <div class="card-top">
        ${a.thumb ? `<img src="${a.thumb}" class="card-thumb">` : `<div class="card-thumb-placeholder">📰</div>`}
        <div class="card-info">
          <div class="card-source">${a.source}</div>
          <div class="card-title">${a.title}</div>
          <div class="card-meta"><span>${timeAgo(a.date)}</span></div>
        </div>
      </div>
      <div class="card-actions" style="opacity:1;">
        <button class="card-action-btn saved" title="Remove" onclick="event.stopPropagation(); unsaveArticle('${a.url.replace(/'/g,"\\'")}'); renderSavedPanel();">×</button>
      </div>`;
    card.onclick = () => openModal(a);
    list.appendChild(card);
  });
}

// ═══════════════════════════════════════════════
// FETCH PIPELINE
// ═══════════════════════════════════════════════
async function fetchNews(category) {
  const list = document.getElementById('newsList');
  list.innerHTML = `<div class="loading-state"><div class="loading-owl">🦉</div><div class="loading-text loading-dots">SCANNING GLOBE</div></div>`;
  document.getElementById('feedLabel').textContent = category.toUpperCase() + ' FEED';

  const configs = FEEDS[category] || FEEDS.world;
  const results = await Promise.allSettled(configs.map(f => fetchRSS(f.url, f.name, f.region)));
  let articles = [];
  results.forEach(r => { if (r.status === 'fulfilled') articles.push(...r.value); });

  if (articles.length < 5) {
    const fb = await fetchGuardianFallback(category);
    articles.push(...fb);
  }

  // Dedupe
  const seen = new Set();
  articles = articles.filter(a => { if (!a.title || seen.has(a.title)) return false; seen.add(a.title); return true; });

  // Add region tag based on coords
  articles.forEach(a => {
    const { coords } = getCoords(a.title + ' ' + (a.trailText || ''), a.source);
    a._region = getArticleRegion(coords[0], coords[1]);
  });

  // Shuffle
  articles = articles.sort(() => Math.random() - 0.5);
  allArticles = articles;

  renderArticles(articles);
}

// ═══════════════════════════════════════════════
// UI CONTROLS
// ═══════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.stab').forEach((t,i) => t.classList.toggle('active', ['feed','saved','alerts'][i] === tab));
  document.querySelectorAll('.stab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'saved') renderSavedPanel();
  if (tab === 'alerts') renderAlerts();
}

function openSavedPanel() { switchTab('saved'); }

function toggleTheme() {
  const isDark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
  localStorage.setItem('owlsTheme', isDark ? 'light' : 'dark');
  updateMapTiles();
}

function toggleNotify() {
  notifyEnabled = !notifyEnabled;
  const btn = document.getElementById('notifyBtn');
  btn.classList.toggle('notify-active', notifyEnabled);
  showToast(notifyEnabled ? '🔔' : '🔕', 'Notifications', notifyEnabled ? 'Alerts enabled' : 'Alerts disabled', null);
}

// Region filter
document.getElementById('regionBar').addEventListener('click', e => {
  const btn = e.target.closest('.rbtn');
  if (!btn) return;
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentRegion = btn.dataset.region;
  renderArticles(allArticles);
});

// Category filter
document.getElementById('catBar').addEventListener('click', e => {
  const btn = e.target.closest('.cbtn');
  if (!btn) return;
  document.querySelectorAll('.cbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentQ = btn.dataset.q;
  fetchNews(currentQ);
});

// Mobile
let mobileMode = 'map';
function mobileSwitch(mode) {
  mobileMode = mode;
  const layout = document.getElementById('layout');
  const sidebar = document.getElementById('sidebar');
  const mapEl = document.getElementById('map');
  ['mb-map','mb-list','mb-filter','mb-saved'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  layout.className = 'layout';
  sidebar.classList.remove('mobile-active');
  mapEl.style.display = '';
  if (mode === 'map') {
    document.getElementById('mb-map')?.classList.add('active');
    layout.classList.add('map-mode');
  } else if (mode === 'list') {
    document.getElementById('mb-list')?.classList.add('active');
    layout.classList.add('list-mode');
    sidebar.classList.add('mobile-active');
    switchTab('feed');
  } else if (mode === 'saved') {
    document.getElementById('mb-saved')?.classList.add('active');
    layout.classList.add('list-mode');
    sidebar.classList.add('mobile-active');
    switchTab('saved');
  }
  document.getElementById('mobileFilter').classList.remove('open');
}

function toggleMobileFilter() {
  const sheet = document.getElementById('mobileFilter');
  sheet.classList.toggle('open');
  document.getElementById('mb-filter')?.classList.toggle('active', sheet.classList.contains('open'));
}

function mobileCatClick(btn, q) {
  document.querySelectorAll('#mobileFilter .cbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentQ = q;
  fetchNews(q);
  document.getElementById('mobileFilter').classList.remove('open');
  mobileSwitch('list');
}

// Close modal on overlay click
document.getElementById('newsModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
window.addEventListener('load', () => {
  // Theme
  const saved = localStorage.getItem('owlsTheme');
  if (saved) {
    document.body.setAttribute('data-theme', saved);
    document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
    if (saved === 'light') updateMapTiles();
  }
  updateSavedBadge();
  renderAlerts();
  // Splash
  setTimeout(() => {
    const splash = document.getElementById('splash');
    splash.classList.add('hide');
    setTimeout(() => splash.remove(), 700);
  }, 2000);
  fetchNews('world');
});
