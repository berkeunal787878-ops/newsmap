<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>OWLS — Global News Map</title>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg-main: #f0f7f7;
      --bg-card: #ffffff;
      --text-main: #1a2e2e;
      --text-sub: #64748b;
      --border: #ccece9;
      --hover-bg: #f0fdfa;
      --active-bg: #e6f7f5;
      --map-filter: none;
      --accent: #0d9488;
    }

    [data-theme="dark"] {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --border: #334155;
      --hover-bg: #0f172a;
      --active-bg: #334155;
      --map-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
      --accent: #2dd4bf;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-main); color: var(--text-main); overflow: hidden; transition: background 0.3s, color 0.3s; }

    /* HEADER */
    .header {
      background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 8px 20px;
      min-height: 60px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1000;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .owl-icon { width: 36px; height: 36px; animation: owlBlink 4s infinite; }
    @keyframes owlBlink { 0%, 90%, 100% { transform: scaleY(1); } 92%, 97% { transform: scaleY(0.1); } }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
    
    .header-actions { display: flex; gap: 10px; align-items: center; }
    
    .icon-btn {
      background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main);
      padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600;
      transition: all 0.2s; display: flex; align-items: center; gap: 5px;
    }
    .icon-btn:hover { background: var(--hover-bg); transform: translateY(-2px); }

    .category-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; background: var(--bg-card); padding: 10px; border-bottom: 1px solid var(--border); z-index: 999; position: relative;}
    .cat-btn {
      font-size: 12px; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-main); cursor: pointer; transition: 0.3s; font-weight: 600;
    }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* LAYOUT */
    .layout { display: flex; height: calc(100vh - 110px); }
    #map { flex: 1; filter: var(--map-filter); }

    /* SIDEBAR */
    .sidebar { width: 360px; background: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10;}
    .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 800; color: var(--accent); display: flex; justify-content: space-between; }
    .news-list { overflow-y: auto; flex: 1; }
    
    .news-card { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
    .news-card:hover { background: var(--hover-bg); }
    .news-title { font-size: 14px; font-weight: 700; line-height: 1.4; margin: 8px 0; }
    .news-meta { font-size: 11px; color: var(--text-sub); }
    .news-thumb { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-top: 8px; }
    
    .badge { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; }

    /* POPUP */
    .leaflet-popup-content-wrapper { border-radius: 12px !important; background: var(--bg-card) !important; color: var(--text-main) !important; border: 1px solid var(--border); }
    
    /* DOPAMINE POPUP */
    .dopamine-popup {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px);
      background: linear-gradient(135deg, #ff0f4f, #ff8c00); color: white; padding: 15px 25px;
      border-radius: 30px; font-weight: 800; box-shadow: 0 10px 30px rgba(255,15,79,0.3);
      z-index: 3000; transition: 0.6s; display: flex; align-items: center; gap: 15px; cursor: pointer; width: 90%; max-width: 400px;
    }
    .dopamine-popup.show { transform: translateX(-50%) translateY(0); }
    .dopamine-icon { font-size: 24px; animation: owlFloat 1s infinite alternate; }

    @keyframes owlFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }

    /* AUTH MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999;
      display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--bg-card); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2); transform: translateY(20px); transition: 0.3s;
    }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 15px; color: var(--accent); }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; color: var(--text-sub); }
    .input-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-main); color: var(--text-main); font-family: inherit; }
    
    .interest-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .interest-tag { font-size: 11px; padding: 6px 12px; border: 1px solid var(--border); border-radius: 15px; cursor: pointer; transition: 0.2s; }
    .interest-tag.selected { background: var(--accent); color: white; border-color: var(--accent); }
    
    .save-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; }

    @media (max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: 40vh; }
      #map { height: 40vh; }
    }
  </style>
</head>
<body data-theme="light">

<div class="header">
  <div class="logo">
    <div class="owl-icon">🦉</div>
    <div class="logo-text" id="greetingText">OWLS</div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙 Tema</button>
    <button class="icon-btn" onclick="openProfile()">👤 Profil</button>
  </div>
</div>

<div class="category-bar">
  <button class="cat-btn active" data-q="world">🌍 World</button>
  <button class="cat-btn" data-q="technology">💻 Tech</button>
  <button class="cat-btn" data-q="business">📈 Business</button>
  <button class="cat-btn" data-q="science">🔬 Science</button>
  <button class="cat-btn" data-q="sport">⚽ Sport</button>
</div>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-header"><span>Özel Akışın</span><span style="color:#10b981;">● LIVE</span></div>
    <div class="news-list" id="newsList"></div>
  </div>
</div>

<!-- DOPAMIN POPUP -->
<div id="dopaminePopup" class="dopamine-popup">
  <div class="dopamine-icon">🔥</div>
  <div>
    <div style="font-size:10px; color:#ffd700; text-transform:uppercase;">İlgini Çekebilir</div>
    <div id="dopamineTitle" style="font-size:13px;">Şok Haber!</div>
  </div>
</div>

<!-- KAYIT / TERCİH MODALI -->
<div class="modal-overlay" id="profileModal">
  <div class="modal-content">
    <div class="modal-title">Kişiselleştirilmiş Akış</div>
    <p style="font-size:12px; color:var(--text-sub); margin-bottom:20px;">Sana en uygun haberleri sunabilmemiz için profilini oluştur.</p>
    
    <div class="input-group">
      <label>Adın Ne?</label>
      <input type="text" id="userName" placeholder="Örn: Berke" />
    </div>

    <div class="input-group">
      <label>Nelerle İlgileniyorsun? (Seçiniz)</label>
      <div class="interest-tags" id="interestTags">
        <div class="interest-tag" data-val="technology">Teknoloji</div>
        <div class="interest-tag" data-val="business">Ekonomi</div>
        <div class="interest-tag" data-val="sport">Spor</div>
        <div class="interest-tag" data-val="science">Bilim</div>
        <div class="interest-tag" data-val="ai">Yapay Zeka</div>
      </div>
    </div>

    <button class="save-btn" onclick="saveProfile()">Kaydet ve Başla</button>
  </div>
</div>

<script>
  // --- TEMA VE KULLANICI AYARLARI ---
  let userProfile = JSON.parse(localStorage.getItem('owlsProfile')) || { name: '', interests: [] };

  function initApp() {
    if(localStorage.getItem('owlsTheme') === 'dark') {
      document.body.setAttribute('data-theme', 'dark');
      document.getElementById('themeBtn').innerText = '☀️ Tema';
    }
    
    if(!userProfile.name) {
      setTimeout(openProfile, 1000); // İlk girişte modalı aç
    } else {
      document.getElementById('greetingText').innerText = `OWLS | ${userProfile.name}`;
    }
  }

  function toggleTheme() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').innerText = isDark ? '🌙 Tema' : '☀️ Tema';
    localStorage.setItem('owlsTheme', isDark ? 'light' : 'dark');
  }

  // --- MODAL İŞLEMLERİ ---
  function openProfile() {
    document.getElementById('profileModal').classList.add('active');
    document.getElementById('userName').value = userProfile.name;
    document.querySelectorAll('.interest-tag').forEach(tag => {
      if(userProfile.interests.includes(tag.dataset.val)) tag.classList.add('selected');
      
      // Event listener sadece bir kere eklenmeli
      tag.onclick = function() { this.classList.toggle('selected'); };
    });
  }

  function saveProfile() {
    const name = document.getElementById('userName').value || 'Ziyaretçi';
    const interests = Array.from(document.querySelectorAll('.interest-tag.selected')).map(t => t.dataset.val);
    
    userProfile = { name, interests };
    localStorage.setItem('owlsProfile', JSON.stringify(userProfile));
    
    document.getElementById('greetingText').innerText = `OWLS | ${name}`;
    document.getElementById('profileModal').classList.remove('active');
    
    // Profili güncelleyince haritayı yeniden yükle
    fetchNews(currentQ);
  }

  // --- HARİTA VE KOORDİNATLAR ---
  const map = L.map('map', { zoomControl: false }).setView([20, 10], 2);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

  const COORDS = { us:[37,-95], gb:[54,-2], de:[51,10], tr:[38,35], fr:[46,2], jp:[36,138], cn:[35,104], ru:[61,105], in:[20,78] };
  let markers = [];
  let currentQ = 'world';
  let dopamineTimer;

  function getCoords(text, i) {
    const t = text.toLowerCase();
    let code = null;
    if(t.includes('uk') || t.includes('england') || t.includes('bbc')) code = 'gb';
    else if(t.includes('us') || t.includes('america')) code = 'us';
    else if(t.includes('turkey')) code = 'tr';
    
    const k = code || Object.keys(COORDS)[i % Object.keys(COORDS).length];
    const b = COORDS[k] || COORDS['us'];
    return [b[0]+(Math.random()-.5)*2, b[1]+(Math.random()-.5)*2];
  }

  function pulseIcon(color) {
    return L.divIcon({
      html: `<div style="width:14px;height:14px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 10px ${color};"></div>`,
      iconSize:[14,14], iconAnchor:[7,7]
    });
  }

  // --- DOPAMİN POPUP ---
  function triggerDopamine(articles) {
    clearTimeout(dopamineTimer);
    const popup = document.getElementById('dopaminePopup');
    popup.classList.remove('show');

    // Eğer kullanıcının ilgi alanı varsa, haberleri o alana göre filtreleyip göster
    let relevantArticles = articles;
    if(userProfile.interests.length > 0) {
      relevantArticles = articles.filter(a => userProfile.interests.some(interest => (a.title || '').toLowerCase().includes(interest)));
      if(relevantArticles.length === 0) relevantArticles = articles; // Eşleşme yoksa rastgele devam
    }

    if(relevantArticles.length < 1) return;
    
    dopamineTimer = setTimeout(() => {
        const rnd = relevantArticles[Math.floor(Math.random() * relevantArticles.length)];
        document.getElementById('dopamineTitle').innerText = rnd.title.substring(0,50) + "...";
        popup.onclick = () => window.open(rnd.url, '_blank');
        popup.classList.add('show');
        setTimeout(() => popup.classList.remove('show'), 6000);
    }, 5000);
  }

  // --- HABER ÇEKME VE RENDER ---
  async function fetchRSS(url, sourceName) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
      const data = await res.json();
      return (data.items || []).map(item => ({
        title: item.title, url: item.link, source: sourceName,
        date: item.pubDate, thumb: item.thumbnail || (item.enclosure && item.enclosure.link)
      }));
    } catch(e) { return []; }
  }

  async function fetchNews(category) {
    const list = document.getElementById('newsList');
    list.innerHTML = `<div style="padding:30px;text-align:center;">🦉<br>Haberler toplanıyor...</div>`;
    
    // KAYNAK ÇEŞİTLİLİĞİ: Kategoriye göre farklı API ve RSS'ler
    let articles = [];
    
    if(category === 'world') {
      articles = await fetchRSS('http://feeds.bbci.co.uk/news/world/rss.xml', 'BBC World');
      const g = await fetch(`https://content.guardianapis.com/world?api-key=0a321643-aaab-4c6a-9185-1762685abe3d&page-size=10&show-fields=thumbnail`).then(r=>r.json());
      const gArts = (g.response?.results || []).map(a => ({ title: a.webTitle, url: a.webUrl, source: 'Guardian', thumb: a.fields?.thumbnail }));
      articles = [...articles, ...gArts];
    } else if (category === 'technology') {
      articles = await fetchRSS('https://techcrunch.com/feed/', 'TechCrunch');
    } else {
      const g = await fetch(`https://content.guardianapis.com/${category}?api-key=0a321643-aaab-4c6a-9185-1762685abe3d&page-size=20&show-fields=thumbnail`).then(r=>r.json());
      articles = (g.response?.results || []).map(a => ({ title: a.webTitle, url: a.webUrl, source: 'Guardian', thumb: a.fields?.thumbnail }));
    }

    renderArticles(articles);
  }

  function renderArticles(articles) {
    const list = document.getElementById('newsList');
    markers.forEach(m => map.removeLayer(m)); markers = []; list.innerHTML = '';

    articles.sort(() => Math.random() - 0.5).slice(0,20).forEach((a, i) => {
      const coords = getCoords(a.title, i);
      const marker = L.marker(coords, {icon: pulseIcon('#0d9488')}).addTo(map);
      marker.bindPopup(`<b>${a.title}</b><br><small>${a.source}</small>`);
      markers.push(marker);

      const card = document.createElement('div');
      card.className = 'news-card';
      card.innerHTML = `
        <div>
          <span class="badge" style="background:#0d948822; color:#0d9488">${a.source}</span>
          <div class="news-title">${a.title}</div>
        </div>
        ${a.thumb ? `<img src="${a.thumb}" class="news-thumb">` : ''}
      `;
      card.onclick = () => { map.flyTo(coords, 5); marker.openPopup(); };
      list.appendChild(card);
    });

    triggerDopamine(articles);
  }

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = function() {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentQ = this.dataset.q;
      fetchNews(currentQ);
    };
  });

  initApp();
  fetchNews('world');
</script>
</body>
</html>
