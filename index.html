    body {
      font-family: 'Inter', sans-serif;
      background: #f0f7f7;
      color: #1a2e2e;
      overflow: hidden;
    }

    .splash {
      position: fixed;
      inset: 0;
      background: #0d9488;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }

    .splash.hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-owl {
      font-size: 70px;
      animation: float 1.5s ease-in-out infinite;
    }

    .splash-title {
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 8px;
      margin-top: 12px;
    }

    .splash-sub {
      font-size: 12px;
      color: #99f6e4;
      letter-spacing: 3px;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .splash-bar {
      width: 180px;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin-top: 26px;
      overflow: hidden;
    }

    .splash-progress {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 0;
      transition: width 1.4s ease;
    }

    .header {
      background: #fff;
      border-bottom: 1px solid #ccece9;
      padding: 8px 16px;
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
    }

    .owl-svg {
      width: 34px;
      height: 34px;
      animation: blink 5s infinite;
    }

    @keyframes blink {
      0%,88%,100% { transform: scaleY(1); }
      91% { transform: scaleY(0.08); }
      94% { transform: scaleY(1); }
      97% { transform: scaleY(0.08); }
    }

    .logo-text {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: #0d9488;
    }

    .logo-sub {
      font-size: 9px;
      color: #5eead4;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: -2px;
    }

    .cat-bar {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .cat-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #99d6d0;
      background: #fff;
      color: #0d9488;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      white-space: nowrap;
    }

    .cat-btn:hover {
      background: #f0fdfa;
    }

    .cat-btn.active {
      background: #0d9488;
      color: #fff;
      border-color: #0d9488;
    }

    .layout {
      display: flex;
      height: calc(100vh - 56px);
    }

    #map {
      flex: 1;
      min-width: 0;
    }

    @keyframes markerPulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .pulse-marker {
      border-radius: 50%;
      border: 2.5px solid #fff;
      animation: markerPulse 2.5s ease-in-out infinite;
      cursor: pointer;
    }

    .sidebar {
      width: 340px;
      flex-shrink: 0;
      background: #fff;
      border-left: 1px solid #ccece9;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      padding: 12px 14px;
      border-bottom: 1px solid #e6f7f5;
      font-size: 11px;
      font-weight: 700;
      color: #0d9488;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: #10b981;
    }

    .live-dot::before {
      content:'';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: livePulse 2s infinite;
    }

    @keyframes livePulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }

    .news-list {
      overflow-y: auto;
      flex: 1;
    }

    .news-card {
      border-bottom: 1px solid #f0faf9;
      cursor: pointer;
      transition: background 0.15s;
      animation: slideIn 0.35s ease both;
      overflow: hidden;
    }

    .news-thumb {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .news-card:hover .news-thumb {
      transform: scale(1.03);
    }

    .news-card-body {
      padding: 10px 14px 12px;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .news-card:hover {
      background: #f0fdfa;
    }

    .news-card.active {
      background: #e6f7f5;
      border-left: 3px solid #0d9488;
    }

    .badge-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .cat-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .src-badge {
      font-size: 9px;
      color: #0d9488;
      font-weight: 600;
      background: #e6f7f5;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .news-title {
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1.45;
      color: #1a2e2e;
      margin-bottom: 4px;
    }

    .news-meta {
      font-size: 10px;
      color: #aac4c2;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      flex-direction: column;
      gap: 12px;
      padding: 40px 20px;
      text-align: center;
    }

    .owl-bounce {
      font-size: 34px;
      animation: float 1.8s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .loading-text {
      font-size: 12px;
      color: #0d9488;
      font-weight: 600;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      border: 1px solid #ccece9 !important;
      padding: 0 !important;
      overflow: hidden !important;
      box-shadow: 0 8px 32px rgba(13,148,136,0.15) !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      width: 240px !important;
    }

    .popup-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
    }

    .popup-body {
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
    }

    .popup-cat {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .popup-title {
      font-size: 12.5px;
      font-weight: 600;
      line-height: 1.4;
      color: #1a2e2e;
      margin-bottom: 4px;
    }

    .popup-src {
      font-size: 10px;
      color: #99b8b5;
      margin-bottom: 8px;
    }

    .popup-link {
      font-size: 11px;
      color: #0d9488;
      text-decoration: none;
      font-weight: 700;
    }

    .popup-link:hover {
      text-decoration: underline;
    }

    .leaflet-popup-tip {
      background: #fff !important;
    }

      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .cat-bar {
        justify-content: flex-start;
      }

      .layout {

        height: auto;

      #map {

      .sidebar {
        width: 100%;
        height: 380px;
        border-left: none;
        border-top: 1px solid #ccece9;

      body {

        font-size: 10px;
        padding: 3px 9px;

      'besiktas':'tr','beşiktaş':'tr','trabzonspor':'tr','süper lig':'tr',

      'celtic':'gb','rangers':'gb',

      'champions league':'eu','europa league':'eu','conference league':'eu',
      'world cup':'int','copa america':'int','euros':'eu','uefa':'eu','fifa':'int',

      'england':'gb','germany':'de','france':'fr','spain':'es','italy':'it',
      'brazil':'br','argentina':'ar','portugal':'pt','netherlands':'nl'
    };

    const KEYWORDS = {
      'new york':'us','washington dc':'us','los angeles':'us','silicon valley':'us',
      'san francisco':'us','chicago':'us','seattle':'us','boston':'us','houston':'us',
      'london':'gb','manchester':'gb','birmingham':'gb','liverpool':'gb',
      'edinburgh':'gb','glasgow':'gb',
      'istanbul':'tr','ankara':'tr','izmir':'tr',
      'berlin':'de','munich':'de','hamburg':'de','frankfurt':'de',
      'paris':'fr','lyon':'fr','marseille':'fr',
      'madrid':'es','barcelona':'es','seville':'es',
      'rome':'it','milan':'it','naples':'it',
      'amsterdam':'nl','brussels':'be','vienna':'at','zurich':'ch',
      'stockholm':'se','oslo':'no','copenhagen':'dk','warsaw':'pl',
      'kyiv':'ua','moscow':'ru','st petersburg':'ru',
      'tokyo':'jp','osaka':'jp','beijing':'cn','shanghai':'cn','hong kong':'cn',
      'seoul':'kr','singapore':'sg','bangkok':'th','dubai':'ae','riyadh':'sa',
      'delhi':'in','mumbai':'in','tehran':'ir','tel aviv':'il','jerusalem':'il',
      'cairo':'eg','lagos':'ng','nairobi':'ke','johannesburg':'za','cape town':'za',
      'sao paulo':'br','rio de janeiro':'br','buenos aires':'ar',
      'sydney':'au','melbourne':'au','auckland':'nz',

      'united states':'us','america':'us','white house':'us','pentagon':'us',
      'wall street':'us','congress':'us','senate':'us','trump':'us','biden':'us',
      'united kingdom':'gb','britain':'gb','downing street':'gb','parliament':'gb',
      'scotland':'gb','wales':'gb','northern ireland':'gb',
      'germany':'de','france':'fr','italy':'it','spain':'es','netherlands':'nl',
      'portugal':'pt','belgium':'be','switzerland':'ch','austria':'at',
      'sweden':'se','norway':'no','denmark':'dk','finland':'fi','greece':'gr',
      'poland':'pl','ukraine':'ua','russia':'ru','china':'cn','japan':'jp',
      'south korea':'kr','india':'in','pakistan':'pk','iran':'ir',
      'israel':'il','gaza':'il','west bank':'il','palestine':'il',
      'saudi arabia':'sa','turkey':'tr','türkiye':'tr','egypt':'eg',
      'south africa':'za','nigeria':'ng','kenya':'ke','ethiopia':'et',
      'brazil':'br','argentina':'ar','mexico':'mx','colombia':'co',
      'indonesia':'id','australia':'au','new zealand':'nz',
      'taiwan':'cn','macau':'cn',
      'european union':'eu','nato':'eu','g7':'int','g20':'int'
    };

    const SEARCH_QUERIES = {
      ai: 'artificial intelligence OR AI OR OpenAI OR ChatGPT OR machine learning',
      technology: 'technology OR big tech OR Apple OR Google OR Microsoft OR Meta OR Amazon',
      startups: 'startup OR startups OR venture capital OR funding OR founder'
    };

    const SECTIONS = {
      world: 'world',
      business: 'business',
      science: 'science',
      sport: 'football',
      turkce: 'world/turkey'
    };

    let markers = [];
    let currentCat = 'world';
    let currentLabel = 'WORLD';
    let dopamineTimer; // DOPAMİN TİMER EKLENDİ

    function detectLocation(text) {
      const t = (text || '').toLowerCase();

      for (const [k, v] of Object.entries(CLUBS)) {
        if (t.includes(k)) {
          for (const [city, coords] of Object.entries(CITY_COORDS)) {
            if (k.includes(city)) return { coords, country: k, isCity: true };
          }
          return { countryCode: v };
        }
      }

      for (const [city, coords] of Object.entries(CITY_COORDS)) {
        if (t.includes(city)) {
          return {
            coords,
            country: city.split(' ').map(w => w[0].toUpperCase() + w.slice(1)).join(' '),
            isCity: true
          };
        }
      }

      for (const [k, v] of Object.entries(KEYWORDS)) {
        if (t.includes(k)) return { countryCode: v };
      }

      return null;
    }

    function getCoords(text, i) {
      const loc = detectLocation(text);

      if (loc) {
        if (loc.isCity && loc.coords) {
          const jitter = 0.3;
          return {
            coords: [
              loc.coords[0] + (Math.random() - 0.5) * jitter,
              loc.coords[1] + (Math.random() - 0.5) * jitter
            ],
            label: loc.country
          };
        }

        if (loc.countryCode) {
          const b = COUNTRY_COORDS[loc.countryCode] || COUNTRY_COORDS.us;
          return {
            coords: [
              b[0] + (Math.random() - 0.5) * 2,
              b[1] + (Math.random() - 0.5) * 2
            ],
            label: COUNTRY_NAMES[loc.countryCode] || 'Dünya'
          };
        }
      }

      const keys = Object.keys(COUNTRY_COORDS);
      const k = keys[i % keys.length];
      const b = COUNTRY_COORDS[k];

      return {
        coords: [
          b[0] + (Math.random() - 0.5) * 2,
          b[1] + (Math.random() - 0.5) * 2
        ],
        label: COUNTRY_NAMES[k] || 'Dünya'
      };
    }

    function pulseIcon(color) {
      return L.divIcon({
        className: '',
        html: `<div class="pulse-marker" style="width:14px;height:14px;background:${color};box-shadow:0 0 0 3px ${color}55"></div>`,
        iconSize: [14, 14],
        iconAnchor: [7, 7]
      });
    }

    function timeAgo(d) {
      if (!d) return '';
      const diff = Date.now() - new Date(d).getTime();
      const h = Math.floor(diff / 3600000);
      const mn = Math.floor(diff / 60000);

      if (h > 24) return Math.floor(h / 24) + ' gün önce';
      if (h > 0) return h + ' saat önce';
      return mn > 0 ? mn + ' dk önce' : 'Az önce';
    }

    function clearMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
    }

    function normalizeArticles(articles) {
      const seen = new Set();
      return articles.filter(a => {
        if (!a || !a.title || !a.url) return false;
        const key = a.url;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    // --- DOPAMİN TETİKLEYİCİ FONKSİYONU EKLENDİ ---
    function triggerDopamine(articles) {
      clearTimeout(dopamineTimer);
      const popup = document.getElementById('dopaminePopup');
      if(!popup) return;
      popup.classList.remove('show');

      if(!articles || articles.length < 3) return;

      const randomTime = Math.floor(Math.random() * 4000) + 4000;

      dopamineTimer = setTimeout(() => {
        const randomArticle = articles[Math.floor(Math.random() * Math.min(articles.length, 10))];
        const titleEl = document.getElementById('dopamineTitle');
        if(titleEl) titleEl.innerText = randomArticle.title.length > 55 ? randomArticle.title.substring(0,55) + "..." : randomArticle.title;

        popup.onclick = () => window.open(randomArticle.url, '_blank');
        popup.classList.add('show');

        setTimeout(() => { popup.classList.remove('show'); }, 7000);
      }, randomTime);
    }

    function renderArticles(articles, sourceName) {
      const list = document.getElementById('newsList');
      const color = COLORS[currentCat] || '#0d9488';

      clearMarkers();
      list.innerHTML = '';

      if (!articles || articles.length === 0) {
        list.innerHTML = '<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Haber bulunamadı.</div></div>';
        return;
      }

      articles.slice(0, 20).forEach((a, i) => {
        const searchText = `${a.title} ${a.desc || ''}`;
        const { coords, label } = getCoords(searchText, i);

        const marker = L.marker(coords, { icon: pulseIcon(color) }).addTo(map);

        marker.bindPopup(`
          <div>
            ${a.thumb ? `<img src="${a.thumb}" class="popup-img" onerror="this.style.display='none'"/>` : ''}
            <div class="popup-body">
              <div class="popup-cat" style="color:${color}">${currentLabel} · ${label}</div>
              <div class="popup-title">${a.title}</div>
              <div class="popup-src">${a.source || sourceName} · ${timeAgo(a.date)}</div>
              ${a.url ? `<a class="popup-link" href="${a.url}" target="_blank" rel="noopener noreferrer">Haberi oku →</a>` : ''}
            </div>
          </div>
        `, { maxWidth: 240 });

        markers.push(marker);

        const card = document.createElement('div');
        card.className = 'news-card';
        card.style.animationDelay = (i * 0.05) + 's';

        card.innerHTML = `
          ${a.thumb ? `<div style="overflow:hidden;height:130px"><img class="news-thumb" src="${a.thumb}" onerror="this.parentElement.style.display='none'" alt=""/></div>` : ''}
          <div class="news-card-body">
            <div class="badge-row">
              <span class="cat-badge" style="background:${color}20;color:${color}">${currentLabel}</span>
              <span class="src-badge">${a.source || sourceName}</span>
            </div>
            <div class="news-title">${a.title}</div>
            <div class="news-meta">${label} · ${timeAgo(a.date)}</div>
          </div>
        `;

        card.addEventListener('click', () => {
          document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
          map.setView(coords, 5, { animate: true });
          setTimeout(() => marker.openPopup(), 450);
        });

        list.appendChild(card);
      });

      // --- POPUP ÇAĞRISI BURAYA EKLENDİ ---
      triggerDopamine(articles);
    }

    async function fetchGuardian(section) {
      const url = `https://content.guardianapis.com/${section}?api-key=${GUARDIAN_KEY}&page-size=20&order-by=newest&show-fields=thumbnail,trailText&show-tags=keyword`;
      const res = await fetch(url);
      const data = await res.json();

      return (data.response?.results || []).map(a => ({
        title: a.webTitle,
        desc: (a.fields?.trailText || '') + ' ' + (a.tags || []).map(t => t.webTitle).join(' '),
        date: a.webPublicationDate,
        url: a.webUrl,
        thumb: a.fields?.thumbnail || null,
        source: 'The Guardian'
      }));
    }

    async function fetchGuardianSearch(query, sourceLabel = 'The Guardian') {
      const url = `https://content.guardianapis.com/search?api-key=${GUARDIAN_KEY}&page-size=20&order-by=newest&show-fields=thumbnail,trailText&show-tags=keyword&q=${encodeURIComponent(query)}`;
      const res = await fetch(url);
      const data = await res.json();

      return (data.response?.results || []).map(a => ({
        title: a.webTitle,
        desc: (a.fields?.trailText || '') + ' ' + (a.tags || []).map(t => t.webTitle).join(' '),
        date: a.webPublicationDate,
        url: a.webUrl,
        thumb: a.fields?.thumbnail || null,
        source: sourceLabel
      }));
    }

    async function fetchHN() {
      const res = await fetch('https://hacker-news.firebaseio.com/v0/topstories.json');
      const ids = await res.json();

      const stories = await Promise.all(
        ids.slice(0, 15).map(id =>
          fetch(`https://hacker-news.firebaseio.com/v0/item/${id}.json`).then(r => r.json())
        )
      );

      return stories
        .filter(s => s && s.title)
        .map(s => ({
          title: s.title,
          desc: '',
          thumb: null,
          date: new Date((s.time || Date.now()/1000) * 1000).toISOString(),
          url: s.url || `https://news.ycombinator.com/item?id=${s.id}`,
          source: 'Hacker News'
        }));
    }

    async function fetchNews(cat) {
      const list = document.getElementById('newsList');
      list.innerHTML = `<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Yükleniyor...</div></div>`;

      try {
        let articles = [];
        let sourceName = '';

        if (cat === 'ai') {
          articles = await fetchGuardianSearch(SEARCH_QUERIES.ai, 'Guardian AI');
          sourceName = 'Guardian AI';

        } else if (cat === 'technology') {
          const guardianTech = await fetchGuardianSearch(SEARCH_QUERIES.technology, 'Guardian Tech');
          const hnTech = await fetchHN();
          articles = normalizeArticles([...guardianTech.slice(0, 10), ...hnTech.slice(0, 10)]);
          sourceName = 'Guardian Tech + Hacker News';

        } else if (cat === 'startups') {
          articles = await fetchGuardianSearch(SEARCH_QUERIES.startups, 'Guardian Startups');
          sourceName = 'Guardian Startups';

        } else if (cat === 'sport') {
          articles = await fetchGuardian(SECTIONS[cat]);
          articles = articles.map(a => ({ ...a, source: 'Guardian Football' }));
          sourceName = 'Guardian Football';

        } else {
          articles = await fetchGuardian(SECTIONS[cat] || 'world');
          sourceName = cat === 'turkce' ? 'The Guardian' : 'The Guardian';
        }

        renderArticles(normalizeArticles(articles), sourceName);

      } catch (e) {
        console.error(e);
        list.innerHTML = `<div class="loading"><div class="owl-bounce">🦉</div><div class="loading-text">Bağlantı hatası.<br>Sayfayı yenile.</div></div>`;
      }
    }

    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentCat = this.dataset.cat;
        currentLabel = this.dataset.label;
        fetchNews(currentCat);
      });
    });

    fetchNews('world');
  </script>
