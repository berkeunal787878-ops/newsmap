<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="theme-color" content="#f4fbfc"/>
  <title>OWLS — Global Intelligence</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#f4fbfc; --bg2:#e8f5f7; --bg3:#d0ebeb; --card:#fff;
      --border:#b8e0df; --accent:#0098a0; --accent2:#e55a20;
      --text:#0a1b24; --text2:#3a5866; --text3:#6b8a99;
      --saved:#d4a800; --crit:#e03131; --warn:#ffb020;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);}

    /* ─── KESİN KIRMIZI HAREKETLİ RADAR ÇİZGİSİ ─── */
    .relation-line {
      stroke: var(--crit) !important;
      stroke-width: 3px !important;
      stroke-dasharray: 12, 12 !important;
      animation: radarBeam 0.8s linear infinite;
      filter: drop-shadow(0 0 6px rgba(224, 49, 49, 0.9)) !important;
    }
    @keyframes radarBeam{to{stroke-dashoffset:-24;}}

    /* ─── SPLASH ─── */
    .splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .6s;}
    .splash.hide{opacity:0;pointer-events:none;}
    .splash-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,152,160,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,152,160,.08) 1px,transparent 1px);background-size:40px 40px;}
    .splash-owl{font-size:72px;animation:owlFloat 2s ease-in-out infinite;position:relative;z-index:1;}
    .splash-title{font-size:52px;font-weight:800;color:var(--accent);letter-spacing:10px;margin-top:12px;position:relative;z-index:1;}
    .splash-sub{font-size:10px;color:var(--text3);letter-spacing:3px;margin-top:6px;font-family:'Space Mono',monospace;position:relative;z-index:1;}
    .splash-bar{width:180px;height:4px;background:var(--bg3);border-radius:4px;margin-top:28px;overflow:hidden;position:relative;z-index:1;}
    .splash-fill{height:100%;background:var(--accent);border-radius:4px;animation:loadBar 2.2s ease forwards;}
    @keyframes loadBar{from{width:0}to{width:100%}}
    @keyframes owlFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* ─── HEADER & PREMIUM LOGIN ─── */
    .header{position:fixed;top:0;left:0;right:0;height:52px;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;z-index:600;}
    .logo{display:flex;align-items:center;gap:8px;cursor:pointer;}
    .logo-name{font-size:17px;font-weight:800;letter-spacing:3px;color:var(--accent);}
    .logo-sub{font-size:9px;color:var(--text3);font-family:'Space Mono',monospace;font-weight:700;}
    .hdr-right{display:flex;align-items:center;gap:8px;}
    .hbtn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;white-space:nowrap;}
    .hbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg2);}
    .bcount{background:var(--accent2);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;margin-left:2px;}
    
    .user-wrap{position:relative; display:none; align-items:center; gap:8px; background:var(--bg); padding:4px 10px 4px 4px; border-radius:30px; border:1px solid var(--border); cursor:pointer; transition:border .2s;}
    .user-wrap:hover { border-color:var(--accent); }
    .uavatar{width:28px;height:28px;border-radius:50%;}
    .user-name-display { font-size:12px; font-weight:700; color:var(--text); display:none; }
    
    @media(min-width:769px){ 
        .user-name-display { display:block; } 
    }

    .user-menu{position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;min-width:220px;box-shadow:0 12px 32px rgba(0,0,0,.1);z-index:700;display:none;animation:fadeIn .15s ease;}
    .user-menu.open{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .um-head{padding:10px 10px 12px;border-bottom:1px solid var(--border);margin-bottom:6px;}
    .um-name{font-size:14px;font-weight:800;color:var(--text);}
    .um-email{font-size:10px;color:var(--text3);margin-top:4px;font-family:'Space Mono',monospace;}
    .um-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);transition:background .15s;}
    .um-item:hover{background:var(--bg2);color:var(--accent);}
    .um-item.danger{color:var(--crit);}
    .um-item.danger:hover{background:rgba(224,49,49,.08);}

    /* ─── TOP BARS ─── */
    .top-bars{position:fixed;top:52px;left:0;right:0;height:68px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:590;display:flex;flex-direction:column;justify-content:center;}
    .bar-row{display:flex;gap:4px;overflow-x:auto;padding:4px 14px;scrollbar-width:none;}
    .bar-row::-webkit-scrollbar{display:none;}
    .bar-row+.bar-row{border-top:1px solid var(--border);}
    .rbtn{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;}
    .rbtn.active,.rbtn:hover{background:var(--bg3);color:var(--accent);border-color:var(--accent);}
    .cbtn{flex-shrink:0;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .cbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .cbtn:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--bg);}
    .cbtn.fav-cat{border-color:var(--saved);color:var(--saved);}
    .cbtn.fav-cat.active{background:var(--saved);border-color:var(--saved);color:#fff;}

    /* ─── LAYOUT ─── */
    #map{position:fixed;top:120px;left:0;right:350px;bottom:0;z-index:1;background:var(--bg);}
    .sidebar{position:fixed;top:52px;right:0;width:350px;bottom:0;display:flex;flex-direction:column;background:var(--card);border-left:1px solid var(--border);z-index:400;overflow:hidden;}

    /* ─── SIDEBAR ─── */
    .stabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card);}
    .stab{flex:1;padding:12px 2px;text-align:center;font-size:10px;font-weight:800;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;font-family:'Space Mono',monospace;}
    .stab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .spanel{flex:1;overflow-y:auto;display:none;flex-direction:column;min-height:0;}
    .spanel.active{display:flex;}
    .live-row{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
    .live-dot{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--accent);font-family:'Space Mono',monospace;font-weight:700;}
    .live-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite;}
    .scount{font-size:9px;color:var(--text2);font-family:'Space Mono',monospace;font-weight:700;}
    .news-scroll{overflow-y:auto;flex:1;}

    /* ─── NEWS CARDS ─── */
    .ncard{padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer;position:relative;transition:background .12s;}
    .ncard:hover{background:var(--bg);}
    .ncard.active{background:var(--bg2);border-left:4px solid var(--accent);}
    .ncard.read{opacity:.6;}
    .ncard-row{display:flex;gap:11px;}
    .nthumb{width:70px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);}
    .nthumb-ph{width:70px;height:52px;border-radius:8px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);}
    .ninfo{flex:1;min-width:0;}
    .nsrc{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--accent2);font-family:'Space Mono',monospace;display:flex;justify-content:space-between;align-items:center;}
    .ntitle{font-size:13px;font-weight:700;line-height:1.35;margin:4px 0;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .nmeta{font-size:9px;color:var(--text3);display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;font-weight:700;align-items:center;}
    .nloc{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'Space Mono',monospace;color:var(--accent);}
    
    .th-crit{color:var(--crit);background:rgba(224,49,49,.1);padding:2px 5px;border-radius:4px;border:1px solid rgba(224,49,49,.3);}
    .th-warn{color:var(--warn);background:rgba(255,176,32,.1);padding:2px 5px;border-radius:4px;border:1px solid rgba(255,176,32,.3);}
    
    .nbookmark{position:absolute;right:10px;top:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s;color:var(--text2);}
    .ncard:hover .nbookmark{opacity:1;}
    .nbookmark:hover{color:var(--accent);border-color:var(--accent);}
    .nbookmark.on{opacity:1;color:var(--saved);border-color:var(--saved);}
    .unread-dot{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--accent);}

    /* ─── MODAL (HABER DETAYI VE ÖNERİLER) ─── */
    .moverlay{position:fixed;inset:0;background:rgba(10,27,36,.8);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
    .moverlay.on{opacity:1;pointer-events:auto;}
    .mbox{background:var(--card);border:1px solid var(--border);border-radius:16px;width:92%;max-width:560px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.15);transform:translateY(14px);transition:transform .3s;}
    .moverlay.on .mbox{transform:translateY(0);}
    .mhero{width:100%;height:240px;object-fit:cover;border-radius:16px 16px 0 0;display:block;}
    
    .mclose{position:absolute;top:12px;right:14px;width:36px;height:36px;background:rgba(255,255,255,.95);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;}
    .mbody{padding:24px;}
    .mtags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .mtag{font-size:9px;font-weight:800;letter-spacing:1px;padding:4px 10px;border-radius:20px;font-family:'Space Mono',monospace;}
    .mtitle{font-size:22px;font-weight:800;line-height:1.3;margin-bottom:16px;}
    .mdesc{font-size:15px;line-height:1.7;color:var(--text2);margin-bottom:24px;font-weight:500;}
    .mfooter{display:flex;gap:10px;flex-wrap:wrap; margin-bottom: 24px;}
    .mbtn{padding:12px 24px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:1px solid var(--border);font-family:'Syne',sans-serif;}
    .mbtn.pri{background:var(--accent);color:#fff;border-color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
    .mbtn.sec{background:var(--bg);color:var(--text2);}
    .mbtn.sv.on{color:var(--saved);border-color:var(--saved);}

    /* İlgili Haberler Bölümü */
    .m-related-title { font-size: 11px; font-weight: 800; color: var(--text3); font-family: 'Space Mono', monospace; letter-spacing: 1px; margin-bottom: 12px; border-top: 1px solid var(--border); padding-top: 24px; }
    .m-related-grid { display: flex; flex-direction: column; gap: 10px; }
    .m-rel-card { display: flex; gap: 10px; padding: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); cursor: pointer; transition: border .2s; }
    .m-rel-card:hover { border-color: var(--accent); }
    .m-rel-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
    .m-rel-info { display: flex; flex-direction: column; justify-content: center; }
    .m-rel-src { font-size: 9px; font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
    .m-rel-ttl { font-size: 12px; font-weight: 700; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* ─── DATA PANEL & PROFILE ─── */
    .data-body, .profile-body{padding:16px;display:flex;flex-direction:column;gap:14px;}
    .stat-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;}
    .stat-title{font-size:9px;font-family:'Space Mono',monospace;font-weight:700;color:var(--text3);letter-spacing:1px;margin-bottom:10px;}
    .stat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:12px;font-weight:700;}
    .stat-bar-bg{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
    .stat-bar-fill{height:100%;border-radius:3px;transition:width 1s ease-out;}
    .profile-avatar-big{width:64px;height:64px;border-radius:50%;border:3px solid var(--accent);margin:0 auto 8px;}
    .profile-name{font-size:18px;font-weight:800;text-align:center;color:var(--text);}
    .profile-email{font-size:10px;color:var(--text3);text-align:center;font-family:'Space Mono',monospace;margin-top:2px;}
    .pref-cats{display:flex;flex-wrap:wrap;gap:6px;}
    .pref-cat{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s;}
    .pref-cat.on{background:var(--accent);color:#fff;border-color:var(--accent);}
    .login-cta{display:flex;flex-direction:column;align-items:center;gap:12px;padding:40px 20px;text-align:center;}
    .login-cta-owl{font-size:52px;}
    .google-btn{display:flex;align-items:center;gap:10px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Syne',sans-serif;}

    /* ─── ALERTS ─── */
    .alerts-body{padding:16px;}
    .alert-input-row{display:flex;gap:8px;margin-bottom:12px;}
    .alert-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;outline:none;}
    .alert-add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:800;cursor:pointer;}
    .alert-tags{display:flex;flex-wrap:wrap;gap:8px;}
    .atag{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:10px;font-weight:700;color:var(--accent);}

    /* ─── WEB POP-UP (KAPANMA HATASI ÇÖZÜLDÜ) ─── */
    .bbc-popup-wrap .leaflet-popup-content-wrapper{padding:0!important;border-radius:0!important;overflow:hidden;border:1px solid var(--border)!important;background:var(--card)!important;box-shadow:0 16px 40px rgba(0,0,0,.16)!important;}
    .bbc-popup-wrap .leaflet-popup-content{margin:0!important;width:300px!important;}
    .bbc-popup-wrap .leaflet-popup-tip{background:var(--card)!important;}
    
    /* Close Button Fix */
    .leaflet-container a.leaflet-popup-close-button {
      color: #fff !important; 
      background: rgba(10,27,36,.7) !important; 
      border-radius: 50% !important; 
      width: 28px !important; 
      height: 28px !important; 
      line-height: 28px !important; 
      text-align: center !important; 
      top: 10px !important; 
      right: 10px !important; 
      padding: 0 !important; 
      font-size: 16px !important;
      z-index: 9999 !important; /* En üstte tutar */
      pointer-events: auto !important; /* Tıklanabilir yapar */
    }
    .leaflet-container a.leaflet-popup-close-button:hover{background:var(--crit)!important;}

    .bbc-card{cursor:pointer;background:var(--card);transition:background .15s;}
    .bbc-hero{width:100%;height:170px;object-fit:cover;display:block;border-bottom:1px solid var(--border);}
    .bbc-body{padding:14px 16px 16px;}
    .bbc-src{font-size:9px;font-weight:800;color:var(--accent2);text-transform:uppercase;font-family:'Space Mono',monospace;}
    .bbc-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.28;margin:8px 0; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .bbc-desc{font-size:12px;color:var(--text2);line-height:1.55;font-weight:500; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

    /* ─── TOASTS, BREAKING, LOADER ─── */
    .tstack{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:8000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:360px;}
    .toast{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:12px 16px;width:100%;box-shadow:0 8px 24px rgba(0,152,160,.15);display:flex;align-items:center;gap:12px;pointer-events:auto;transform:translateY(80px);opacity:0;}
    .toast.show{transform:translateY(0);opacity:1;}
    .breaking{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:linear-gradient(135deg,#ff0f4f,#ff8c00);color:#fff;padding:14px 20px;border-radius:28px;font-weight:800;z-index:8500;display:flex;align-items:center;gap:14px;cursor:pointer;}
    .breaking.show{transform:translateX(-50%) translateY(0);}
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;}
    .loader-owl{font-size:42px;animation:owlFloat 2s infinite;}
    .loader-txt{font-size:10px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace;letter-spacing:2px;}
    .loader-txt::after{content:'';animation:dots 1.5s infinite steps(4,end);}

    /* ─── MOBILE ─── */
    @media(max-width:768px){
      .top-bars{display:none;}
      #map{position:fixed;top:52px;left:0;right:0;bottom:calc(45vh + 54px);z-index:1;}
      .sidebar{position:fixed;top:auto;bottom:54px;left:0;right:0;width:100%;height:45vh;border-left:none;border-top:2px solid var(--border);z-index:450; border-radius:16px 16px 0 0;}
      .sidebar.map-only{display:none;}
      .sidebar.list-full{height:calc(100vh - 52px - 54px);border-radius:0;}
      #map.list-full{display:none;}
      .mob-bar{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:600;}
      .mbbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-size:9px;font-family:'Space Mono',monospace;font-weight:700;}
      .mbbtn .mbi{font-size:22px;}
      .mbbtn.active{color:var(--accent);}
      .mob-filter{position:fixed;bottom:56px;left:0;right:0;background:var(--card);border-top:2px solid var(--border);border-radius:16px 16px 0 0;padding:14px 16px;z-index:590;display:none;flex-wrap:wrap;gap:8px;}
      .mob-filter.open{display:flex;}
      .mbox{width:100%;max-width:100%;border-radius:20px 20px 0 0;max-height:92vh;border-bottom:none;}
      .moverlay{align-items:flex-end;}
    }
    @media(min-width:769px){.mob-bar,.mob-filter{display:none!important;}}
  </style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-grid"></div>
  <div class="splash-owl">🦉</div>
  <div class="splash-title">OWLS</div>
  <div class="splash-sub">TRUE GLOBAL INTELLIGENCE</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<div class="header">

<script>
// ─── FIREBASE ───
const fbCfg={apiKey:"AIzaSyBf3EDUobPIaZL6Jzu5i1ITT8YRSZaCOa8",authDomain:"newsmap-5d380.firebaseapp.com",projectId:"newsmap-5d380",storageBucket:"newsmap-5d380.firebasestorage.app",messagingSenderId:"270586913079",appId:"1:270586913079:web:271cb786e7195299f73ab2"};
firebase.initializeApp(fbCfg); const auth=firebase.auth(); const db=firebase.firestore();

// ─── STATE ───
let curQ='world', curR='all';
let allArticles=[], clusterLayer;
let curModalArt=null;
let savedArts=JSON.parse(localStorage.getItem('owls_saved')||'[]');
let readSet=new Set(JSON.parse(localStorage.getItem('owls_read')||'[]'));
let favCats=JSON.parse(localStorage.getItem('owls_favcats')||'[]');
let readCount=parseInt(localStorage.getItem('owls_readcount')||'0');
let currentFetchId=0;

// ─── MAP (NOKTA ATIŞI + SPIDERFY EKLENDİ) ───
const map=L.map('map',{zoomControl:false, preferCanvas:true}).setView([20,10],2);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'© CARTO'}).addTo(map);
let relationLayer=L.layerGroup().addTo(map);
function fixMap(){setTimeout(()=>{map.invalidateSize({animate:false});},150);}

function getSentiment(title){
  const t=(title||'').toLowerCase();
  const crits=['war','attack','strike','missile','kill','dead','crash','crisis','conflict','bomb','terror','shoot','military','death','fatal'];
  const warns=['tension','warn','protest','sanction','threat','diplomacy','summit','economy','market','bank','rate','debt','election'];
  if(crits.some(w=>t.includes(w))) return{color:'var(--crit)',level:'CRITICAL',cls:'th-crit'};
  if(warns.some(w=>t.includes(w))) return{color:'var(--warn)',level:'WARNING',cls:'th-warn'};
  return{color:'var(--accent)',level:'INFO',cls:''};
}

function mkIcon(color){
  return L.divIcon({
    html:`<div style="position:relative;width:14px;height:14px"><div style="position:absolute;inset:0;border-radius:50%;border:3px solid ${color};animation:mpulse 2s infinite;opacity:.4"></div><div style="position:absolute;inset:2px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 2px 4px rgba(0,0,0,.2)"></div></div>`,
    iconSize:[14,14],iconAnchor:[7,7],className:''
  });
}

function drawRelations(a){
  relationLayer.clearLayers();
  if(!a||!a._c) return;
  const stop=['after','under','their','there','about','which','would','could'];
  const words=(a.title.toLowerCase().match(/\b[a-z]{5,}\b/g)||[]).filter(w=>!stop.includes(w));
  allArticles.filter(x=>x.url!==a.url&&x._c&&words.some(w=>x.title.toLowerCase().includes(w))).slice(0,5).forEach(rel=>{
    // Çizgi özellikleri güncellendi (Kalın, parlak kırmızı)
    L.polyline([a._c,rel._c],{color:'var(--crit)',weight:3,opacity:0.9,className:'relation-line'}).addTo(relationLayer);
  });
}
function clearRelations(){relationLayer.clearLayers();}

// ─── EXACT LOCATIONS (NO RANDOM JITTER) ───
const CITIES={'new york':[40.71,-74.00],'washington':[38.90,-77.03],'london':[51.50,-0.12],'paris':[48.85,2.35],'berlin':[52.52,13.40],'moscow':[55.75,37.61],'kyiv':[50.45,30.52],'beijing':[39.90,116.40],'tokyo':[35.68,139.69],'istanbul':[41.01,28.97],'dubai':[25.20,55.27],'sydney':[-33.86,151.20],'tel aviv':[32.08,34.78],'tehran':[35.69,51.39]};
const CAPS={us:[38.90,-77.03],gb:[51.50,-0.12],tr:[39.92,32.85],ru:[55.75,37.61],ua:[50.45,30.52],il:[31.76,35.21],ir:[35.69,51.39],cn:[39.90,116.40]};
const CNAMES={us:'USA',gb:'UK',tr:'Turkey',ru:'Russia',ua:'Ukraine',il:'Israel',ir:'Iran',cn:'China'};
const FALLBACKS=[[40.71,-74.00,'New York'],[51.50,-0.12,'London'],[35.68,139.69,'Tokyo']];
let fbIdx=0;

const REGION_BB={europe:{lat:[35,72],lng:[-25,45]},americas:{lat:[-60,75],lng:[-170,-30]},asia:{lat:[-10,60],lng:[60,150]},mideast:{lat:[12,42],lng:[25,62]}};
function artRegion(lat,lng){for(const[r,b]of Object.entries(REGION_BB))if(lat>=b.lat[0]&&lat<=b.lat[1]&&lng>=b.lng[0]&&lng<=b.lng[1])return r;return'other';}

// Ufak jitter, MarkerCluster'ın Spiderfy özelliğiyle birleşince kusursuz çalışır.
function getCoords(text){
  const t=(text||'').toLowerCase();
  for(const[c,v]of Object.entries(CITIES)) if(t.includes(c)) return{coords:[v[0],v[1]],loc:c.toUpperCase()};
  for(const[k,name]of Object.entries(CNAMES)) if(t.includes(name.toLowerCase())) return{coords:[CAPS[k][0],CAPS[k][1]],loc:name};
  const f=FALLBACKS[fbIdx%FALLBACKS.length];fbIdx++;return{coords:[f[0]+(Math.random()-.5)*0.5,f[1]+(Math.random()-.5)*0.5],loc:f[2]};
}

// ─── FETCHING ───
const GKEY='0a321643-aaab-4c6a-9185-1762685abe3d';
const RSS={
  world:[{u:'http://rss.cnn.com/rss/edition_world.rss',n:'CNN'},{u:'https://feeds.bbci.co.uk/news/world/rss.xml',n:'BBC World'},{u:'https://www.aljazeera.com/xml/rss/all.xml',n:'Al Jazeera'},{u:'https://www.france24.com/en/rss',n:'France24'},{u:'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',n:'NY Times'},{u:'https://feeds.dw.com/rss/rss-en-all',n:'DW'}],
  technology:[{u:'https://techcrunch.com/feed/',n:'TechCrunch'},{u:'https://www.theverge.com/rss/index.xml',n:'The Verge'},{u:'https://www.wired.com/feed/rss',n:'Wired'}],
  business:[{u:'https://feeds.a.dj.com/rss/WSJcomUSBusiness.xml',n:'WSJ'},{u:'https://search.cnbc.com/rs/search/combinedcms/view.xml?profile=12000000&id=10000664',n:'CNBC'}],
  politics:[{u:'https://rss.nytimes.com/services/xml/rss/nyt/Politics.xml',n:'NY Times'},{u:'https://www.theguardian.com/politics/rss',n:'Guardian'}]
};

async function tFetch(url,ms=5000){
  const c=new AbortController();
  const id=setTimeout(()=>c.abort(),ms);
  try{const r=await fetch(url,{signal:c.signal});clearTimeout(id);return r;}
  catch(e){clearTimeout(id);throw e;}
}

async function fetchGuardian(cat){
  try{
    const r=await tFetch(`https://content.guardianapis.com/${cat}?api-key=${GKEY}&page-size=15&show-fields=thumbnail,trailText`,5000);
    const d=await r.json();
    return(d.response?.results||[]).map(a=>({title:a.webTitle,url:a.webUrl,source:'The Guardian',date:a.webPublicationDate,thumb:a.fields?.thumbnail||null,trail:(a.fields?.trailText||'').replace(/<[^>]*>/gm,'')}));
  }catch{return[];}
}

async function fetchRSS(feed){
  try{
    const r=await tFetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feed.u)}`,5000);
    const d=await r.json();
    const xml=new DOMParser().parseFromString(d.contents,'text/xml');
    let items=[...xml.querySelectorAll('item')];
    if(!items.length)items=[...xml.querySelectorAll('entry')];
    return items.slice(0,10).map(it=>{
      const title=(it.querySelector('title')?.textContent||'').replace(/<!\[CDATA\[|\]\]>/g,'').trim();
      if(!title)return null;
      let url=it.querySelector('link')?.textContent; if(!url||!url.startsWith('http')){const lnk=it.querySelector('link');if(lnk)url=lnk.getAttribute('href');}
      let thumb=it.querySelector('enclosure[type^="image"]')?.getAttribute('url')||it.querySelector('thumbnail')?.getAttribute('url');
      // ÖZET İÇİN HARF LİMİTİ 450'YE ÇIKARILDI
      const trail=(it.querySelector('description')?.textContent||it.querySelector('summary')?.textContent||'').replace(/<[^>]*>/gm,'').trim().slice(0,450);
      return{title,url:url||'#',source:feed.n,thumb,trail};
    }).filter(Boolean);
  }catch{return[];}
}

async function fetchNews(cat){
  const fid=++currentFetchId;
  document.getElementById('newsList').innerHTML='<div class="loader"><div class="loader-owl">🦉</div><div class="loader-txt">SCANNING GLOBE</div></div>';
  const rssList=(RSS[cat]||RSS.world).slice().sort(()=>Math.random()-.5).slice(0,6);
  const results=await Promise.allSettled([fetchGuardian(cat==='world'?'world':cat), ...rssList.map(f=>fetchRSS(f))]);
  if(fid!==currentFetchId)return; 

  let arts=[];
  results.forEach(r=>{if(r.status==='fulfilled')arts.push(...r.value);});

  const seen=new Set();
  arts=arts.filter(a=>{if(!a.title||seen.has(a.title))return false;seen.add(a.title);return true;});

  arts.forEach(a=>{
    const{coords,loc}=getCoords(a.title);
    a._c=coords;a._loc=loc;a._r=artRegion(coords[0],coords[1]);
    a._sentiment=getSentiment(a.title);
  });

  arts.sort(()=>Math.random()-.5);
  allArticles=arts;
  renderFeed(arts);
  renderAnalytics(arts);
}

// ─── RENDER ───
function renderFeed(arts){
  if(clusterLayer)map.removeLayer(clusterLayer);
  // spiderfyOnMaxZoom ile aynı koordinattaki haberler kusursuz açılır
  clusterLayer=L.markerClusterGroup({maxClusterRadius:50, spiderfyOnMaxZoom: true, iconCreateFunction:cl=>L.divIcon({html:`<div class="ccluster" style="width:32px;height:32px;font-size:11px">${cl.getChildCount()}</div>`,className:''})});

  const list=document.getElementById('newsList'); list.innerHTML='';
  const filtered=curR==='all'?arts:arts.filter(a=>a._r===curR);
  document.getElementById('scount').textContent=`${filtered.length} stories`;

  const frag=document.createDocumentFragment();
  filtered.forEach(a=>{
    const m=L.marker(a._c,{icon:mkIcon(a._sentiment.color)});
    
    // YENİ WEBPAGE POP-UP'I
    const popupHtml=`
      <div class="bbc-card" onclick="window._openById('${encodeURIComponent(a.url)}')">
        ${a.thumb?`<img src="${a.thumb}" class="bbc-hero">`:`<div class="bbc-hero-ph">📰</div>`}
        <div class="bbc-body">
          <div class="bbc-src">${a.source}</div>
          <div class="bbc-title">${a.title}</div>
          <div class="bbc-desc">${a.trail ? a.trail.slice(0,120)+'...' : 'Click to read.'}</div>
        </div>
      </div>`;
    m.bindPopup(popupHtml,{maxWidth:300,minWidth:300,className:'bbc-popup-wrap'});
    m.on('mouseover',()=>drawRelations(a));
    m.on('mouseout',()=>clearRelations());
    clusterLayer.addLayer(m);

    const card=document.createElement('div');
    card.className='ncard'+(isRead(a)?' read':'');
    card.innerHTML=`
      <div class="ncard-row">
        ${a.thumb?`<img class="nthumb" src="${a.thumb}">`:`<div class="nthumb-ph">📰</div>`}
        <div class="ninfo">
          <div class="nsrc"><span>${a.source}</span></div>
          <div class="ntitle">${a.title}</div>
          <div class="nmeta"><span class="nloc">${a._loc}</span></div>
        </div>
      </div>`;
    card.onclick=()=>{ document.querySelectorAll('.ncard').forEach(c=>c.classList.remove('active')); card.classList.add('active'); map.flyTo(a._c,6); openModal(a); };
    card.addEventListener('mouseenter',()=>drawRelations(a));
    card.addEventListener('mouseleave',()=>clearRelations());
    frag.appendChild(card);
  });
  list.appendChild(frag);
  map.addLayer(clusterLayer);
}

function renderAnalytics(arts){
  const dash=document.getElementById('dataDashboard');
  if(!arts.length||!dash)return;
  let crit=0,warn=0;
  arts.forEach(a=>{ if(a._sentiment.level==='CRITICAL')crit++; else if(a._sentiment.level==='WARNING')warn++; });
  const total=arts.length||1,pC=Math.round(crit/total*100),pW=Math.round(warn/total*100);
  dash.innerHTML=`
    <div class="stat-box"><div class="stat-title">GLOBAL THREAT INDEX</div><div class="stat-row"><span style="color:var(--crit)">⚠ CRITICAL</span><span style="color:var(--crit);font-size:15px;font-weight:800">${pC}%</span></div><div class="stat-bar-bg" style="margin-bottom:12px"><div class="stat-bar-fill" style="width:${pC}%;background:var(--crit)"></div></div><div class="stat-row"><span style="color:var(--warn)">⚡ WARNING</span><span style="color:var(--warn);font-size:15px;font-weight:800">${pW}%</span></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pW}%;background:var(--warn)"></div></div></div>
  `;
}

function renderProfile(){
  const body=document.getElementById('profileBody');
  const user=auth.currentUser;
  if(!user){ body.innerHTML=`<div class="login-cta"><div class="login-cta-owl">🦉</div><div class="login-cta-title">Sign in to personalize OWLS</div><button class="google-btn" onclick="loginGoogle()">Continue with Google</button></div>`; return; }
  body.innerHTML=`
    <img src="${user.photoURL||''}" class="profile-avatar-big">
    <div class="profile-name">${user.displayName||'Owl User'}</div>
    <div class="profile-email">${user.email||''}</div>
  `;
}

// ─── MODAL VE İLGİLİ HABERLER ───
window._openById=function(enc){
  const url=decodeURIComponent(enc);
  const a=allArticles.find(x=>x.url===url);
  if(a){ map.closePopup(); openModal(a); }
};

function openModal(a){
  curModalArt=a; markRead(a.url);
  document.getElementById('mhero').src=a.thumb||'';
  document.getElementById('mhero').style.display=a.thumb?'block':'none';
  document.getElementById('mtitle').textContent=a.title;
  document.getElementById('msrc').textContent=a.source;
  document.getElementById('mloc').textContent=(a._loc||'Global').toUpperCase();
  document.getElementById('mthreat').textContent=a._sentiment.level;
  document.getElementById('mthreat').className='mtag '+a._sentiment.cls;
  document.getElementById('mthreat').style.display=a._sentiment.level==='INFO'?'none':'inline-block';
  
  // ÖZET KISMI BURADA UZUN GÖZÜKÜR
  document.getElementById('mdesc').textContent=a.trail?(a.trail + '...'):'Click below to read the full story on the original source.';
  document.getElementById('mlink').href=a.url;
  document.getElementById('msavebtn').textContent=isSaved(a)?'✓ Saved':'🔖 Save';
  
  // İLGİLİ HABERLERİ BUL VE ÇİZ
  const stop=['after','under','their','there','about','which','would','could','from'];
  const words=(a.title.toLowerCase().match(/\b[a-z]{5,}\b/g)||[]).filter(w=>!stop.includes(w));
  let related = allArticles.filter(x=>x.url!==a.url && words.some(w=>x.title.toLowerCase().includes(w))).slice(0,3);
  
  const relSec = document.getElementById('m-related-section');
  const relGrid = document.getElementById('m-related-grid');
  relGrid.innerHTML = '';
  
  if(related.length > 0) {
      relSec.style.display = 'block';
      related.forEach(rel => {
          const rCard = document.createElement('div');
          rCard.className = 'm-rel-card';
          rCard.innerHTML = `
              ${rel.thumb ? `<img src="${rel.thumb}" class="m-rel-img">` : `<div class="m-rel-img" style="background:var(--bg3);display:flex;align-items:center;justify-content:center">📰</div>`}
              <div class="m-rel-info">
                  <div class="m-rel-src">${rel.source}</div>
                  <div class="m-rel-ttl">${rel.title}</div>
              </div>
          `;
          rCard.onclick = () => { openModal(rel); };
          relGrid.appendChild(rCard);
      });
  } else {
      relSec.style.display = 'none';
  }

  document.getElementById('modal').classList.add('on');
}
function closeModal(){document.getElementById('modal').classList.remove('on');}

function toggleSaveModal(){
  if(!curModalArt)return;
  if(isSaved(curModalArt)){unsavArt(curModalArt.url);document.getElementById('msavebtn').textContent='🔖 Save';}
  else{savArt(curModalArt);document.getElementById('msavebtn').textContent='✓ Saved';}
  renderSaved();
}

function isSaved(a){return savedArts.some(s=>s.url===a.url);}
function isRead(a){return readSet.has(a.url);}
function markRead(url){readSet.add(url);readCount++;localStorage.setItem('owls_read',JSON.stringify([...readSet]));}
function updateSBadge(){document.getElementById('sbadge').textContent=savedArts.length;}
function savArt(a){if(isSaved(a))return;savedArts.unshift(a);updateSBadge();}
function unsavArt(enc){const url=decodeURIComponent(enc);savedArts=savedArts.filter(s=>s.url!==url);updateSBadge();}

function renderSaved(){
  updateSBadge();
  const list=document.getElementById('savedList');
  if(!savedArts.length){list.innerHTML='<div class="saved-empty"><div>No saved articles</div></div>';return;}
  list.innerHTML='';
  savedArts.forEach(a=>{
    const card=document.createElement('div');card.className='ncard';
    card.innerHTML=`<div class="ncard-row">${a.thumb?`<img class="nthumb" src="${a.thumb}">`:`<div class="nthumb-ph">📰</div>`}<div class="ninfo"><div class="nsrc">${a.source}</div><div class="ntitle">${a.title}</div></div></div>`;
    card.onclick=()=>openModal(a);list.appendChild(card);
  });
}

function stab(name){
  document.querySelectorAll('.stab').forEach((t,i)=>t.classList.toggle('active',['feed','saved','analytics','profile','alerts'][i]===name));
  document.querySelectorAll('.spanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+name).classList.add('active');
  if(name==='saved')renderSaved();
  if(name==='profile')renderProfile();
}

document.getElementById('regionBar').addEventListener('click',e=>{
  const b=e.target.closest('.rbtn');if(!b)return;
  document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curR=b.dataset.r;renderFeed(allArticles);
});
document.getElementById('catBar').addEventListener('click',e=>{
  const b=e.target.closest('.cbtn');if(!b)return;
  document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curQ=b.dataset.q;fetchNews(curQ);
});

function mobSwitch(mode){
  const mapEl=document.getElementById('map'),sb=document.getElementById('sidebar');
  ['mb-map','mb-news','mb-filter','mb-saved'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  document.getElementById('mobFilter').classList.remove('open');
  mapEl.className='';sb.className='sidebar';
  if(mode==='map'){ document.getElementById('mb-map').classList.add('active'); sb.classList.add('map-only'); }
  else { mapEl.classList.add('list-full');sb.classList.add('list-full'); document.getElementById('mb-news').classList.add('active');stab('feed'); }
  fixMap();
}
function toggleMobFilter(){
  const f=document.getElementById('mobFilter');f.classList.toggle('open');
  document.getElementById('mb-filter').classList.toggle('active',f.classList.contains('open'));
}
function mobCat(btn,q){
  document.querySelectorAll('#mobFilter .cbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');curQ=q;fetchNews(q);
  document.getElementById('mobFilter').classList.remove('open');
  mobSwitch('news');
}

// ─── AUTH (DESKTOP LOGIN UI FIX) ───
function loginGoogle(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(console.error);}
function doLogout(){if(confirm('Sign out?'))auth.signOut();}
function toggleUserMenu(){document.getElementById('userMenu').classList.toggle('open');}

auth.onAuthStateChanged(user=>{
  document.getElementById('loginBtn').style.display=user?'none':'block';
  const uWrap = document.getElementById('userWrap');
  
  if(user){
    uWrap.style.display = 'flex';
    document.getElementById('uavatar').src = user.photoURL;
    document.getElementById('uavatar').style.display = 'block';
    document.getElementById('headerUserName').textContent = user.displayName.split(' ')[0] + ' ▾';
    
    document.getElementById('umName').textContent=user.displayName;
    document.getElementById('umEmail').textContent=user.email;
  } else {
    uWrap.style.display = 'none';
  }
});

document.addEventListener('click',e=>{if(!e.target.closest('.user-wrap'))document.getElementById('userMenu').classList.remove('open');});

window.addEventListener('load',()=>{
  setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),700);}},1600);
  fetchNews('world');
  [400,900,1800].forEach(t=>setTimeout(()=>fixMap(),t));
});
window.addEventListener('resize',()=>fixMap());
</script>
