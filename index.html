  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    /* --- TEMA DEĞİŞKENLERİ --- */
    :root {
      --bg-main: #f0f7f7;
      --bg-card: #ffffff;
      --text-main: #1a2e2e;
      --text-sub: #aac4c2;
      --border: #ccece9;
      --hover-bg: #f0fdfa;
      --active-bg: #e6f7f5;
      --map-filter: none;
    }

    [data-theme="dark"] {
      --bg-main: #0f172a;
      --bg-card: #1e293b;
      --text-main: #f1f5f9;
      --text-sub: #94a3b8;
      --border: #334155;
      --hover-bg: #0f172a;
      --active-bg: #334155;
      --map-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* --- SPLASH EKRANI --- */
    .splash {
      position: fixed; inset: 0; background: #0d9488; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }
    .splash-owl { font-size: 80px; animation: float 1.2s ease-in-out infinite alternate; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2)); }
    .splash-title { font-size: 48px; font-weight: 800; color: #fff; letter-spacing: 10px; margin-top: 15px; }
    .splash-sub { font-size: 13px; color: #ccfbf1; letter-spacing: 4px; margin-top: 6px; text-transform: uppercase; font-weight: 600; }
    .splash-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 4px; margin-top: 30px; overflow: hidden; }
    .splash-progress { height: 100%; background: #fff; border-radius: 4px; width: 0; transition: width 0.8s ease; }

    /* --- HEADER --- */
    .header {
      background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 8px 20px;
      min-height: 60px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1000; transition: background 0.3s, border 0.3s;
    }

    .logo { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .owl-svg { width: 38px; height: 38px; animation: blink 5s infinite; filter: drop-shadow(0 2px 4px rgba(13,148,136,0.3)); }
    @keyframes blink { 0%,88%,100% { transform: scaleY(1); } 91%,97% { transform: scaleY(0.1); } }
    .logo-text { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: #0d9488; }
    .logo-sub { font-size: 10px; color: #14b8a6; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-top: -3px; }

    .header-controls { display: flex; align-items: center; gap: 15px; }
    .cat-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; align-items: center; }

    .theme-toggle {
      font-size: 11px; padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg-main);
      color: var(--text-main); cursor: pointer; font-weight: 700;
      transition: all 0.2s;
    }
    .theme-toggle:hover { transform: scale(1.05); }

    .cat-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-main); cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-weight: 600; white-space: nowrap; display: flex; align-items: center; gap: 5px;
    }
    .cat-btn:hover { background: var(--hover-bg); transform: translateY(-2px); }
    .cat-btn.active { background: #0d9488; color: #fff; border-color: #0d9488; box-shadow: 0 4px 10px rgba(13,148,136,0.3); transform: translateY(-2px); }

    /* --- LAYOUT & MAP --- */
    .layout { display: flex; height: calc(100vh - 60px); }
    #map { flex: 1; min-width: 0; filter: var(--map-filter); transition: filter 0.3s; z-index: 1;}

    /* --- BAYKUŞ MARKER ANIMASYONLARI --- */
    .owl-marker-container { position: relative; width: 28px; height: 28px; display: flex; justify-content: center; align-items: center; }
    .pulse-ring {
      position: absolute; inset: 0; border-radius: 50%; border: 3px solid;
      animation: pulseAnim linear infinite; opacity: 0.7;
    }
    .owl-icon { font-size: 16px; position: relative; z-index: 2; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4)); animation: gentleBounce 2s ease-in-out infinite alternate; }
    @keyframes pulseAnim { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    @keyframes gentleBounce { 0% { transform: translateY(0); } 100% { transform: translateY(-3px); } }

    /* --- SIDEBAR --- */
    .sidebar {
      width: 380px; flex-shrink: 0; background: var(--bg-card);
      border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
      transition: background 0.3s, border 0.3s; z-index: 10;
    }
    .sidebar-header {
      padding: 15px 20px; border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 800; color: #0d9488; letter-spacing: 1.5px;
      text-transform: uppercase; display: flex; align-items: center; justify-content: space-between;
      background: var(--bg-main);
    }
    .live-dot { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #10b981; font-weight: 700; }
    .live-dot::before { content:''; width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: livePulse 1.5s infinite; box-shadow: 0 0 8px #10b981; }
    @keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.5); } }

    .news-list { overflow-y: auto; flex: 1; scroll-behavior: smooth; }
    .news-card {
      border-bottom: 1px solid var(--border); cursor: pointer;
      transition: all 0.2s; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
      overflow: hidden; position: relative;
    }
