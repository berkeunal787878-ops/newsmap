  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg-main: #f0f7f7; --bg-card: #ffffff; --text-main: #1a2e2e; --text-sub: #64748b;
      --border: #ccece9; --hover-bg: #f0fdfa; --active-bg: #e6f7f5; --accent: #0d9488;
      --map-filter: none;
    }
    [data-theme="dark"] {
      --bg-main: #0f172a; --bg-card: #1e293b; --text-main: #f1f5f9; --text-sub: #94a3b8;
      --border: #334155; --hover-bg: #0f172a; --active-bg: #334155; --accent: #2dd4bf;
      --map-filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-main); color: var(--text-main); overflow: hidden; transition: 0.3s; }

    /* HEADER */
    .header {
      background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 8px 20px;
      min-height: 60px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 1000;
    }
    .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none;}
    .owl-icon { width: 36px; height: 36px; animation: owlBlink 4s infinite; }
    @keyframes owlBlink { 0%, 90%, 100% { transform: scaleY(1); } 92%, 97% { transform: scaleY(0.1); } }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
    
    .user-actions { display: flex; gap: 10px; align-items: center; }
    .action-btn {
      background: var(--bg-main); border: 1px solid var(--border); color: var(--text-main);
      padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s;
    }
    .action-btn:hover { background: var(--hover-bg); transform: translateY(-2px); }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); display: none; cursor: pointer; }

    /* CATEGORY BAR */
    .category-bar { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; background: var(--bg-card); padding: 10px; border-bottom: 1px solid var(--border); z-index: 999; position: relative;}
    .cat-btn {
      font-size: 12px; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-main); cursor: pointer; transition: 0.3s; font-weight: 600;
    }
    .cat-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* LAYOUT & MAP */
    .layout { display: flex; height: calc(100vh - 110px); }
    #map { flex: 1; filter: var(--map-filter); }

    /* SIDEBAR */
    .sidebar { width: 360px; background: var(--bg-card); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10;}
    .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 800; color: var(--accent); display: flex; justify-content: space-between; text-transform: uppercase;}
    .live-dot { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #10b981; font-weight: 700; }
    .live-dot::before { content:''; width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: livePulse 1.5s infinite; box-shadow: 0 0 8px #10b981; }
    @keyframes livePulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.5); } }

    .news-list { overflow-y: auto; flex: 1; }
    
    .news-card { padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative;}
    .news-card:hover { background: var(--hover-bg); }
    .news-card.active { background: var(--active-bg); border-left: 4px solid var(--accent); }
    .news-title { font-size: 14px; font-weight: 700; line-height: 1.4; margin: 8px 0; }
    .news-meta { font-size: 11px; color: var(--text-sub); font-weight: 500; }
    .news-thumb { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-top: 8px; }
    
    .badge { font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: 12px; text-transform: uppercase; }

    /* REKLAM ALANLARI */
    .ad-placeholder {
      background: var(--active-bg); border: 2px dashed var(--border); color: var(--text-sub);
      display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
      border-radius: 8px; margin: 10px 15px; text-align: center;
    }
    .feed-ad { height: 120px; cursor: pointer; } 
    .modal-ad { height: 150px; width: 100%; margin: 15px 0; cursor: pointer; } 

    /* IN-APP READING MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999;
      display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }
    .modal-content {
      background: var(--bg-card); padding: 0; border-radius: 20px; width: 90%; max-width: 600px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.3); transform: translateY(20px); transition: 0.3s;
      position: relative;
    }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #fff; cursor: pointer; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-weight: bold;}
    
    .modal-hero { width: 100%; height: 250px; object-fit: cover; }
    .modal-body { padding: 25px; }
    .modal-title { font-size: 22px; font-weight: 800; line-height: 1.3; margin-bottom: 10px; color: var(--text-main); }
    .modal-meta { font-size: 12px; color: var(--text-sub); margin-bottom: 15px; display: flex; gap: 10px; align-items: center;}
    .modal-text { font-size: 15px; line-height: 1.6; color: var(--text-main); opacity: 0.9; margin-bottom: 20px;}
    .modal-action-btn { display: inline-block; padding: 12px 24px; background: var(--accent); color: white; text-decoration: none; border-radius: 25px; font-weight: 700; font-size: 13px; transition: 0.2s;}
    .modal-action-btn:hover { opacity: 0.9; transform: scale(1.02); }

    /* DOPAMINE POPUP */
    .dopamine-popup {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(150px);
      background: linear-gradient(135deg, #ff0f4f, #ff8c00); color: white; padding: 15px 25px;
      border-radius: 30px; font-weight: 800; box-shadow: 0 10px 30px rgba(255,15,79,0.3);
      z-index: 3000; transition: 0.6s; display: flex; align-items: center; gap: 15px; cursor: pointer; width: 90%; max-width: 420px;
    }
    .dopamine-popup.show { transform: translateX(-50%) translateY(0); }
    .dopamine-popup:hover { transform: translateX(-50%) translateY(-5px) scale(1.02); }
    .dopamine-icon { font-size: 24px; animation: owlFloat 1s infinite alternate; }

    /* LOADER & ANIMATIONS */
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 14px; padding: 40px 20px; text-align: center; }
    .owl-loading { font-size: 44px; animation: owlFloat 2s ease-in-out infinite; }
    @keyframes owlFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-5px); } }
    .loading-text { font-size: 13px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
    
    @keyframes markerPulseAnim { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

    /* SPLASH SCREEN */
    .splash {
      position: fixed; inset: 0; background: #0d9488;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 99999; transition: opacity 0.5s ease;
    }
    .splash.hide { opacity: 0; pointer-events: none; }
    .splash-owl { font-size: 80px; animation: owlFloat 1.5s ease-in-out infinite; }
    .splash-title { font-size: 42px; font-weight: 800; color: #fff; letter-spacing: 6px; margin-top: 16px; }
    .splash-sub { font-size: 14px; color: #99f6e4; letter-spacing: 2px; margin-top: 8px; font-weight: 600; }
    .splash-bar { width: 200px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 30px; overflow: hidden; }
    .splash-bar-fill { height: 100%; background: #fff; border-radius: 2px; animation: loadBar 1.5s ease forwards; }
    @keyframes loadBar { from { width: 0; } to { width: 100%; } }

    @media (max-width: 768px) {
      .layout { flex-direction: column; height: calc(100vh - 120px); }
      .sidebar { width: 100%; height: 50vh; border-left: none; border-top: 1px solid var(--border); }
      #map { height: 40vh; }
      .header { padding: 8px 10px; }
      .logo-text { font-size: 16px; }
      .dopamine-popup { top: 70px; bottom: auto; transform: translateX(-50%) translateY(-150px); }
      .dopamine-popup.show { transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>

<script>
  // ==========================================

  // ==========================================
  const firebaseConfig = {
    apiKey: "AIzaSyBf3EDUobPIaZL6Jzu5i1ITT8YRSZaCOa8",
    authDomain: "newsmap-5d380.firebaseapp.com",
    projectId: "newsmap-5d380",
    storageBucket: "newsmap-5d380.firebasestorage.app",
    messagingSenderId: "270586913079",
    appId: "1:270586913079:web:271cb786e7195299f73ab2",
    measurementId: "G-HHK7MV2HBG"
  };
  
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const provider = new firebase.auth.GoogleAuthProvider();

  window.addEventListener('load', () => {
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if(splash) { splash.classList.add('hide'); setTimeout(() => splash.remove(), 600); }
    }, 1500);
  });

  function initApp() {
    if(localStorage.getItem('owlsTheme') === 'dark') {
      document.body.setAttribute('data-theme', 'dark');
      document.getElementById('themeBtn').innerText = '☀️';
    }
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('loginBtn').style.display = 'none';
        const avatar = document.getElementById('userAvatar');
        avatar.src = user.photoURL; avatar.style.display = 'block';
        document.getElementById('userNameDisplay').innerText = `| ${user.displayName.split(' ')[0]}'s Feed`;
      } else {
        document.getElementById('loginBtn').style.display = 'block';
        document.getElementById('userAvatar').style.display = 'none';
        document.getElementById('userNameDisplay').innerText = `| Global Feed`;
      }
    });
  }

  function toggleTheme() {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').innerText = isDark ? '🌙' : '☀️';
    localStorage.setItem('owlsTheme', isDark ? 'light' : 'dark');
  }

  function loginWithGoogle() { auth.signInWithPopup(provider).catch(e => console.log(e)); }
  function logout() { if (confirm("Log out from OWLS?")) auth.signOut(); }

  // --- HARİTA AYARLARI ---
  const map = L.map('map', { zoomControl: false }).setView([20, 10], 2);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

  // 1. MİLİMETRİK İLÇE/SEMT LOKASYONLARI
  const MICRO_LOCATIONS = {
    'kadıköy': [40.990, 29.020], 'beşiktaş': [41.042, 29.006], 'şişli': [41.060, 28.987], 'taksim': [41.036, 28.980],
    'manhattan': [40.783, -73.966], 'brooklyn': [40.678, -73.944], 'bronx': [40.844, -73.864], 'queens': [40.728, -73.794],
    'hollywood': [34.092, -118.328], 'silicon valley': [37.387, -122.082], 'shibuya': [35.662, 139.702], 'shinjuku': [35.693, 139.702], 
    'soho': [51.513, -0.132], 'camden': [51.545, -0.142], 'wimbledon': [51.430, -0.214], 'wembley': [51.550, -0.279]
  };

  // 2. DEVASA KÜRESEL ŞEHİRLER & ÜLKELER
  const CITY_COORDS = { 
    'new york':[40.71,-74.00],'washington':[38.90,-77.03],'los angeles':[34.05,-118.24],'chicago':[41.87,-87.62],'san francisco':[37.77,-122.41],'miami':[25.77,-80.19],
    'london':[51.50,-0.12],'manchester':[53.48,-2.24],'liverpool':[53.40,-2.98],'paris':[48.85,2.35],'istanbul':[41.01,28.97],'ankara':[39.92,32.85],
    'berlin':[52.52,13.40],'madrid':[40.41,-3.70],'rome':[41.90,12.49],'kyiv':[50.45,30.52],'moscow':[55.75,37.61],
    'tokyo':[35.68,139.69],'beijing':[39.90,116.40],'shanghai':[31.22,121.47],'hong kong':[22.31,114.17],'seoul':[37.56,126.97],'singapore':[1.35,103.81],
    'delhi':[28.63,77.21],'mumbai':[19.07,72.87],'dubai':[25.20,55.27],'cairo':[30.04,31.23],'nairobi':[-1.28,36.81],'johannesburg':[-26.20,28.04],
    'sao paulo':[-23.54,-46.63],'buenos aires':[-34.60,-58.38],'sydney':[-33.86,151.20],'melbourne':[-37.81,144.96], 'mexico city':[19.43,-99.13],
    'jakarta':[-6.20,106.81], 'manila':[14.59,120.98], 'bangkok':[13.75,100.50], 'lima':[-12.04,-77.02], 'bogota':[4.71,-74.07]
  };

  const COUNTRY_COORDS = { 
    us:[39,-98], gb:[54,-2], de:[51,10], tr:[39,35], fr:[46,2], jp:[36,138], cn:[35,104], ru:[60,100], in:[20,78], 
    au:[-25,133], ca:[56,-106], za:[-30,22], ng:[9,8], eg:[26,30], mx:[23,-102], ar:[-38,-63], sa:[23,45], id:[-0,113], 
    it:[41,12], es:[40,-3], kr:[35,127], ua:[49,31], il:[31,34], ae:[23,53], qa:[25,51], br:[-14,-51],
    cl:[-35,-71], co:[4,-74], pe:[-9,-75], ve:[8,-66], ke:[0,38], ma:[31,-7], pk:[30,69], th:[15,100], ph:[12,122], vn:[14,108], nz:[-40,174]
  };

  const CNAMES = { 
    us:'USA', gb:'UK', de:'Germany', tr:'Turkey', fr:'France', jp:'Japan', cn:'China', ru:'Russia', in:'India', 
    au:'Australia', ca:'Canada', za:'South Africa', ng:'Nigeria', eg:'Egypt', mx:'Mexico', ar:'Argentina', sa:'Saudi Arabia', id:'Indonesia', 
    it:'Italy', es:'Spain', kr:'S. Korea', ua:'Ukraine', il:'Israel', ae:'UAE', qa:'Qatar', br:'Brazil',
    cl:'Chile', co:'Colombia', pe:'Peru', ve:'Venezuela', ke:'Kenya', ma:'Morocco', pk:'Pakistan', th:'Thailand', ph:'Philippines', vn:'Vietnam', nz:'New Zealand'
  };
  
  // Yarıçap (Radius) Dağılımı - Yuvarlak ve Doğal Saçılma İçin
  const SPREAD = { ru:25, us:18, cn:15, ca:20, br:15, au:18, in:8, tr:5, default:4 };

  const hasWord = (word, text) => new RegExp("\\b" + word + "\\b", "i").test(text);
  const KEYWORDS = { 'usa':'us', 'america':'us', 'biden':'us', 'england':'gb', 'bbc':'gb', 'premier league':'gb', 'nba':'us', 'nfl':'us', 'macron':'fr', 'putin':'ru', 'gaza':'il', 'palestine':'il', 'middle east':'ae', 'africa':'za', 'latam':'br', 'asia':'sg' };
  const COLORS = { 'world':'#0d9488', 'technology':'#7c3aed', 'business':'#059669', 'science':'#0891b2', 'health':'#dc2626', 'sport':'#d97706' };
  
  let markers = [];
  let currentQ = 'world';
  let dopamineTimer;

  function getCoords(text, source) {
    const t = (text || "").toLowerCase();
    
    // 1. İLÇE/SEMT (En yüksek hassasiyet, ~1km sapma)
    for (const [micro, coords] of Object.entries(MICRO_LOCATIONS)) {
      if (hasWord(micro, t)) {
        return { coords: [coords[0] + (Math.random()-.5)*0.01, coords[1] + (Math.random()-.5)*0.01], country: micro.charAt(0).toUpperCase() + micro.slice(1) };
      }
    }

    // 2. ŞEHİR (~15km sapma)
    for (const [city, coords] of Object.entries(CITY_COORDS)) {
      if (hasWord(city, t)) {
        return { coords: [coords[0] + (Math.random()-.5)*0.15, coords[1] + (Math.random()-.5)*0.15], country: city.charAt(0).toUpperCase() + city.slice(1) };
      }
    }

    // 3. ÜLKE
    let code = null;
    for (const [k, v] of Object.entries(KEYWORDS)) { if(hasWord(k, t)) { code = v; break; } }
    if(!code) {
      for (const [k, v] of Object.entries(CNAMES)) { if(hasWord(v.toLowerCase(), t)) { code = k; break; } }
    }

    // 4. FALLBACK: Eğer yer geçmiyorsa ajansın bölgesine atama. Hala yoksa tamamen global rastgele bir ülkeye at.
    if(!code) {
        const s = source.toLowerCase();
        if(s.includes('nyt') || s.includes('techcrunch') || s.includes('espn') || s.includes('cnbc') || s.includes('wired')) code = 'us';
        else if(s.includes('bbc') || s.includes('sky') || s.includes('guardian')) code = 'gb';
        else if(s.includes('al jazeera')) code = 'qa';
        else if(s.includes('india') || s.includes('toi')) code = 'in';
        else if(s.includes('scmp')) code = 'cn';
        else if(s.includes('france')) code = 'fr';
        else if(s.includes('mercopress')) code = 'ar';
        else if(s.includes('abc') || s.includes('australia')) code = 'au';
        else if(s.includes('news24')) code = 'za';
        else {
            const keys = Object.keys(COUNTRY_COORDS);
            code = keys[Math.floor(Math.random() * keys.length)]; // Tümüyle rastgele ülke
        }
    }

    // 5. RADYAL DAĞILIM (Kutu yerine Yuvarlak/Doğal Dağılım)
    const b = COUNTRY_COORDS[code];
    const maxRadius = SPREAD[code] || SPREAD.default;
    const r = Math.random() * maxRadius;
    const theta = Math.random() * 2 * Math.PI;
    
    return {
      coords: [b[0] + r * Math.cos(theta), b[1] + r * Math.sin(theta)], 
      country: CNAMES[code]
    };
  }

  function pulseIcon(color) {
    return L.divIcon({
      html: `<div style="position:relative; width:16px; height:16px;">
              <div style="position:absolute; inset:0; border-radius:50%; border:3px solid ${color}; animation:markerPulseAnim 2s infinite; opacity:0.7;"></div>
              <div style="position:absolute; inset:2px; border-radius:50%; background:${color}; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>
            </div>`,
      iconSize:[16,16], iconAnchor:[8,8]
    });
  }

  function timeAgo(d) {
    if(!d) return "";
    const diff = Date.now() - new Date(d).getTime();
    const h = Math.floor(diff/3600000), m = Math.floor(diff/60000);
    if(h>24) return Math.floor(h/24)+' days ago';
    if(h>0) return h+' hours ago';
    return m > 0 ? m+' mins ago' : 'Just now';
  }

  // --- MODAL & DOPAMIN ---
  function openModal(article) {
    document.getElementById('modalImg').src = article.thumb || 'https://images.unsplash.com/photo-1504711432869-00103211f46a?q=80&w=600';
    document.getElementById('modalTitle').innerText = article.title;
    document.getElementById('modalSource').innerText = article.source;
    document.getElementById('modalDate').innerText = timeAgo(article.date);
    document.getElementById('modalText').innerText = article.trailText || "Click the button below to read the full coverage of this story on the original publisher's website.";
    document.getElementById('modalLink').href = article.url;
    document.getElementById('newsModal').classList.add('active');
  }

  function closeModal() { document.getElementById('newsModal').classList.remove('active'); }

  function triggerDopamine(articles) {
    clearTimeout(dopamineTimer);
    const popup = document.getElementById('dopaminePopup');
    if(!popup) return;
    popup.classList.remove('show');
    if(!articles || articles.length < 3) return; 
    
    dopamineTimer = setTimeout(() => {
        const rnd = articles[Math.floor(Math.random() * Math.min(articles.length, 10))];
        const titleEl = document.getElementById('dopamineTitle');
        if(titleEl) titleEl.innerText = rnd.title.length > 50 ? rnd.title.substring(0,50) + "..." : rnd.title;
        popup.onclick = () => { popup.classList.remove('show'); openModal(rnd); };
        popup.classList.add('show');
        setTimeout(() => popup.classList.remove('show'), 7000); 
    }, Math.floor(Math.random() * 4000) + 4000);
  }

  // --- RENDER ---
  function renderArticles(articles) {
    const list = document.getElementById('newsList');
    const color = COLORS[currentQ] || '#0d9488';
    markers.forEach(m => map.removeLayer(m)); markers = []; list.innerHTML = '';

    if(!articles || articles.length === 0) {
      list.innerHTML = '<div class="loading"><div class="owl-loading">🦉</div><div class="loading-text">No News Found.</div></div>';
      return;
    }

    // Daha fazla nokta gösterelim ki harita dolu dursun
    articles.slice(0,45).forEach((a, i) => {
      const fullText = a.title + ' ' + (a.trailText || '');
      const {coords, country} = getCoords(fullText, a.source);

      const marker = L.marker(coords, {icon: pulseIcon(color)}).addTo(map);
      marker.bindPopup(`<b>${a.title}</b><br><small>${a.source}</small>`);
      markers.push(marker);

      if (i > 0 && i % 5 === 0) {
        const adCard = document.createElement('div');
        adCard.className = 'ad-placeholder feed-ad';
        adCard.innerHTML = `<span style="font-size:18px; margin-bottom:5px;">🚀</span> In-Feed AdSense Space`;
        list.appendChild(adCard);
      }

      const card = document.createElement('div');
      card.className = 'news-card';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        ${a.thumb ? `<img src="${a.thumb}" class="news-thumb">` : ''}
        <div style="padding-top:10px;">
          <div class="badge" style="background:${color}22;color:${color}">${a.source} · ${country}</div>
          <div class="news-title">${a.title}</div>
          <div class="news-meta">${timeAgo(a.date)}</div>
        </div>
      `;
      
      card.onclick = () => {
        document.querySelectorAll('.news-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        map.flyTo(coords, 7, { duration: 1.5, easeLinearity: 0.25 });
        openModal(a); 
      };
      list.appendChild(card);
    });

    triggerDopamine(articles);
  }

  // --- RSS FETCH MOTORU ---
  async function fetchRSS(url, sourceName) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
      const data = await res.json();
      return (data.items || []).map(item => ({
        title: item.title, url: item.link, source: sourceName, date: item.pubDate,
        thumb: item.thumbnail || (item.enclosure && item.enclosure.link) || null,
        trailText: item.description ? item.description.replace(/<[^>]*>?/gm, '').substring(0, 150) + "..." : ""
      }));
    } catch(e) { return []; }
  }

  // GERÇEK KÜRESEL BİLGİ AĞI
  async function fetchNews(category) {
    const list = document.getElementById('newsList');
    list.innerHTML = `<div class="loading"><div class="owl-loading">🦉</div><div class="loading-text">Scanning Globe...</div></div>`;

    try {
      let articles = [];

      if (category === 'world') {
        const alJazeera = await fetchRSS("https://www.aljazeera.com/xml/rss/all.xml", "Al Jazeera");
        const cnaAsia = await fetchRSS("https://www.channelnewsasia.com/api/v1/rss-outbound-feed?_format=xml", "CNA Asia");
        const france24 = await fetchRSS("https://www.france24.com/en/rss", "France24");
        const mercoPress = await fetchRSS("https://en.mercopress.com/rss/", "MercoPress LatAm");
        const abcAus = await fetchRSS("https://www.abc.net.au/news/feed/51120/rss.xml", "ABC Australia");
        articles = [...alJazeera, ...cnaAsia, ...france24, ...mercoPress, ...abcAus];
      } 
      else if (category === 'technology') {
        const techCrunch = await fetchRSS("https://techcrunch.com/feed/", "TechCrunch");
        const wired = await fetchRSS("https://www.wired.com/feed/rss", "Wired");
        const theNextWeb = await fetchRSS("https://thenextweb.com/feed", "The Next Web");
        articles = [...techCrunch, ...wired, ...theNextWeb];
      }
      else if (category === 'business') {
        const nytBiz = await fetchRSS("https://rss.nytimes.com/services/xml/rss/nyt/Business.xml", "NY Times Biz");
        const cnbc = await fetchRSS("https://search.cnbc.com/rs/search/combinedcms/view.xml?profile=12000000&id=10000664", "CNBC");
        const scmpBiz = await fetchRSS("https://www.scmp.com/rss/91/feed", "SCMP Biz");
        articles = [...nytBiz, ...cnbc, ...scmpBiz];
      }
      else if (category === 'health') {
        const bbcHealth = await fetchRSS("http://feeds.bbci.co.uk/news/health/rss.xml", "BBC Health");
        const nytHealth = await fetchRSS("https://rss.nytimes.com/services/xml/rss/nyt/Health.xml", "NY Times Health");
        articles = [...bbcHealth, ...nytHealth];
      }
      else if (category === 'science') {
        const nytSci = await fetchRSS("https://rss.nytimes.com/services/xml/rss/nyt/Science.xml", "NY Times Sci");
        const bbcSci = await fetchRSS("http://feeds.bbci.co.uk/news/science_and_environment/rss.xml", "BBC Sci");
        articles = [...nytSci, ...bbcSci];
      }
      else if (category === 'sport') {
        const espnNBA = await fetchRSS("https://www.espn.com/espn/rss/nba/news", "ESPN NBA");
        const espnNFL = await fetchRSS("https://www.espn.com/espn/rss/nfl/news", "ESPN NFL");
        const skyEuro = await fetchRSS("https://www.skysports.com/rss/12040", "Sky Sports Europe");
        const franceSport = await fetchRSS("https://www.france24.com/en/sport/rss", "France24 Sport");
        const toiSport = await fetchRSS("https://timesofindia.indiatimes.com/rssfeeds/4719148.cms", "TOI Sport");
        articles = [...espnNBA, ...espnNFL, ...skyEuro, ...franceSport, ...toiSport];
      }

      // Benzersizleri ayıkla ve karıştır
      const seen = new Set();
      articles = articles.filter(a => { if(!a.title || seen.has(a.title)) return false; seen.add(a.title); return true; });
      articles = articles.sort(() => Math.random() - 0.5);

      renderArticles(articles);
    } catch (e) {
      list.innerHTML = `<div class="loading"><div class="owl-loading">🦉</div><div class="loading-text" style="color:#ef4444">Connection Error.</div></div>`;
    }
  }

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = function() {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentQ = this.dataset.q;
      fetchNews(currentQ);
    };
  });

  initApp();
  fetchNews('world');

</script>
</body>
</html>
