<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>OWLS — True Global News Map</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  
  <!-- Leaflet Harita -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      /* SADECE AYDINLIK & TURKUAZ MOD - LÜKS VE FERAHTIR */
      --bg: #f4fbfc;         /* Sayfa arka planı: Çok açık buz mavisi/beyaz */
      --bg2: #e8f5f7;        /* Üst barlar vb. */
      --bg3: #d0ebeb;        /* Hover ve buton arka planları */
      --card: #ffffff;       /* Kartlar ve sidebar: Saf Beyaz */
      --border: #b8e0df;     /* Çizgiler ve ayraçlar: Uçuk turkuaz */
      --accent: #0098a0;     /* Ana vurgu rengi: Şık Turkuaz */
      --accent2: #e55a20;    /* İkincil vurgu: Tamamlayıcı mercan/turuncu */
      --text: #0a1b24;       /* Ana metinler: Koyu lacivert (Siyaha yakın) */
      --text2: #3a5866;      /* Alt metinler: Soluk lacivert */
      --text3: #6b8a99;      /* Detaylar: Gri-mavi */
      --saved: #d4a800;      /* Kaydedilenler: Hardal/Altın */
    }
    
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);}

    /* ── SPLASH (TURKUAZ KONSEPT) ── */
    .splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .6s;}
    .splash.hide{opacity:0;pointer-events:none;}
    .splash-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,152,160,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(0,152,160,.08) 1px,transparent 1px);background-size:40px 40px;}
    .splash-owl{font-size:72px;animation:float 2s ease-in-out infinite;position:relative;z-index:1;}
    .splash-title{font-size:52px;font-weight:800;color:var(--accent);letter-spacing:10px;margin-top:12px;position:relative;z-index:1;}
    .splash-sub{font-size:10px;color:var(--text2);letter-spacing:4px;margin-top:6px;font-family:'Space Mono',monospace;position:relative;z-index:1;font-weight:700;}
    .splash-bar{width:180px;height:4px;background:var(--bg3);border-radius:4px;margin-top:28px;overflow:hidden;position:relative;z-index:1;}
    .splash-fill{height:100%;background:var(--accent);border-radius:4px;animation:loadBar 2.2s ease forwards;}
    @keyframes loadBar{from{width:0}to{width:100%}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

    /* ── HEADER ── */
    .header{position:fixed;top:0;left:0;right:0;height:52px;background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;z-index:600;}
    .logo{display:flex;align-items:center;gap:8px;}
    .owl-anim{font-size:26px;animation:owlBlink 5s infinite;display:inline-block;}
    @keyframes owlBlink{0%,88%,100%{transform:scaleY(1)}90%,95%{transform:scaleY(.08)}}
    .logo-name{font-size:17px;font-weight:800;letter-spacing:3px;color:var(--accent);}
    .logo-sub{font-size:9px;color:var(--text3);font-family:'Space Mono',monospace;font-weight:700;}
    .hdr-right{display:flex;align-items:center;gap:6px;}
    .hbtn{background:var(--bg);border:1px solid var(--border);color:var(--text2);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;transition:all .2s;white-space:nowrap;}
    .hbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--bg2);}
    .bcount{background:var(--accent2);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;margin-left:2px;}
    .uavatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--accent);display:none;cursor:pointer;}

    /* ── TOP BARS (SABİT DÜZEN - TAŞMA YOK) ── */
    .top-bars{position:fixed;top:52px;left:0;right:0;height:70px;background:var(--bg2);border-bottom:1px solid var(--border);z-index:590;display:flex;flex-direction:column;justify-content:center;}
    .bar-row{display:flex;gap:4px;overflow-x:auto;padding:4px 14px;flex-wrap:nowrap;scrollbar-width:none;}
    .bar-row::-webkit-scrollbar{display:none;}
    .bar-row+.bar-row{border-top:1px solid var(--border);}
    .rbtn{flex-shrink:0;font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;font-family:'Space Mono',monospace;white-space:nowrap;}
    .rbtn.active,.rbtn:hover{background:var(--bg3);color:var(--accent);border-color:var(--accent);}
    .cbtn{flex-shrink:0;font-size:11px;font-weight:700;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap;}
    .cbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
    .cbtn:hover:not(.active){border-color:var(--accent);color:var(--accent);background:var(--bg);}

    /* ── KESİN VE HATA VERMEYEN HARİTA/SIDEBAR DÜZENİ ── */
    #map{
      position:fixed;
      top:122px; /* 52px Header + 70px TopBars */
      left:0;
      right:350px;
      bottom:0;
      z-index:1;
      background: var(--bg);
    }
    .sidebar{
      position:fixed;
      top:52px;
      right:0;
      width:350px;
      bottom:0;
      display:flex;
      flex-direction:column;
      background:var(--card);
      border-left:1px solid var(--border);
      z-index:400;
      overflow:hidden;
    }

    /* ── SIDEBAR İÇİ ── */
    .stabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--card);}
    .stab{flex:1;padding:12px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:1px;font-family:'Space Mono',monospace;}
    .stab.active{color:var(--accent);border-bottom-color:var(--accent);}
    .spanel{flex:1;overflow-y:auto;display:none;flex-direction:column;min-height:0;}
    .spanel.active{display:flex;}
    .live-row{padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);}
    .live-dot{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--accent);font-family:'Space Mono',monospace;font-weight:700;}
    .live-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite;box-shadow:0 0 5px var(--accent);}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
    .scount{font-size:9px;color:var(--text2);font-family:'Space Mono',monospace;font-weight:700;}
    .news-scroll{overflow-y:auto;flex:1;}

    /* ── NEWS CARDS ── */
    .ncard{padding:14px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;}
    .ncard:hover{background:var(--bg);}
    .ncard.active{background:var(--bg2);border-left:4px solid var(--accent);}
    .ncard.read{opacity:.65;}
    .ncard-row{display:flex;gap:12px;}
    .nthumb{width:70px;height:52px;object-fit:cover;border-radius:8px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);}
    .nthumb-ph{width:70px;height:52px;border-radius:8px;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;border:1px solid var(--border);}
    .ninfo{flex:1;min-width:0;}
    .nsrc{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--accent2);font-family:'Space Mono',monospace;}
    .ntitle{font-size:13px;font-weight:700;line-height:1.35;margin:4px 0;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .nmeta{font-size:9px;color:var(--text3);display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;font-weight:700;}
    .nloc{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'Space Mono',monospace;color:var(--accent);}
    .nbookmark{position:absolute;right:10px;top:12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s;color:var(--text2);}
    .ncard:hover .nbookmark{opacity:1;}
    .nbookmark:hover{color:var(--accent);border-color:var(--accent);}
    .nbookmark.on{opacity:1;color:var(--saved);border-color:var(--saved);background:var(--bg);}
    .unread-dot{position:absolute;left:5px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--accent);}
    .saved-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--text3);font-size:12px;padding:40px;text-align:center;font-weight:600;}

    /* ── ALERTS ── */
    .alerts-body{padding:16px;}
    .alert-input-row{display:flex;gap:8px;margin-bottom:12px;}
    .alert-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;outline:none;font-weight:600;}
    .alert-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--bg3);}
    .alert-add-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-weight:800;cursor:pointer;font-size:14px;transition:opacity .2s;}
    .alert-add-btn:hover{opacity:.85;}
    .alert-tags{display:flex;flex-wrap:wrap;gap:8px;}
    .atag{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:10px;font-weight:700;color:var(--accent);}
    .atag span{cursor:pointer;color:var(--text2);font-size:14px;line-height:1;}
    .atag span:hover{color:#e03;}
    .alerts-hint{margin-top:16px;font-size:11px;color:var(--text3);line-height:1.6;font-weight:600;}

    /* ── BREAKING NEWS POPUP ── */
    .breaking{
      position:fixed;bottom:28px;left:50%;
      transform:translateX(-50%) translateY(120px);
      background:linear-gradient(135deg,var(--accent2),#ff8c00);
      color:#fff;padding:14px 20px;border-radius:12px;
      font-weight:800;box-shadow:0 10px 32px rgba(229,90,32,.35);
      z-index:8500;transition:transform .55s cubic-bezier(.34,1.56,.64,1);
      display:flex;align-items:center;gap:14px;cursor:pointer;
      max-width:420px;width:90%;border:1px solid rgba(255,255,255,.2);
    }
    .breaking.show{transform:translateX(-50%) translateY(0);}
    .breaking:hover{filter:brightness(1.08);}
    .breaking-icon{font-size:26px;animation:float 1s infinite alternate;}
    .breaking-label{font-size:9px;color:#fff;text-transform:uppercase;letter-spacing:1.5px;font-family:'Space Mono',monospace;opacity:.9;}
    .breaking-title{font-size:13px;margin-top:3px;line-height:1.4;font-weight:700;}
    .breaking-close{margin-left:auto;flex-shrink:0;font-size:20px;opacity:.7;padding:0 4px;}

    /* ── MODAL (POPUP HABER EKRANI) ── */
    .moverlay{position:fixed;inset:0;background:rgba(10,27,36,.8);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(4px);}
    .moverlay.on{opacity:1;pointer-events:auto;}
    .mbox{background:var(--card);border:1px solid var(--border);border-radius:16px;width:92%;max-width:560px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 24px 60px rgba(0,0,0,.15);transform:translateY(14px);transition:transform .3s;}
    .moverlay.on .mbox{transform:translateY(0);}
    .mhero{width:100%;height:210px;object-fit:cover;border-radius:16px 16px 0 0;display:block;}
    .mclose{position:absolute;top:12px;right:14px;width:32px;height:32px;background:rgba(255,255,255,.9);border:1px solid var(--border);color:var(--text);font-size:20px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s;}
    .mclose:hover{background:var(--bg3);}
    .mbody{padding:20px 24px;}
    .mtags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .mtag{font-size:9px;font-weight:800;letter-spacing:1px;padding:4px 10px;border-radius:20px;font-family:'Space Mono',monospace;}
    .mtitle{font-size:20px;font-weight:800;line-height:1.35;margin-bottom:12px;color:var(--text);}
    .mdesc{font-size:14px;line-height:1.65;color:var(--text2);margin-bottom:20px;font-weight:600;}
    .mfooter{display:flex;gap:10px;flex-wrap:wrap;}
    .mbtn{padding:10px 20px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:1px solid var(--border);font-family:'Syne',sans-serif;}
    .mbtn.pri{background:var(--accent);color:#fff;border-color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
    .mbtn.pri:hover{opacity:.85;}
    .mbtn.sec{background:var(--bg);color:var(--text2);}
    .mbtn.sec:hover{background:var(--bg3);color:var(--text);}
    .mbtn.sv.on{color:var(--saved);border-color:var(--saved);background:var(--card);}

    /* ── TOAST BİLDİRİMLERİ ── */
    .tstack{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:8000;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:90%;max-width:360px;}
    .toast{background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:12px 16px;width:100%;box-shadow:0 8px 24px rgba(0,152,160,.15);display:flex;align-items:center;gap:12px;pointer-events:auto;cursor:pointer;transform:translateY(80px);opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);}
    .toast.show{transform:translateY(0);opacity:1;}
    .t-icon{font-size:24px;flex-shrink:0;}
    .t-label{font-size:10px;color:var(--accent);font-family:'Space Mono',monospace;font-weight:800;letter-spacing:1px;}
    .t-title{font-size:12px;font-weight:700;margin-top:3px;line-height:1.4;color:var(--text);}
    .t-close{margin-left:auto;color:var(--text3);font-size:18px;cursor:pointer;flex-shrink:0;padding:2px 4px;}

    /* ── YÜKLEME (LOADER) ── */
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;}
    .loader-owl{font-size:42px;animation:float 2s infinite;}
    .loader-txt{font-size:10px;font-weight:700;color:var(--accent);font-family:'Space Mono',monospace;letter-spacing:2px;}
    .loader-txt::after{content:'';animation:dots 1.5s infinite steps(4,end);}
    @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

    /* ── MOBİL DÜZEN ── */
    @media(max-width:768px){
      .top-bars{display:none;} /* Mobilde üst menüyü gizle, aşağıda filtre var */
      #map{position:fixed;top:52px;left:0;right:0;bottom:calc(45vh + 54px);z-index:1;}
      .sidebar{position:fixed;top:auto;bottom:54px;left:0;right:0;width:100%;height:45vh;border-left:none;border-top:1px solid var(--border);z-index:400;}
      .sidebar.map-only{display:none;}
      .sidebar.list-full{bottom:54px;height:calc(100vh - 52px - 54px);}
      #map.list-full{display:none;}
      .mob-bar{position:fixed;bottom:0;left:0;right:0;height:54px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:600;}
      .mbbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--text3);font-size:10px;font-family:'Space Mono',monospace;font-weight:700;transition:color .2s;}
      .mbbtn .mbi{font-size:22px;}
      .mbbtn.active{color:var(--accent);}
      .mob-filter{position:fixed;bottom:54px;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);padding:12px 14px;z-index:590;display:none;flex-wrap:wrap;gap:8px;box-shadow:0 -4px 12px rgba(0,0,0,.05);}
      .mob-filter.open{display:flex;}
      .breaking{bottom:68px;}
      .tstack{bottom:130px;}
    }
    @media(min-width:769px){.mob-bar,.mob-filter{display:none!important;}}

    /* ── HARİTA MARKER & POPUP AYARLARI ── */
    .ccluster{background:var(--bg)!important;border:2px solid var(--accent)!important;border-radius:50%!important;color:var(--accent)!important;font-weight:800!important;font-family:'Space Mono',monospace!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:0 4px 12px rgba(0,152,160,.2)!important;}
    @keyframes mpulse{0%{transform:scale(.8);opacity:.8}100%{transform:scale(2.2);opacity:0}}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    
    /* Harita Popup (Beyaz Lüks Tema Uyumlu) */
    .leaflet-popup-content-wrapper{background:var(--card)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:12px!important;box-shadow:0 12px 32px rgba(0,0,0,.1)!important;}
    .leaflet-popup-tip{background:var(--card)!important;border:1px solid var(--border)!important;border-top:none!important;border-left:none!important;}
    .leaflet-popup-content{margin:12px 16px!important;font-family:'Syne',sans-serif!important;}
    .leaflet-container a.leaflet-popup-close-button{color:var(--text3)!important;padding:8px!important;}
    .leaflet-container a.leaflet-popup-close-button:hover{color:var(--accent2)!important;background:transparent!important;}
    .leaflet-control-zoom{border:none!important;box-shadow:0 8px 24px rgba(0,0,0,.1)!important;margin-right:16px!important;margin-bottom:24px!important;}
    .leaflet-bar a{background-color:var(--card)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:10px!important;width:36px!important;height:36px!important;line-height:34px!important;font-weight:bold!important;}
    .leaflet-bar a:hover{background-color:var(--bg)!important;color:var(--accent)!important;border-color:var(--accent)!important;}
  </style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-grid"></div>
  <div class="splash-owl">🦉</div>
  <div class="splash-title">OWLS</div>
  <div class="splash-sub">TRUE GLOBAL INTELLIGENCE</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <span class="owl-anim">🦉</span>
    <div>
      <div class="logo-name">OWLS</div>
      <div class="logo-sub" id="feedLabel">GLOBAL FEED</div>
    </div>
  </div>
  <div class="hdr-right">
    <button class="hbtn" onclick="openSaved()">🔖 <span class="bcount" id="sbadge">0</span></button>
    <button class="hbtn" id="loginBtn" onclick="loginGoogle()">Login</button>
    <img src="" id="uavatar" class="uavatar" onclick="doLogout()" title="Çıkış Yap">
  </div>
</div>

<!-- TOP BARS (MASAÜSTÜ İÇİN SABİT YÜKSEKLİK: 70px) -->
<div class="top-bars" id="topBars">
  <div class="bar-row" id="regionBar">
    <button class="rbtn active" data-r="all">🌐 ALL REGIONS</button>
    <button class="rbtn" data-r="europe">🇪🇺 EUROPE</button>
    <button class="rbtn" data-r="americas">🌎 AMERICAS</button>
    <button class="rbtn" data-r="asia">🌏 ASIA</button>
    <button class="rbtn" data-r="mideast">🕌 MID EAST</button>
    <button class="rbtn" data-r="africa">🌍 AFRICA</button>
    <button class="rbtn" data-r="oceania">🦘 OCEANIA</button>
  </div>
  <div class="bar-row" id="catBar">
    <button class="cbtn active" data-q="world">🌍 World</button>
    <button class="cbtn" data-q="technology">💻 Tech</button>
    <button class="cbtn" data-q="business">📈 Business</button>
    <button class="cbtn" data-q="science">🔬 Science</button>
    <button class="cbtn" data-q="health">❤️ Health</button>
    <button class="cbtn" data-q="sport">⚽ Sport</button>
    <button class="cbtn" data-q="climate">🌿 Climate</button>
    <button class="cbtn" data-q="politics">🏛️ Politics</button>
  </div>
</div>

<!-- MAP -->

function jit(){return(Math.random()-.5)*.22;}
function cap(s){return s.replace(/\b\w/g,c=>c.toUpperCase());}
function getCoords(text,_src){
  const t=(text||'').toLowerCase();
  for(const[city,c]of Object.entries(CITIES)){
    if(new RegExp('\\b'+city.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(t))
      return{coords:[c[0]+jit(),c[1]+jit()],loc:cap(city)};
  }
  for(const[kw,cc]of Object.entries(KW)){
    if(new RegExp('\\b'+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(t)&&CAPS[cc])
      return{coords:[CAPS[cc][0]+jit(),CAPS[cc][1]+jit()],loc:CNAMES[cc]||cc.toUpperCase()};
  }
  for(const[cc,name]of Object.entries(CNAMES)){
    if(new RegExp('\\b'+name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(t)&&CAPS[cc])
      return{coords:[CAPS[cc][0]+jit(),CAPS[cc][1]+jit()],loc:name};
  }
  const f=FALLBACKS[fbIdx%FALLBACKS.length];fbIdx++;
  return{coords:[f[0]+jit(),f[1]+jit()],loc:f[2]};
}

// ── FAST FETCH WITH ABORT CONTROLLER ──
async function fastFetch(url, ms = 2000) {
  const controller = new AbortController();
  const id = setTimeout(() => controller.abort(), ms);
  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(id);
    return res;
  } catch (e) {
    clearTimeout(id);
    throw e;
  }
}

async function fetchGuardian(sec){
  try{
    const r=await fastFetch(`https://content.guardianapis.com/${sec}?api-key=${GKEY}&page-size=20&show-fields=thumbnail,trailText`);
    const d=await r.json();
    return(d.response?.results||[]).map(a=>({
      title:a.webTitle,url:a.webUrl,source:'The Guardian',
      date:a.webPublicationDate,
      thumb:a.fields?.thumbnail||null,
      trail:(a.fields?.trailText||'').replace(/<[^>]*>/gm,'')
    }));
  }catch{return[];}
}

async function fetchRSS(feed){
  try{
    const r=await fastFetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.u)}&count=15`);
    const d=await r.json();
    if(d.status==='ok'&&d.items?.length)
      return d.items.map(i=>({
        title:i.title||'',url:i.link||'#',source:feed.n,date:i.pubDate,
        thumb:i.thumbnail||(i.enclosure?.link)||null,
        trail:(i.description||'').replace(/<[^>]*>/gm,'').slice(0,200)
      }));
  }catch{}
  try{
    const r=await fastFetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feed.u)}`);
    const d=await r.json();
    const xml=new DOMParser().parseFromString(d.contents,'text/xml');
    return[...xml.querySelectorAll('item')].slice(0,15).map(it=>({
      title:it.querySelector('title')?.textContent||'',
      url:it.querySelector('link')?.textContent||'#',
      source:feed.n,date:it.querySelector('pubDate')?.textContent||'',
      thumb:it.querySelector('enclosure')?.getAttribute('url')||null,
      trail:(it.querySelector('description')?.textContent||'').replace(/<[^>]*>/gm,'').slice(0,200)
    })).filter(a=>a.title);
  }catch{return[];}
}

async function fetchNews(cat){
  fbIdx=0;
  document.getElementById('newsList').innerHTML='<div class="loader"><div class="loader-owl">🦉</div><div class="loader-txt">SCANNING GLOBE</div></div>';
  document.getElementById('feedLabel').textContent=cat.toUpperCase()+' FEED';
  const secs=G_SECTIONS[cat]||['world'];
  const rssList=RSS_FEEDS[cat]||RSS_FEEDS.world;
  
  const results=await Promise.allSettled([
    ...secs.map(s=>fetchGuardian(s)),
    ...rssList.map(f=>fetchRSS(f))
  ]);
  
  let arts=[];
  results.forEach(r=>{if(r.status==='fulfilled')arts.push(...r.value);});
  const seen=new Set();
  arts=arts.filter(a=>{if(!a.title||seen.has(a.title))return false;seen.add(a.title);return true;});
  arts.forEach(a=>{
    const{coords,loc}=getCoords(a.title+' '+(a.trail||''),a.source);
    a._c=coords;a._loc=loc;a._r=artRegion(coords[0],coords[1]);
  });
  arts.sort(()=>Math.random()-.5);
  allArticles=arts;
  renderFeed(arts);
  scheduleBreaking(arts);
}

// ── RENDER ────────────────────────────────────────────────
function renderFeed(arts){
  const color=COLORS[curQ]||'#0098a0';
  if(clusterLayer)map.removeLayer(clusterLayer);
  clusterLayer=L.markerClusterGroup({
    maxClusterRadius:50,
    iconCreateFunction:cl=>L.divIcon({
      html:`<div class="ccluster" style="width:32px;height:32px;font-size:11px">${cl.getChildCount()}</div>`,
      iconSize:[32,32],iconAnchor:[16,16],className:''
    })
  });
  const list=document.getElementById('newsList');
  list.innerHTML='';
  const filtered=curR==='all'?arts:arts.filter(a=>a._r===curR);
  document.getElementById('scount').textContent=`${filtered.length} stories · ${new Set(arts.map(a=>a.source)).size} sources`;
  if(!filtered.length){
    list.innerHTML='<div class="loader"><div class="loader-owl">🦉</div><div class="loader-txt">No stories in this region</div></div>';
    map.addLayer(clusterLayer);return;
  }
  filtered.slice(0,60).forEach(a=>{
    const m=L.marker(a._c,{icon:mkIcon(color)});
    m.bindPopup(
      `<div style="font-weight:700;font-size:13px;max-width:200px;line-height:1.4;color:var(--text);margin-bottom:6px;">${a.title}</div>`+
      `<div style="font-size:10px;color:var(--text2);margin-bottom:10px;">${a.source} · ${a._loc}</div>`+
      `<button onclick="window._openModalById('${encodeURIComponent(a.url)}')" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;width:100%">Read Story</button>`
    ,{maxWidth:220});
    m.on('click',()=>{ map.openPopup&&null; }); 
    clusterLayer.addLayer(m);

    const card=document.createElement('div');
    card.className='ncard'+(isRead(a)?' read':'');
    card.dataset.url=a.url;
    if(!isRead(a)){const dot=document.createElement('div');dot.className='unread-dot';card.appendChild(dot);}
    const saved=isSaved(a);
    const thumb=a.thumb
      ?`<img class="nthumb" src="${a.thumb}" onerror="this.outerHTML='<div class=nthumb-ph>📰</div>'">`
      :`<div class="nthumb-ph">📰</div>`;
    card.innerHTML+=`
      <div class="ncard-row">
        ${thumb}
        <div class="ninfo">
          <div class="nsrc">${a.source}</div>
          <div class="ntitle">${a.title}</div>
          <div class="nmeta"><span class="nloc">${a._loc}</span><span>${timeAgo(a.date)}</span></div>
        </div>
      </div>
      <div class="nbookmark${saved?' on':''}" onclick="event.stopPropagation();toggleSaveCard(this,'${encodeURIComponent(a.url)}')">🔖</div>`;
    card.onclick=()=>{
      document.querySelectorAll('.ncard').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      map.flyTo(a._c,6,{duration:1.5,easeLinearity:.25});
      openModal(a);
    };
    list.appendChild(card);
  });
  map.addLayer(clusterLayer);
  checkAlerts(filtered);
}

window._openModalById=function(encodedUrl){
  const url=decodeURIComponent(encodedUrl);
  const a=allArticles.find(x=>x.url===url)||savedArts.find(x=>x.url===url);
  if(a)openModal(a);
};

// ── BREAKING NEWS ─────────────────────────────────────────
function scheduleBreaking(arts){
  clearTimeout(breakingTimer);
  if(!arts||arts.length<3)return;
  breakingTimer=setTimeout(()=>showBreaking(arts),5000);
}
function showBreaking(arts){
  const a=arts[Math.floor(Math.random()*Math.min(arts.length,12))];
  const el=document.getElementById('breaking');
  const title=document.getElementById('breaking-title');
  title.textContent=a.title.length>60?a.title.slice(0,60)+'…':a.title;
  el.onclick=ev=>{if(!ev.target.classList.contains('breaking-close')){hideBreaking();openModal(a);}};
  el.classList.add('show');
  breakingTimer=setTimeout(()=>{el.classList.remove('show');breakingTimer=setTimeout(()=>showBreaking(arts),20000);},8000);
}
function hideBreaking(){
  document.getElementById('breaking').classList.remove('show');
  clearTimeout(breakingTimer);
  breakingTimer=setTimeout(()=>showBreaking(allArticles),25000);
}

// ── MODAL ─────────────────────────────────────────────────
function openModal(a){
  curModalArt=a;markRead(a.url);
  const img=document.getElementById('mhero');
  if(a.thumb){img.src=a.thumb;img.style.display='block';}else img.style.display='none';
  document.getElementById('mtitle').textContent=a.title;
  document.getElementById('msrc').textContent=a.source;
  document.getElementById('mloc').textContent=(a._loc||'Global').toUpperCase();
  document.getElementById('mtime').textContent=timeAgo(a.date);
  document.getElementById('mdesc').textContent=a.trail||'Click below to read the full story.';
  document.getElementById('mlink').href=a.url;
  const sb=document.getElementById('msavebtn');
  sb.classList.toggle('on',isSaved(a));
  sb.textContent=isSaved(a)?'✓ Saved':'🔖 Save';
  document.getElementById('modal').classList.add('on');
  document.querySelectorAll('.ncard').forEach(c=>{if(c.dataset.url===a.url)c.classList.add('read');});
}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function toggleSaveModal(){
  if(!curModalArt)return;
  if(isSaved(curModalArt)){unsavArt(curModalArt.url);document.getElementById('msavebtn').textContent='🔖 Save';document.getElementById('msavebtn').classList.remove('on');}
  else{savArt(curModalArt);document.getElementById('msavebtn').textContent='✓ Saved';document.getElementById('msavebtn').classList.add('on');}
  renderSaved();
}
function toggleSaveCard(btn,encoded){
  const url=decodeURIComponent(encoded);
  const a=allArticles.find(x=>x.url===url)||savedArts.find(x=>x.url===url);
  if(!a)return;
  if(isSaved(a)){unsavArt(url);btn.classList.remove('on');}
  else{savArt(a);btn.classList.add('on');}
  renderSaved();
}

// ── SAVED ──────────────────────────────────────────────────
function openSaved(){stab('saved');}
function renderSaved(){
  updateSBadge();
  const list=document.getElementById('savedList');
  if(!savedArts.length){list.innerHTML='<div class="saved-empty"><div style="font-size:40px">🔖</div><div>No saved articles yet</div></div>';return;}
  list.innerHTML='';
  savedArts.forEach(a=>{
    const card=document.createElement('div');card.className='ncard';
    const thumb=a.thumb?`<img class="nthumb" src="${a.thumb}" onerror="this.outerHTML='<div class=nthumb-ph>📰</div>'">`:`<div class="nthumb-ph">📰</div>`;
    card.innerHTML=`<div class="ncard-row">${thumb}<div class="ninfo"><div class="nsrc">${a.source}</div><div class="ntitle">${a.title}</div><div class="nmeta"><span>${timeAgo(a.date)}</span></div></div></div><div class="nbookmark on" onclick="event.stopPropagation();unsavArt('${encodeURIComponent(a.url)}');renderSaved()">×</div>`;
    card.onclick=()=>openModal(a);list.appendChild(card);
  });
}

// ── ALERTS ────────────────────────────────────────────────
function addAlert(){
  const inp=document.getElementById('alertIn'),kw=inp.value.trim().toLowerCase();
  if(!kw||alerts.includes(kw)){inp.value='';return;}
  alerts.push(kw);inp.value='';localStorage.setItem('owls_alerts',JSON.stringify(alerts));renderAlertTags();
}
function removeAlert(kw){alerts=alerts.filter(a=>a!==kw);localStorage.setItem('owls_alerts',JSON.stringify(alerts));renderAlertTags();}
function renderAlertTags(){
  document.getElementById('alertTags').innerHTML=alerts.map(kw=>`<div class="atag">🔔 ${kw} <span onclick="removeAlert('${kw}')">×</span></div>`).join('');
}
function checkAlerts(arts){
  if(!alerts.length)return;
  arts.forEach(a=>{
    const txt=(a.title+' '+(a.trail||'')).toLowerCase();
    alerts.forEach(kw=>{if(txt.includes(kw))showToast('🔔','Alert: '+kw.toUpperCase(),a.title.slice(0,60)+'…',a);});
  });
}

// ── TOAST ────────────────────────────────────────────────
const tQ=[];let tBusy=false;
function showToast(icon,label,title,article){tQ.push({icon,label,title,article});if(!tBusy)nextToast();}
function nextToast(){
  if(!tQ.length){tBusy=false;return;}tBusy=true;
  const{icon,label,title,article}=tQ.shift();
  const stack=document.getElementById('tstack');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<div class="t-icon">${icon}</div><div style="flex:1;min-width:0"><div class="t-label">${label}</div><div class="t-title">${title}</div></div><div class="t-close">×</div>`;
  t.querySelector('.t-close').onclick=e=>{e.stopPropagation();dismiss(t);};
  if(article)t.onclick=()=>{dismiss(t);openModal(article);};
  stack.appendChild(t);
  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));
  setTimeout(()=>dismiss(t),6000);
}
function dismiss(t){t.classList.remove('show');setTimeout(()=>{t.remove();setTimeout(nextToast,150);},400);}

// ── HELPERS ───────────────────────────────────────────────
function timeAgo(d){
  if(!d)return'';const diff=Date.now()-new Date(d).getTime();
  const h=Math.floor(diff/3600000),m=Math.floor(diff/60000);
  if(h>48)return Math.floor(h/24)+'d ago';if(h>0)return h+'h ago';return m>0?m+'m ago':'Now';
}
function isSaved(a){return savedArts.some(s=>s.url===a.url);}
function isRead(a){return readSet.has(a.url);}
function markRead(url){readSet.add(url);localStorage.setItem('owls_read',JSON.stringify([...readSet]));}
function updateSBadge(){document.getElementById('sbadge').textContent=savedArts.length;}
function savArt(a){if(isSaved(a))return;savedArts.unshift(a);localStorage.setItem('owls_saved',JSON.stringify(savedArts));updateSBadge();showToast('🔖','Saved',a.title.slice(0,60)+'…',null);}
function unsavArt(encoded){
  const url=encoded.startsWith('http')?encoded:decodeURIComponent(encoded);
  savedArts=savedArts.filter(s=>s.url!==url);localStorage.setItem('owls_saved',JSON.stringify(savedArts));updateSBadge();
}

// ── TABS ──────────────────────────────────────────────────
function stab(name){
  document.querySelectorAll('.stab').forEach((t,i)=>t.classList.toggle('active',['feed','saved','alerts'][i]===name));
  document.querySelectorAll('.spanel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+name).classList.add('active');
  if(name==='saved')renderSaved();if(name==='alerts')renderAlertTags();
}

// ── REGION + CAT ──────────────────────────────────────────
document.getElementById('regionBar').addEventListener('click',e=>{
  const b=e.target.closest('.rbtn');if(!b)return;
  document.querySelectorAll('.rbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curR=b.dataset.r;renderFeed(allArticles);
});
document.getElementById('catBar').addEventListener('click',e=>{
  const b=e.target.closest('.cbtn');if(!b)return;
  document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');curQ=b.dataset.q;fetchNews(curQ);
});

// ── MOBILE ────────────────────────────────────────────────
function mobSwitch(mode){
  const mapEl=document.getElementById('map'),sb=document.getElementById('sidebar');
  ['mb-map','mb-news','mb-filter','mb-saved'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  document.getElementById('mobFilter').classList.remove('open');
  mapEl.className='';sb.className='sidebar';
  if(mode==='map'){
    document.getElementById('mb-map').classList.add('active');
    sb.classList.add('map-only'); 
  } else {
    mapEl.classList.add('list-full');sb.classList.add('list-full');
    if(mode==='saved'){document.getElementById('mb-saved').classList.add('active');stab('saved');}
    else{document.getElementById('mb-news').classList.add('active');stab('feed');}
  }
  fixMap();
}
function toggleMobFilter(){
  const f=document.getElementById('mobFilter');f.classList.toggle('open');
  document.getElementById('mb-filter').classList.toggle('active',f.classList.contains('open'));
}
function mobCat(btn,q){
  document.querySelectorAll('#mobFilter .cbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');curQ=q;fetchNews(q);
  document.getElementById('mobFilter').classList.remove('open');
  mobSwitch('news');
}

// ── AUTH (REDIRECT YÖNTEMİ) ───────────────────────────────
function loginGoogle() { 
  auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()).catch(console.error); 
}
function doLogout() { 
  if(confirm('Log out?')) auth.signOut(); 
}
auth.onAuthStateChanged(user => {
  document.getElementById('loginBtn').style.display=user?'none':'';
  const av=document.getElementById('uavatar');
  if(user){
    av.src=user.photoURL;
    av.style.display='block';
    document.getElementById('feedLabel').textContent=user.displayName.split(' ')[0].toUpperCase()+"'S FEED";
  } else {
    av.style.display='none';
  }
});

document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ── INIT ──────────────────────────────────────────────────
window.addEventListener('load',()=>{
  localStorage.removeItem('owlsTheme'); // Eski çöpü temizle
  updateSBadge();renderAlertTags();
  
  setTimeout(()=>{
    const s=document.getElementById('splash');
    if(s){ s.classList.add('hide'); setTimeout(()=>s.remove(),700); }
  },1500);

  fetchNews('world');

  // Harita render garantisi
  [500, 1000, 2000].forEach(t=>setTimeout(()=>fixMap(), t));
});
window.addEventListener('resize',()=>{fixMap();});
</script>
